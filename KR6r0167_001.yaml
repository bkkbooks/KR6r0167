body:
  text: 廣州南海寶象林沙門弘贊在犙輯天道梵語提婆此云天天者天然清淨光潔於諸趣中最勝最樂最善最妙最尊最高故名為天苟非最勝之因豈生最勝淨潔之處最勝因者所謂十善身三口四及意三行由此三業防止過非有順理義違不善道以斯十善運出五趣故茲十善戒法名為天乘諸天雖衆不出三界曰欲界色界無色界三界區分共有二十八處欲界有六第一從下上升四萬二千由旬是四天王天住處居須彌山半乃上升之元首下界之初天東方曰持國天王居須彌山東白銀埵城名上賢領乾闥婆此云香陰天帝樂神及毗舍遮此云噉精氣鬼護東州人南方曰增長天王居須彌山南青琉璃埵城名善見領鳩槃茶此云壓魅鬼及薜荔多此云餓鬼護南州人西方曰廣目天王居須彌山西黃金埵城名周羅領諸龍及富單那此云臭餓鬼護西州人北方曰多聞天王居須彌山北水精埵其城有三一名可畏二名天敬三名衆歸領夜叉及羅剎護北州人四王共有三十二將軍各有九十一子具大威力悉護十方人間五十歲此四王天為一晝夜壽五百歲計人間歲九百萬年從此四王天上升四萬二千由旬是第二忉利天住處忉利此云三十三居須彌山頂山頂縱廣八萬四千由旬而中平可居者止四萬由旬四面各有八天中央善見大城內有金城是天帝釋住處共為三十三天人間一百歲此天為一晝夜壽一千歲計人間歲三千六百萬年以紅蓮華合青蓮華開為夜青蓮華合紅蓮華開為晝從此忉利天上升十六萬由旬有處如雲七寶所成猶如大地縱廣八萬由旬是第三夜摩天住處夜摩此云時分人間二百歲此天為一晝夜壽二千歲計人間歲一萬四千四百萬年從此夜摩天上升三十二萬由旬有地如雲縱廣十六萬由旬是第四兜率天住處兜率此云喜足人間四百歲此天為一晝夜壽四千歲計人間歲五萬七千六百萬年從此兜率天上升六十四萬由旬有地如雲縱廣三十二萬由旬是第五化樂天住處化作五塵而自娛樂人間八百歲此天為一晝夜壽八千歲計人間歲二億三萬零四百萬年從此化樂天上升十二億八萬由旬有地如雲縱廣六十四萬由旬是第六他化自在天住處他化作宮殿園林一切樂具於中自在受用此是欲界頂天人間一千六百歲此天為一晝夜壽一萬六千歲計人間歲九億二萬一千六百萬年從此上升一倍二十五億六萬由旬有地如雲縱廣十二億八萬由旬是色界諸天住處共有一十八天通號四禪以其離散動故亦名梵世謂其離欲染也皆以劫數為壽身白銀色無男女相形惟一種初禪三天一梵衆天壽半劫是民二梵輔天壽一劫是臣三大梵王天壽一劫半是君從此倍倍上升例此可知二禪三天一少光天壽二劫二無量光天壽四劫三光音天壽八劫三禪三天一少淨天壽十六劫二無量淨天壽三十二劫三遍淨天壽六十四劫四禪九天一無雲天壽一百二十五劫二福生天壽二百五十劫三廣果天壽五百劫四無想天壽同上五無煩天壽千劫七善見天壽四千劫八善現天壽八十劫九色究竟天壽一萬六千劫此是色界頂天後之五天名淨居天是三果聖人居處從此上升一倍是無色界共有四天亦名四空天人同碧落界若虗空惟有受想行識四陰無色陰故故名無色界一空處天壽二萬大劫二識處天壽四萬大劫三無所有處天壽六萬大劫四非非想處天壽八萬大劫然此三界諸天壽數雖定而亦有中夭者惟兜率天及無想天壽命皆定不説中夭也正法念處經云若持不殺戒得生四天王處若持不殺不盜得生三十三天若持不殺盜邪淫得生夜摩天若持不殺盜邪淫妄語兩舌惡口綺語得生兜率天奉行佛戒兼身口七善業得生化樂他化自在天業報差別經云若衆生具修增上十善得欲界天報修有漏十善與定相應得色界天報修四空定得無色界天報順正理論云六欲諸天初生如次如五六七八九十歲人生已身形速得圓滿男生在天父右膝女生在天母左膝皆悉化生或有於天母手華忽然化生阿含經云兒來未久便知飢渴自然寶器盛百味飲食若福多者飯色自白中者黃色下者赤色若渴則飲寶器中甘露漿入腹漸消如酥投火無復形影亦無大小便利死如燈𦦨滅無有尸骸以化生故也色界天衆於初生時身量周圓具妙衣服一切天衆皆作聖言不由學習自解典語起世經云欲界諸天皆食段食色界諸天從初禪乃至遍淨天以喜為食無色界諸天以意業為食有云色界無色天並以禪悅法喜為食涅槃經云雖得四天王他化自在天身乃至梵天非非想處天身命終還墮三惡道中天報盡時五衰相現身受大苦如地獄苦等無差別成實論問曰生天離惡積善何故報盡即入三途答曰凡夫無始已來惡業無窮一日貪瞋尚受千形況惡既多暫伏結生報福既盡昔業時熟還墮三途何所致惑為有識心達本者能破三界二十五有故云若人識得心大地無寸土經云一人發真歸源十方世界盡成消殞如未能達本歸源則一心念佛發願往生淨土聞佛説法悟無生忍則頓超三界迥絶輪回矣梵世梵者淨也法句喻經云昔者天帝釋五德離身自知命盡當下生世間在陶作家受驢胎身既知福盡甚大愁憂自念三界之中濟人苦厄惟有佛耳於是馳往佛所稽首作禮伏地至心三自歸命佛法聖衆未起之間其命忽出便至陶家驢母腹中作子時驢自解走瓦壞間破壞壞器其主打之尋時傷胎其神即還入故身中五德還福復為天帝佛從定起讚言善哉天帝能於殞命之際歸命三尊罪對已畢不更勤苦爾時世尊以偈頌曰所行非常謂興衰法夫生輒死寂滅為樂譬如陶家埏埴作器一切要壞人命亦然帝釋聞偈知無常之要達罪福之變解興衰之本尊寂滅之行歡喜奉受得須陀洹道五德離身即五衰相現一衣服垢穢二頭上華萎三腋下汗流四身體臭穢五不樂本座反上即五德也凡言經云律云是釋迦如來親説若言論云乃菩薩羅漢注釋經律之語天竺無著菩薩健馱邏國人也佛去世後一千年中誕靈利見承風悟道出家修學其弟世親菩薩出家受業博聞強識達學研機無著弟子師子覺密行莫測高才有聞二三賢哲每相謂曰凡修行業願覩慈氏若先捨壽得遂宿心當相報語以知所至其後師子覺先捨壽命三年不報世親菩薩尋亦捨命時經六月亦無報命時諸外道咸皆譏誚謂世親及師子覺流轉惡趣遂無靈鑒其後無著菩薩於夜初分方為門人教授定法燈光忽翳空中大明有一天人乘虗下降即進階庭敬禮無著無著曰爾來何暮今名何謂對曰從此捨壽往覩史多天慈氏內衆蓮華中生蓮華才開慈氏讚曰善來廣慧善來廣慧旋繞才周即來報命無著菩薩曰師子覺者今何所在答曰我旋繞時見師子覺在外衆中耽著天樂無暇相顧詎能來報無著菩薩曰斯事已矣慈氏何相演説何法答曰慈氏相好言莫能宣演説妙法義不異此然菩薩妙音清暢和雅聞者忘倦受者無厭云云出西域記覩史多舊曰兜率慈氏即彌勒也佛經律論三藏所載人生六道中或從六道中來者甚多茲僅録一二以彰其餘即如此土所共見聞者亦不能盡録惟録其要俱見如下晉孫稚字法暉齊國般陽縣人也父祚晉太中大夫稚幼而奉法年十八以咸康元年八月病亡父後移居武昌至三年四月八日沙門于法街行尊像經過家門夫妻大小出觀見稚亦在人衆之中隨侍像行見父母拜跪問訊隨共還家祚先病稚云無他禍祟不自將護所致耳五月當差言畢辭去其年七月十五日復歸問訊悉如生時説其外祖父為太山府君見稚曰汝未應來那得至此稚答伯父將來欲以代譴有教推問欲鞭罰之稚救解得原稚兄容字思淵時在其側稚謂曰雖離故形在優樂處但讀書無他作願兄勿復憂也但勤精進繫念修善福自隨人矣我二年學成當生國王家同輩有五百人今在福堂學成皆當上生第六天上我本亦應上生但以解救先人因緣纏縛故獨生王家耳到五年七月七日復歸説邾城當有寇難事例甚多悉皆如言家人祕之故無傳者又云先人多有罪謫宜為作福我今受身人中不須復營但救先人也願父兄勤為功德作福供僧食時務使鮮潔一一如法者受上福次者次福若不能如言皆費設耳當使平等心無彼我其福乃多祚時有婢稚未還時忽病殆死通身皆痛稚云此婢欲叛我前與鞭不復得去耳婢云前實欲叛與人為期日垂至而便住云云太同泰董青建父字賢明建元初為越騎校尉初建母宋氏孕建時夢有人語云爾必生男體上當有青志可名青建及生如言即名焉有容止美言笑性理寬和家人未嘗覩其慍色見者咸異之至年十四而州迎主薄建元初皇儲鎮樊漢為水曹參軍二年七月十六日寢疾自云必不振濟至十八日臨終起坐謂母曰罪盡福至緣纍永絶願母自割不須憂念因七聲大哭聲盡而絶至閏月十一日賢明夢見建云願父暫出東齋賢明便香湯自浴齋戒出東齋至十四夜於眠中聞建喚聲驚起見建在齋前如生時父問曰汝往在何處建云從亡來住在練神宮中滿百日當得生忉利天建不忍見父母兄弟哭泣傷慟三七日禮諸佛菩薩請四天王故得暫還願父母從今已後勿復啼哭祭祀阿母已發願求見建母不久當命終即共建同生一處父壽可得七十三命終之後當三年受罪報勤苦行道可得免脫問曰汝從夜中來那得有光明建曰今與菩薩諸天共下此其身光耳又問云汝天上識誰建曰見王車騎吳興張永外祖宗西河我非獨但此一門中生從四十七年以來至今七死七生已得四道果先發七願願生人間故歷生死從今永畢得離七苦建臨終時見七處生死所以大哭者與七家分別也問云汝皆生誰家建曰生江縣吏部羊布廣州張永車騎王玄宋謨蕭惠明給事梁季父今生董越騎家惟此間生十七年餘處止五三年耳自今已後毒癘歲多宜勤修功德建見世人死多墮三途生天者少勤精進可得免度發願生天亦得相見行脫差異無相值期又問云汝母憂憶汝垂死可令見汝不建曰不須相見益懷煎苦耳但依向言説之諸天已去不容久住慘有悲色忽然不見去後竹林左右猶有香氣家人亦並聞餘香焉建乃初果須陀洹人七死七生漏盡而證得第四阿羅漢果出三界故云從今永畢得離諸苦然建所生處皆是善門也歷陽張應者本事俗神鼓舞淫祀咸和八年移居蕪湖妻得病應請禱備至財産略盡妻法家弟子也謂曰今病日困求鬼無益乞作佛事應許之往寺中見竺曇鎧曇鎧曰佛如愈病之藥見藥不服雖見無益應許當事佛曇鎧與期明日往齋應歸夜夢見一人長丈餘從南來入門曰汝家狼籍乃爾不淨見曇鎧隨後曰始欲發意未可責之應既眠覺便炳火作高座及鬼子母座曇鎧明往應具説夢遂受五戒斥除神影大設福供妻病即除愈咸康二年應至馬溝糴鹽還泊蕪湖浦宿夢見三人以鎠鈎鈎之應曰我佛弟子牽終不置曰汝叛走多時應怖謂曰放我當與君一升酒彼乃放之謂應曰但畏後人復取汝耳眠覺腹痛泄痢達家大困應已久病甚遣人呼鎧適值鎧不在應尋氣絶經日而蘇説有數人以鎠鈎鈎將北去下一坂岸岸下見有鑊湯刀劒楚毒之具應時悟是地獄欲呼師名忘曇鎧字但喚和尚救我亦時喚佛有頃一人從西面來形長丈餘執金杵欲撞此鈎人曰佛弟子也何入此中鈎人怖散長人引應去謂曰汝命也盡不復久生可暫還家頌唄三偈并取和上名字三日當復命過即生天矣應既蘇即復怵然既而三日持齋頌唄遣人疏取曇鎧名至日中食畢禮佛讀唄遍與家人辭別澡洗著衣如眠便盡唄者讚也謂讚歎三寶也諷經亦曰唄偈者佛經中偈頌也怵音出憂也悚懼也襄陽史世光咸和八年於武昌死七日請沙門支法山為誦小品般若經疲而微臥聞靈座上如有人聲史家有婢字張信見世光在靈上著衣帢具如生平語信云我本應墮龍中支和尚為我誦經曇護曇堅迎我上第七梵天快樂處矣護堅並是山之沙彌已亡者也後支法山復往為誦大品般若經又來在座世光生時以二幡在寺中供養乃呼張信持幡送我信曰諾便絶死將信持幡俱西北飛上一青山上如琉璃色到山頂望見天門光乃自提幡遣信令還與一青香如巴豆大囑曰以上支和尚信未還便遙見世光直入天門信復道而還倐忽蘇活亦不復見手中香也幡亦故在寺中世光與信於家去時其六歲兒見之指語祖母曰阿爺飛上天婆為見否世光後復與天人十餘俱還其家徘徊而去每來必見簪帢去必露髻信問之光答曰天上有冠不著此也後乃著天冠與羣天人鼓琴行歌徑上母堂信問何用屢來光曰我來欲使汝輩知罪福也亦兼娛樂阿母琴音清妙不類世聲家人小大悉得聞之然聞其聲如隔壁障不得觀察也惟信聞之獨分明焉有頃去信見光入一黑門須臾來出謂信曰舅在此日見榜撻楚痛難堪我省視還也舅生前犯殺罪故受此報可告舅母請僧𮘗經當稍免脫舅昔輕車將軍也第七梵天即初禪天在六欲天上宋江陵釋黃遷年二十時常寄江陵市西楊道産家行般舟勤苦歲餘因爾遂頗有感變或一日之中赴十餘處齋雖復終日竟夜行道轉經而家家悉見黃遷在焉衆稍敬異之以為得道孝建二年一日自言死期謂道産曰明夕吾當於君家過世至日道産設八關然燈通夕初夜中夜遷猶豫衆行道休然不異四更之後乃稱疲而臥顏色稍變有頃而盡闔境為設三七齋起塔塔今猶存死後久之現形多寶寺謂曇珣道人云明年二月二十三日當與諸天共相迎也言已而去曇珣即於長沙禪坊設齋九十日捨身布施至其日苦乏氣自知必終大延道俗盛設法會三更中呼問衆僧有聞見否衆自不覺異也珣曰空中有奏樂聲馨煙甚異黃遷之契今其至矣衆僧始還堂就席而珣已盡右五出冥祥記此記十卷齊朝王琰撰酒泉郡凡太守到郡無幾輒死後有渤海陳裴見使此郡裴憂愁不樂就卜者占其吉凶卜者曰遠諸侯放伯裘能解此者則無憂裴仍不解此語卜者報曰但去自當解之裴既到官侍監有王侯平有史侯董候等裴心悟曰此所謂諸候矣乃遠之即臥思放伯裘之義不知何謂至夜半後有物來上裴被上裴覺以被冒取之其物跳踉訇訇作聲外人聞持火入欲殺之魅乃言曰我實無惡意但欲試府君耳聽一相赦當深報府君恩陳裴曰汝為何物而忽干犯太守魅曰我本百歲狐也今變為魅矣垂化為神而正觸府君威怒甚遭困厄聽一放我我字伯裘若府君有急難但呼我字則自解矣裴乃喜曰卜謂放伯裘之義是也即便放之小開被忽然有赤光如震電從戶出明日夜有敲戶者裴問曰誰答曰伯裘問曰何為答曰白事問曰白何事答曰此界有賊發奴也裴案發則驗每事先以語裴於是境界無毫毛之姦人咸謂聖君出後經月餘主簿李音共裴侍婢私通既而驚懼慮伯裘來白遂與諸侯謀殺裴却謂傍無人便使諸侯持杖直入欲格殺之裴惶怖即呼伯裘來救我即有物如申一匹絳練然作聲音侯伏地失魂乃以次縛取之考問來意故皆服首後月餘日裘與裴辭曰今得為神矣當上天去不復與府君相見往來遂去不見也出搜神異記梁武帝妃妃郗氏初生有赤光照室器皿盡明及長性明慧善隸書讀史傳女工之事靡不間習宋齊間諸王求婚父曄皆不許後以適帝生三女帝為雍州刺史而妃薨其性酷妒天監年化為巨蟒入於後宮通夢於帝帝體將不安蟒輒激水騰涌或現龍形光彩照灼時蟒作人語啓帝曰妾以生存嫉妒大小為性慘毒損物害人死為蠎身無飲食飢窘困迫又一鱗甲內有多蟲唼咬肌肉痛苦甚劇感帝昔眷念於妾故陳露於帝祈一功德以見拯拔帝聞之感激因此露井上為殿衣服委積置銀轆轤金瓶灌百味以祀之帝乃大集沙門於殿宣問何善能脫其苦志公對曰須禮佛懺滌其愆可脫於是帝與志公及名德沙門搜索大藏經文採托佛語感彌勒題名撰成懺文十卷在宮修禮忽聞異香馥郁帝因仰觀乃見一天人容儀端麗謂帝曰蒙帝功德已脫蟒身得生忉利天上今呈天身以為證驗殷勤致謝言訖不見出通載并懺序蜀郡龍淵寺沙門慧韶姓陳本頴川太丘人少欲多智聰敏不羣春秋五十四卒於本寺時成都民姓應名始豐因病氣絶而心尚暖五日方醒云被攝至閻王所聞處分云迎韶法師須臾便至王下殿合掌頂禮更無言説惟書文書作一大政之字韶出外坐於曠路樹下見一少童以漆柳箕擎一袈裟令韶著之有數十僧來迎豐惟識和慈二禪師幢蓋列道騰虗而去又當終夕有安浦寺尼久病悶絶醒云送韶法師及五百僧登七寶梯到天宮殿講堂中其地如水精牀席華整亦有麈尾几案蓮華池韶就座談説少時便起送別者令歸其生滅冥祥感見類此以天監二年七月三日卒出續高僧傳元魏中天竺沙門勒那此云寶意是西國人遍通三藏妙入總持以魏永平之初來遊東夏宣武皇帝每請講華嚴經披閲精義無廢一日正處高座忽有一人持笏執名者形如大官云奉天帝命來請法師講華嚴經意曰今此法席尚未停止待訖經文當來從命既而法事將了又見前使云奉天帝命故來下迎意乃含笑熙怡告衆辭訣奄然卒於法座都講等四人亦同時殞魏境道俗聞見斯異無不嗟歎隋相州鄴下寺釋玄景統解玄微純講大乘後因臥疾三日告侍人曰玄景欲見彌勒佛云何乃作夜摩天主又云賓客極多事須看視有問其故答云凡夫識想何可檢校向有天衆欲來邀迎耳爾後異香充戶衆共聞之又曰吾欲去矣當願生世為善知識遂終於所住即大業二年六月也自生常立願云沈骸水中及歿後遵用前旨葬於紫柏河深瀅之中三日往觀所沈之處反成沙墳極高峻而水分派道俗異其雅瑞傳迹于今右二出續高僧傳潞州刺史辛彥之建十五層浮圖州人張元暴死復蘇云神遊天上見一堂極崇麗天人曰辛刺史有大功德作此堂以俟之海東新羅國玄光禪師參南嶽證法華三昧師即禮辭南嶽返錫江南值本國海舶遂獲附載方及大洋忽覩采雲亂目雅樂盈空絳節霓旌傳呼而至空中聲云天帝請海東玄光禪師師拱手遜避舟停不進即見青衣恭迎入大宮闕見羽衛陳列鱗介繁錯間以鬼神咸仰敬曰天帝降我龍宮請法師説已證法門吾曹受益不少矣既升殿請陟高臺天帝扣問師為開演經七日而畢帝躬送別向所乘舟師復登之舟遂泛泛而去右二出統紀唐京師大安國寺子鄰法師年少時忽思歸覲二親其父喪明母終已三載因詣嶽廟求知母之幽趣即敷坐具誦法華經誓見天嶽王為期其夜嶽王果召鄰問何故懇苦如是鄰曰母王氏亡來已經除服敢問大王母今何在王顧簿吏對曰王氏現繫獄受苦鄰曰我母何罪王曰生和尚時食雞卵又取白傅頭瘡坐是之故職師之由鄰悲號委頓求王請免曰縶縻有分放釋無門然則為法師計請往鄮山禮阿育王塔或可原也鄰詰朝遵途到會稽鄮陰山寺叩頭哀訴五輪著地禮畢數所投䇿至四萬數俄聞有呼鄰聲若蔡順之解望空見雲氣中母謝曰承汝之力得生忉利天矣故來報汝倐然不見先所禮處今鄮山育王寺後峰之翠微茅菴基及池存焉古人分娩食雞卵尚得重報今人娩後多殺生命罪當如何為母為子者不可不知鄮山在浙江寧波府城東南四十里許阿育王塔詳見第四卷中縶音執絆也縻音縻繫也壽州紫金山玄宗禪師永嘉人見紫金山悅可自心留行禪觀此山先多虎暴或噬行商或傷樵子避苛政者哭婦甚哀從宗卜居哮噉絶迹自邇入山者無憚矣一日禪徒擁集見一老父趨及座前拜跪勤恪宗曰子何人耶答云我本虎也在此山中食噉衆生因大師化此冥回我心得脫業軀已生天道故來報謝折旋之頃了無所見右二出宋高僧傳長安西明寺道宣律師者德鏡玄流業高清素精誠苦行畢命終身棲遑問道志在住持綴緝儀範二百餘卷結集高軌屬有深旨貞觀中曾隱沁部雲室山人睹天童給侍左右於西明寺夜行道足跌前階有物扶持履空無害熟顧視之乃少年也律師遽問何人夜中在此少年曰某非常人乃北方多聞天王之子那吒也護法之故擁護和尚時之久矣師曰貧道修行無煩太子太子威神自在西域有可作佛事者願為致之太子曰某有釋迦佛牙寶掌雖久頭目猶捨敢不奉獻俄授於師師保録供養焉以乾封二年仲春之節身在京師城南淨業寺逐靜修道年至桑榆氣力將衰專念四生又思三會忽以往緣幽靈顧接病漸瘳降勵力殷仰遂感冥應時四天王至問訊律師廣序賢劫四佛興世涅槃遺迹等事復有諸天四王臣佐至律師房門似人行動蹀足出聲律師問言是誰答言弟子姓張名瓊師問何處檀越答言是南方天王之第十五子王有九十一子英略神武各御都所統海陸道路區分持犯界別並親受佛教護持善惡使遺法載隆積殖其功常加守護不徒設也師曰檀越既遺德劣故來相看何故門首不入答云弟子不得師教不敢輒入師云願入就座入已禮敬伏座問曰檀越既篤信三寶又受佛囑護持善來相看何不現形答言弟子報身與餘人別光色又異驚動衆心共師言論足得不勞現身問曰貧道入春已來氣力漸弱醫藥無效未知報命遠近答云師報將盡無煩醫藥問曰定報何日答云何須道時但知師不久盡生第四天彌勒佛所問曰同伴是誰答曰弟子第三兄張璵通敏超悟信重釋宗撰祇洹圖經百有餘卷烈峙天宮無聞地府師承此告及踊思尋請述之用開道俗又一天來至師所致敬申禮具敘暄涼師問曰檀越何處姓字誰耶答曰弟子姓王名璠是大吳之蘭臺臣今是南方天王韋將軍下之使者將軍事務極多擁護三洲之佛法有鬬諍凌危之事無不躬往和喻令解今附和南不久當至復有一天來云姓羅氏是蜀人也言作蜀音廣説律相初相見時如俗禮儀敘述緣由多有次第又有一天姓費氏禮敬如前云弟子迦葉佛時生在初天在韋將軍下諸天貪欲所醉弟子以宿願力不交天欲清淨梵行偏敬毗尼韋將軍童真梵行不受天欲一王之下有八將軍四王三十二將周四天下往還護助諸出家人四天下中北天一洲少有佛法餘三天下佛法大弘然人多犯戒少有如法東西天下人少黠慧煩惱難化南方一洲雖多犯罪化令從善心易調伏佛臨涅槃親受付囑並令守護不使魔嬈若不守護如是破戒誰有行我之法教者故佛垂誡不敢不遵雖見毀禁愍而護之見行一善萬過不究事等忘瑕不存往失且人中臭氣上薰空界四十萬里諸天清淨無不厭之但以受佛付囑令護佛法與人同止諸天不敢不來韋將軍三十二將之中最存弘護多有魔子魔女輕弄比丘道力微者並為惑亂將軍棲遑奔至應機除剪故有事至須往四王所時王見皆起謂韋將軍修童真行護正法故弟子性樂戒律如來一代所制毗尼並在座中聽受戒法問云益州成都多寶石佛者何代時像從地涌出答曰蜀都元基青城山上今之成都大海之地昔迦葉佛時有人於西耳河造之擬多寶佛全身相也其地西北去雟州二千餘里問去天竺非遠往往有至彼者至晉時有僧於此地見土墳隨出隨除終不可平後見坼開乃深掘丈餘獲像及人骨在船其髏骨肘脛悉皆粗大數倍過於今人即迦葉佛時閻浮提人壽二萬歲時也今時劫減命促人小固不常然不可怪也初出之時牽曳難得弟子化為老人指撝方便須臾至周滅法暫隱到隋重興更復出之蜀人但知其靈從地而出亦不測其根源見其華趺有多寶字因遂名焉又問多寶字其隸書出於亡秦之代如何迦葉佛時已有此國書耶答曰亡秦李斯隸書此乃近代遠承隸書之興興於古佛之世現今南洲四面千有餘洲莊嚴閻浮一方百有餘國文字言音同今唐國但以海路遼遠動數十萬里重譯莫傳故使此方封守株柱不足怪也師不聞乎梁顧野王大學之太傅也周訪字源出沒不定故玉篇序云有開春申君墓得其銘文皆是隸字檢春申是周武六國同時𨽻文則非吞併之日也此國篆隸諸書尚有茫昧寧知迦葉佛時之事史非其耳目之所聞見也又問今西京城西高四土臺俗云是蒼頡造書之臺如何云隸書字古時已有答云蒼頡於此臺上增土造高觀鳥迹者非無其事且蒼頡之傳此土罕知其源或云黃帝之臣或云古帝王也鳥迹之書時變一途今所絶有無益之言不勞述也又一天人姓陸名玄暢來謁律師云弟子是周穆王時生在初天本是迦葉佛時天為通化故周時暫現所問高四土臺者其本迦葉佛於此第三會説法度人至穆王時文殊目連來化穆王從之即列子所謂化人者是也化人示穆王高四臺是迦葉佛説法處因造三會道場至秦穆公時扶風獲一石佛穆公不識棄馬坊中穢汙此像護像神瞋令公染疾公又夢上帝極責覺問侍臣由余答云臣聞周穆時有化人來此土云是佛神穆王信之於終南山造中天臺高千餘尺基址現在又於蒼頡臺造神廟名三會道場公今所患殆非佛為之耶公聞大怖語由余曰吾近獲一石人衣冠非今所製棄之馬坊將非此是佛神耶由余往視之對曰此真佛神也公取像澡浴安清淨處像遂放光公又怖謂神瞋也宰三牲以祭之諸善神等擎棄遠處公又大怖以問由余答曰臣聞佛神清潔不進酒肉愛重物命如護一子所有供養燒香而已所有祭祀餅果之屬公大悅欲造佛像絶於工人又問由余答曰昔穆王造寺之側應有工匠遂於高四臺南村內得一老人姓王名安年百八十自云曾於三會道場見人造之臣今年老無力能作所住村北有兄弟四人曾於道場內為諸匠執作請追共造依言作之成一銅像相好圓備公悅大賞賚之彼人得財並造功德於土臺上造重閣高三百尺時人號之高四臺或曰高四樓其人姓高大者名四或曰兄弟四人同立故也又問目連舍利弗佛在已終如何重見答曰同名六人此目連非大目連也釋迦如來度大迦葉後十二年中來至此臺其下現有迦葉佛舍利周穆身遊天竺佛告穆王彼土現有古塔可返禮事王問何方佛曰在鄗京之東南也又問今五臺山中臺之東南三十里見有大孚靈鷲寺兩堂隔澗猶存南有華園可二頃許四時發彩或云漢明所立或云魏孝文帝栽植如何為實答云但是二帝所作昔周穆之時已有佛法此山靈異文殊所居周穆於中造寺供養及阿育王亦依置塔漢明之初摩騰法師是阿羅漢天眼亦見有塔請帝立寺其山形像似靈鷲名曰大孚孚者信也由帝深信佛法立寺勸人元魏孝文北臺不遠常來禮謁見人馬行迹石上分明其事可驗豈惟五臺獨驗今終南山太白太華五嶽名山皆有聖人為住持佛法令法久住有人設供感赴徵應事在別篇不繁此述也問羅什法師一代所翻之經人多偏樂受持轉盛何耶答曰其人聰明善解大乘以下諸人同時翻譯者並俊又一代之寶也絶後光前仰之所不及故其所譯以悟達為先得佛遺寄之意什師德行位在三賢所在通化那煩補闕隨機而作故大論一部十分略九自餘經論例此可知冥祥感應歷代彌新深會聖旨罕逢難遇又蒙文殊指授令其刪定特異恆論又問幽冥所感俗中常有神去形朽如何重來或經七日多日如生不異答曰人稟七識識各有神心識為主主雖前去餘神守護不足怪也如五戒中一戒五神五戒便有二十五神一戒破五神去餘者仍在如大僧受戒戒有二百五十神亦戒戒之中感得二百五十防衛比丘若毀一戒二百五十神去餘者恆隨於是律師既承靈囑扶疾筆受隨聞隨録合成十卷律師憂報將盡復慮天人將還筆路蒼茫無暇餘事文字亦復疏略但求聖意不存文飾耳目雖倦不覺神勞但恨知之不早今依天人所説不違三藏教旨即皆編録雖聞天授還同佛説始從二月迄至六月日別來授無時暫間至冬初十月三日師氣力漸微香幡遍空天人聖衆同時發言從兜率天來請律師師端坐一心合掌斂容而卒臨終道俗百有餘人皆見香華迎往升空云云出法苑并高僧傳其餘鳥獸僧俗生天備載經論及兜率龜鏡集中真武乃北方一神耳今道士以那吒太子帶貼髏立真武側罪莫大焉嵩山破竈墮和尚名氏叵測天后之世參嵩山安禪師通徹禪法逍遙弗羇山有廟靈甚殿中惟有一竈遠近烹宰祭祀凡人拜奏之時往往見鬼物形兆師領徒入廟以杖擊竈三下曰咄此竈泥瓦合成聖從何來靈從何起恁麼烹宰物命又擊三下遂傾破墮落須臾有一人青衣峨冠拜曰我本竈神久受業報今蒙師説無生法得脫此處今當生殊勝天上特來禮謝師曰汝是本有之性非吾強言神再拜而去出通載及宋高僧傳今人被擊即大生瞋怒若不瞋怒如擊木石無異奚契一咄泥瓦合成之旨其有伶俐漢子於此言下薦得即會無生法矣叵音頗不可也循州北山神宣律師問天人曰南海循州北山興寧縣界靈龕寺多有靈迹何也天人曰此乃文殊聖者弟子為此山神多造惡業文殊愍之便來教化遂識宿命請為留迹我常禮事得離諸惡文殊為現今者是也於貞觀三年山神命終生兜率天見付囑儀按上生經云佛言善男子善女人犯諸禁戒造衆惡業聞彌勒菩薩大悲名字五體投地誠心懺悔是諸惡業速得清淨我滅度後四衆八部欲生第四天當於一日乃至七日繫念彼天持佛禁戒思念十善行十善道以此功德回向願生彌勒佛前隨念往生所言七日者且從近論尚感天報況復一生而不尅獲乎未曾有經有受十善之法此不繁出言第四天者名兜率陀天是彌勒菩薩於中教化諸天子若生彼處即得不退轉地生兜率天有數十人出高僧傳及兜率龜鏡集中于闐國沙彌般若彌伽薄堅持戒行專誦華嚴時忽有人合掌言諸天請師願師閉目俄至天上天帝釋跪而請曰今方與修羅戰屢被摧衄屈師誦華嚴經望法力加被師乘天輅心念華嚴以諸天衆對彼勍敵修羅見之忽然潰散須臾送歸身染天香終身不滅出華嚴感應録清廣州南海縣麻奢鄉陳公孺性懷耿侃喜客無倦不尚奢美惟好儉朴晚年歸信法門受持六齋倐興創立精舍之念於康熙丙午年捨宅後地為寶象林建瑞塔禪寺誘諸子姪而趣向佛乘故令一方知崇三寶遠惡修善實藉公焉癸丑歲公年六十有六感微疾數旬至五月初五日使人扶遊荔圃以賞新荔是夜寂然長逝矣本寺僧衆即為之修禮懺法時有沙彌藏一自東安石驎菴來執大殿香燈職午飯畢趺坐殿後俟茶上供而頭忽垂至膝同坐者謂其瞌睡以手觸之不動方知已絶呼人共舁上牀移時乃蘇衆詰之一曰初見前殿門外有數金甲神人雄偉勇聳列跪門前天人雜沓窒塞虗空幢幡寶蓋香華燈燭樂音遍界中有一人甚高大極目望不至首有二大幡一題云娑羅樹王佛一題云越三界菩薩有二天童各執一小幡一題云妙喜世界一題云極樂天幢復有一幡遣藏一執云送山主往化樂天一執之出門方至橋首見二長老在後喚云你未得去藏一聞之即便回也化樂是欲界第五天也余惜公入法門日淺未知出世大道由福報故生化樂天不然即生第四兜率天親承彌勒大士聞深妙法與給孤長者把臂同遊龍華三會證無生忍寧不快哉寶象林釋慧弓緑龍華謂彌勒佛當來坐於龍花樹下成等正覺三會説法度人故也妙喜是東方阿閦毗佛世界極樂是西方阿彌陀佛世界阿閦毗此云不動阿彌陀此云無量壽若據幡則公當隨生一佛世界或其人採語不真亦未可知以化樂極樂音相近也若人誠心繪塑佛像即生妙喜世界一心專念阿彌陀佛名號即生極樂世界按上五幡俱是接引往生者故有佛菩薩聖號然造幡之法須知有能嚴所嚴能嚴者幡即供具莊嚴供養於所供佛塔或諸佛菩薩不應安佛菩薩尊像當作禽獸形或書讚頌偈詞其所嚴者是所敬之尊乃書佛菩薩聖號即以香華燈燭種種果食百珍而供養之按諸經律令造幡者皆是能嚴之幡如昔給孤長者既作塔已欲以幡旗并雜繪綵而為供養佛言應作彼不解幡式佛言聽作師子幡犎牛幡金趐鳥幡及龍幡等於上畫作彼之形像又普廣經云若四輩男女臨終之時若已命過於其亡日造作黃幡懸著剎上使獲福德離八難苦得生十方諸佛淨土幡蓋供養隨心所願至成菩提幡隨風轉破碎都盡成於微塵幡一轉時輪王位乃至吹塵小王之位其報無量然燈供養照諸幽冥苦痛衆生𫎇此光明得互相見緣此福德彼衆生悉得休息華嚴經云人欲終時自見中陰相行惡業者見三惡受苦或見閻羅持諸兵仗囚執將去或聞苦聲若行善者見諸天宮殿妓女莊嚴遊戲快樂如是等勝事故永明壽禪師云若心淨即香臺寶樹淨剎化生心垢則丘陵坑坎穢土受質皆是等倫之果也音釋帝釋梵語釋提桓因華言能天主謂能為三十三天之主昔為人時姓憍尸迦建立迦葉佛舍利塔三十二人助修共生忉利天帝釋為主總名三十三天也身口七善業身不殺盜邪淫口不妄言綺語兩舌惡口十惡業十善業十惡者身三殺盜淫口四妄言綺語兩舌惡口意三貪瞋癡不作是事名為十善天台云十善有二種一止二行止則但止前惡不惱於他行則修行勝德利樂一切此二通稱善者善以順理為義息倒歸真故云順理止則息於重倒之惡行則漸歸勝道之善故止行二種皆名為善或加以道名以能通至樂果故也埏埴上音羶和土也下音實黏土也老子曰埏埴以為器即打瓦也帢音掐帽也窘羣字上聲困也轆轤上音六下音盧井上汲水圓轉木也鄗豪上聲邑名在常山漢光武分鄗字為高邑舁音于對舉也由旬有三別大者六十里中者四十里下者三十里八萬四千問曰教中常言八萬四千何耶答曰此其大數也亦人身中有八萬四千毛孔心具八萬四千塵勞煩惱故佛説八萬四千法門以對治之問又常言七七之期何耶答人在胎時七七日形具五體死時極至七七日必定託生也餘如後釋小品般若十卷大品般若三十卷犎音風牛名出罽賓國形如槖駝脊上高隆二十五有一四州東西南北二四惡趣修羅鬼畜地獄三六欲天四梵天王五無想天六五那含天七四禪天八四空天然此二十五有總在六道中有生有死也梵王無想那含總在四禪天由外道謂梵王為生萬物之主謂無想以無心為涅槃五那含為真解脫故此別立其名也八部一諸天二龍衆三夜叉四乾闥婆五阿修羅六迦樓羅七緊那羅八摩睺羅伽四衆出家二衆比丘比丘尼在家二衆優婆塞優婆夷俱受五戒者譴謫上音牽去聲下音窄責罰法喜禪悅食以愛樂大法得法資長道種心生歡喜不嗜世味常持正念是為法喜食由得禪定自資長養慧命道品圓明正念現前心生喜樂不貪世味是為禪悅食郗音希昔陳針是智者大師之兄為梁晉安王中兵參軍年四十仙人張果相之曰死在期月師令行方等懺針見天堂門牌曰陳針之堂後十五年當生於此果後見針驚問曰君服何藥答曰但修懺耳果曰若非道力安能超死竟延十五年而終武帝為郗氏禮懺尚生忉利而針躬修懺法豈不天堂預置乎十二緣生亦名緣起亦名因緣所謂無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死此名三世因果循環之法也無明行二是過去因識名色六入觸受五名現在果愛取有三名現在因生老死二名未來果詳如餘處
