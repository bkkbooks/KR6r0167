body:
  text: 廣州南海寶象林沙門弘贊在穇輯鬼神道問曰云何名鬼道答曰由彼造作增上慳貪身語意惡行往彼生彼故感饑渴業報經百千萬歲不聞水漿之名況復得見得食故名鬼趣又希望故名為鬼謂六道中彼恆時從人希望飲食又鬼者畏也謂虗怯多畏故也問依何所居住耶答或地獄山海曠野廟中人間街巷里閭圊廁樹木華果根莖藥草遍處皆有惟人不見縱人行其宮室室不崩倒如鬼過人牆壁壁無穿壞神者能也大力者能移山填海小力者能隱顯變化又有福威而靈曰神無福賤而魅曰鬼復有貧富貴賤種種差別非一如後所列余昔初住鼎湖山先年山下迪村有一人上山採樵去菴前不遠盡是蘆荻彼人初下刀斫一株聲如雷震慞惶仆地乞神恕罪聲遂升空漸漸隱滅是知草木無論大小悉有鬼神依住不可輕伐而自招咎故佛制諸比丘不得壞一切草木若為三寶有所須用當於樹下設祭誦佛經偈讚布施福俟其夜中無有異相次日方遣人斫伐也牟子理惑篇或問曰佛道言人死當復更生僕不信此言之審也牟子曰人臨死其家上屋呼之死已復呼誰或曰呼其魂魄牟子曰神還則生不還神何之乎曰成鬼神牟子曰是也魂神固不滅矣但身自朽爛耳身譬如五穀之根葉魂神如五穀之種實根葉生必當死種實豈有終亡得道身滅耳老子曰吾所以有大患以吾有身也或曰為道亦死不為道亦死有何異乎牟子曰所謂無一日之善而問終身之譽者也有道雖死神歸福堂為惡既死神當其殃愚夫暗於成事賢智預於未萌道與不道如金比草善之與惡如白方黑焉得不異而言何異乎牟子漢獻帝初平人天地本起經云劫初成時有異梵天王子是摩醯首羅等諸鬼神父修其梵志苦行滿天上十二歲於此六日每割血肉以著火中過十二歲已天王來下語天子言汝求何願答言我求有子天王言供養仙人法以燒香甘果等汝云何以肉血著火中如罪惡法汝破善法樂為惡事令汝生惡子噉肉飲血當說是時火中有八大鬼出身黑如墨髮黃眼赤有大光明摩醯首羅神等從此八鬼生以是故摩醯首羅等神於此六日有大勢力惱害衆生諸鬼之中摩醯首羅最大第一一月之中皆有日分摩醯首羅一月有四日分謂八日十四日二十三日二十九日餘神一月二日分謂月一日十六日其月二日十七日十五日三十日屬一切神摩醯首羅為諸神王又得日多故數四日為齊餘日是一切神日亦數為齊是故諸惡鬼神於此六日輒有勢力也但佛法之中日無好惡隨世日因緣故佛教衆生齊戒以除其患也按經中六日受持八關齊戒功超人天乃至成佛其福不盡若求世間天上人間福樂亦得成就豈惟免現患而已故云隨世日因緣教令齊戒現免災患終圓佛果也順正理論云鬼有三種謂無財少財多財無財復有三炬口針口臭口炬口鬼者此鬼口中常吐猛𦦨熾然無絶身如被燎多羅樹形此為極慳所招苦果針口鬼者此鬼腹大如山口如針孔雖見種種上妙飲食不能受用饑渴難忍臭口鬼者此鬼口中恆出極惡腐爛臭氣過於糞穢沸溢廁門惡氣自熏恆空嘔逆設遇飲食亦不能受饑渴所惱狂叫亂奔少財亦有三謂針毛臭毛大癭針毛鬼者此鬼身毛堅剛銛利不可附近內鑽自體外射多身如鹿中毒箭怖狂走時若逢不淨少濟饑渴臭毛鬼者此鬼身毛臭甚常穢薰爛肌骨蒸坌腸腹衝喉變嘔荼毒難忍攖體拔毛傷裂皮膚轉加劇苦時逢不淨少濟饑渴大癭鬼者謂此鬼咽惡業力故生於大癭如大擁腫熱怖酸疼更相㓟䍤臭膿湧出爭共取食少得充饑多財亦有三謂希祠希棄大勢希祠鬼者此鬼恆時往祠祀中饗受他祭生處法爾時歷異方如鳥凌空往還無礙由先勝解作是希望我若命終諸子孫等必當祠我資具飲食由勝解力生此鬼中乘宿善因感此祠祀或有先世性愛親知為欲皆令豐足資具以不如法積集珍財慳吝居心不能布施乘斯惡業生此鬼中住本舍邊便穢等處親知追念為請沙門梵志孤窮供施崇福彼鬼見已於自親知及財物中生己有想又自明見慳果現前於所施田心生淨信相續生長捨相應心由此便成順現法受乘斯力故得資具豐饒希棄鬼者此鬼欲恆收他所棄吐殘糞等用充所食亦得豐饒謂彼宿生慳過失故有飲食處見穢或空樂穢見空樂淨見穢亦由現福如其所應各得豐饒飲食資具生處法爾所受不同不可推徵詞到所以如地獄趣異熟生色斷已復續餘趣則無於人趣中有勝念智修梵行等餘趣中無如天趣中隨欲衆具皆現如斯等事生處法然不可於中求其定量大勢鬼者如婆沙論云鬼中好者如有威德鬼形容端正諸天無異又一切五嶽四瀆山海諸神悉多端正名為好也鬼中醜者謂無威德鬼形容鄙惡不可具說頡如餓狗之腔頭若飛蓬之亂咽同細小之針腳如朽槁之木口常垂涎鼻恆流涕耳內生膿眼中出血諸如是等名為大醜又鬼中苦者即彼無威德鬼恆常饑渴纍年不聞漿水之名豈得逢斯甘膳設值大河欲飲即變為炬火縱得入口即腹爛焦然如斯之類豈不苦哉鬼中樂者即彼有威德中富足豐美衣食自然身服天衣口餐天供形容優縱䇿乘輕馳任情遊戲共天何殊如斯之類豈不樂哉問曰既有此樂便勝於人何故經說人鬼異趣答曰經說鬼神不如人道略述二意一受報分顯不及於人為彼鬼神晝伏夜遊故不及於人二虗怯多畏不及於人雖有威德以報卑劣常畏於人縱晝夜值人恆避路私隱問曰既劣於人何得威德報同於天答曰然由前身大行施故得受威報由前身諂曲不實故受斯鬼道也復有貴賤如有威德者即名為貴無威德者即名為賤又為鬼王者即名為貴受驅使者即名為賤問富貧如何答有威德者多饒衣食僕使自在即名為富身常區區恆被敦役粗食不聞弊服難值如斯之類即名為貧又有威德者或住山谷或住空中或住海邊皆有宮殿七寶莊嚴首冠華鬘身著天衣食甘露食猶如天子乘象馬車各各遊戲果報過人一切山河諸佛悉有舍宅依之而住無威德者如浮遊浪鬼饑渴之徒悉無舍宅或依冢墓或止叢林草木巖穴或依不淨糞穢而住或依屏廁故塸而居皆無舍宅頭髮髼亂裸形無衣顏色枯悴以髮自覆執持瓦器而行乞丐果報劣人其形多分如人亦有傍者或面似猪或似種種諸惡禽獸如今壁上彩𦘕者莊嚴論云佛言昔有大商主子名曰億耳入海採寶既得回還與伴別宿失伴慞惶饑渴所逼遙見一城謂為有水往至城邊欲索水飲然此城者是餓鬼城到此城中四衢道頭衆人集處空無所見唱言水水諸餓鬼輩聞是水聲皆來雲集誰慈悲者欲與我水此諸餓鬼身如焦柱以髮自纏皆來合掌作如是言願乞我水億耳語言我渴所逼故來求水爾時餓鬼聞億耳為渴所逼自行求水希望都息皆各長歎作如是言汝可不知此餓鬼城云何此中而索水耶鬼有胎化二生也異熟生色者即果報生身也莊嚴論是馬鳴菩薩集注佛經者四天王及忉利天惟有大威德鬼與諸天衆守門防邏導從給使也正法念經云佛言餓鬼大數有三十六種行因不等受報各別一鑊身鬼由受他雇殺生受鑊湯煎煮或受他寄抵拒不還故受斯報也二針口臭鬼以財雇人令行殺戮故咽如針鋒滴水不容也三食吐鬼夫勸婦施惜言無積財慳吝故常食吐也四食糞鬼由婦人誑夫自噉飲食惡婦夫故常食吐糞也五食食鬼由禁人糧食令其合死故受火燒嘷叫饑渴苦也六食氣鬼多食美食不施妻兒常因饑渴惟得臭氣七食法鬼以求財利為人說法身常饑渴身肉消盡𫎇僧說法命得存立也八食水鬼由酤酒侵水以惑愚人不持齊戒常患焦渴也九希望鬼由買賣諍價欺誑取物常患饑渴先靈祭祀即得食之也十食唾鬼以不淨食誑出家人身常饑渴恆被煮燒以求人唾兼食不淨十一食鬘鬼以前世時盜佛華鬘用自莊嚴若人遭事以鬘賞祭因得鬘食也華貫串名鬘十二食血鬼由殺生血食不施妻又受此鬼身以血塗祭方得食之十三食肉鬼由以衆生身肉臠割稱之賣買欺誑因受此報也多詐醜惡人惡見之祭祀雜肉方得食之十四食香鬼由賣惡香多取酬直惟食香煙後受窮報十五疾行鬼若有破戒而披法服誑惑取財言供病人竟不施與便自食之由受此報常食不淨自燒其身十六伺便鬼由謀誑取財不修福業因受此報身毛火出食人氣力不淨以自存活十七黑暗鬼由枉法求財繫人牢中目無所見聲常哀酸故受暗處惡蛇遍滿猶刀割苦也十八大力鬼由偷盜人物施諸惡友不施福田因受此報大力神通多被苦惱也十九熾然鬼由破城抄掠殺害百姓因受此報嘷哭叫喚遍身火然死墮地獄後得為人常被劫奪也二十伺嬰兒便鬼由殺嬰兒生心大怒因受此報常伺人便能害嬰兒也二十一欲色鬼由好淫得財不施福田因受此報遊行人間與人交會妄為妖怪以求活命也二十二海渚鬼由行曠野見病苦人欺人誑取財物生海渚中受寒熱苦十倍過人苦也二十三閻羅王執仗鬼由前世時親近國王大臣專行暴惡因受此報為王給使作執仗也二十四食小兒鬼由說呪術誑惑取人財物殺害猪羊死墮地獄後受此報常食小兒二十五食精氣鬼由詐為親友我為汝護令他勇力沒陳而死竟不救護故受斯報也二十六羅剎鬼由殺生命以為大會故受此饑火所燒報二十七燒食鬼由慳嫉覆心喜噉僧食先墮地獄從地獄出受火爐燒身也二十八不淨巷陌鬼由以不淨食與修行人因墮此報常食不淨二十九食風鬼因見出家人來乞許已不施其食故受此報常患饑渴如地獄苦三十食炭鬼由典主刑獄禁其飲食因受此報常食火炭也三十一食毒鬼由以毒食令人喪命因墮地獄後出為鬼常餓餓恆食毒火燒其身三十二曠野鬼由他曠野作湖池井造已施人惡心決破令行人渴乏故受斯報常患饑渴火燒其身三十三冢間食灰土鬼由盜佛華賣已活命故受此報常食死人處燒尸熱灰也三十四樹下住鬼由見人種樹施人作蔭惡心斫伐取材而用故墮樹中受寒熱苦三十五交道鬼由盜行路人糧以惡業故常被鐵鋸截身因交道祭祀取食自活三十六魔羅鬼由行邪道不信正真因墮魔鬼常破人善法也若起貪嫉邪諂曲欺誑於他或復慳貪積財不施皆生鬼道從鬼命終多生畜生道中受遮吒迦鳥身恆常饑渴受大苦惱惟飲天雨仰口而承不得更飲餘水是故常困饑渴俗名此鳥為吊天翁業報差別經云具造十業生餓鬼中一身行輕惡二口行輕惡三意行輕惡四慳澀多貪五起非分惡六諂曲嫉妒七起邪見八愛著資生即便命終九因饑而亡十枯渴而死以是業故生餓鬼中大智論云或有餓鬼先世惡口好以粗言加彼衆生衆生憎惡見之如讎以此罪故墮餓鬼中此論一百卷是龍樹菩薩釋大品般若經法句經云佛言雖為沙門不攝身口粗言惡說多所中傷衆所不愛智者不惜身死神去輪轉三途自生自死苦惱無量諸佛聖賢所不愛惜假令衆生身雖無過不慎口業亦墮惡道故大論云時有一鬼頭似豬頭臭蟲從口出身有金色光明是鬼宿世作比丘惡口罵詈客比丘身持淨戒故身有光明口作惡言故臭蟲從口出付法藏經云昔尊者闍夜多羅漢將諸弟子詣德叉尸羅城到其城已慘然不悅弟子白師願說因緣尊者答曰我初至城於城門下見一鬼子饑急語我我母入城為我求食與母別來經五百歲饑虗困乏命將不遠尊者入城若見我母道我辛苦願語早來始入城便見彼母具說子意鬼母答我吾入城來經五百歲未曾能得見一人洟唾我既新産氣力羸劣設得少唾諸鬼奪去今值一人遇得少唾欲持出城共子分食門下多有大力鬼神畏不敢出惟願尊者延我出城我即將出令共子食我即問鬼生來幾時鬼答我言吾見此城七反成壞我聞鬼言悲歎生死受苦長遠是以慘然優婆塞經云極長壽者一萬五千歲如人間五千年為餓鬼中一日一夜如是日夜即彼鬼壽一萬五千歲計此人間日月歲數當二千七百萬歲正法念經云有鬼壽命五百歲如人間千年為餓鬼一日一夜如是日夜壽五百歲計此人間日月歲數當一百八十萬歲已上壽命長短不定者由其業有輕重故其受報所見有不同也分別功德論云有沙門在冢間修禪觀於死尸夜見餓鬼打一死尸沙門問曰何以打死尸耶鬼曰此尸困我如是是以打之沙門曰何以不打汝心打尸當復何益也須臾復有一天以天華散一臭尸沙門問曰何為散華此臭尸耶天曰我由此尸得生天上此尸即是我之善友故來報往昔之恩沙門曰何不散華汝心中夫為善惡之本皆心所為乃捨本求末耶漢雒陽法師安清字世高南天竺安息國王正后之太子也幼以孝行見稱志業聰敏尅意好學外國典籍及七曜五行醫方異術乃至鳥獸之語無不綜達嘗行見有羣䴏忽謂伴曰䴏云應有送食者頃之果有至焉衆咸奇之故俊異之聲早被西域高窮理盡性自識宿緣業多有神迹世莫能量初高自稱先身已經出家有一同學多瞋乞食值施主不稱每輒怨恨高屢訶諫終不悛改如此二十餘年乃與同學辭訣云我當往廣州畢宿世之對卿明經精勤不在吾後而性多恚怒命過當受惡形我若有力必當相度既而遂適廣州值寇賊大亂行路逢一年少唾手拔刀曰真得汝矣高笑曰我宿命負卿故遠相償卿之忿怒故是前世時意也遂伸頸受刃容無懼色賊便殺之觀者盈路莫不駭其奇異而此神識還為安息王太子即今時世高身是也高遊化中國宣經事畢值靈帝之末關雒擾亂乃振錫江南云我當過廬山度昔同學行達䢼亭湖廟此廟舊有靈威商旅祈禱乃分風上下各無留滯高同旅三十餘人船主奉牲請福神乃降祝曰舫有沙門可更呼上客咸驚愕請高入廟神告高曰吾外國與子俱共出家學道好行布施而性多瞋怒今為䢼亭廟神周回千里並吾所治以布施故珍玩甚豐以瞋恚故故墮此神報今見同學悲欣可言壽盡旦夕而醜形長大若於此捨命穢汙江湖當度山西澤中此身滅後恐墮地獄吾有絹千匹并雜寶物可為立法營塔使生善處也高曰故來相度何不出形神曰形甚醜異衆人必懼高曰但出衆不怪也神從牀後出頭乃是大蟒不知尾之長短至高膝邊高向之梵語數番讚唄蟒悲淚如雨須臾還隱高即取絹物辭別而去舟侶揚帆倐忽之頃便達豫章即以廟物為造東寺高去後神即命過暮有一少年上船長跪高前受其祝願忽然不見高謂船人曰向之少年即䢼亭廟神得離惡形矣於是廟神歇滅無復靈驗後人於山西澤中見一死蟒頭尾數里今潯陽郡蛇村是也高後復到廣州尋其前世害己少年尚在高徑投其家說昔日償對之事并敘宿緣歡喜相向云吾猶有餘報今當往會稽畢對廣州客悟高非凡豁然意解追恨前愆厚相資供隨高東遊遂達會稽入市正值市中有亂相打者誤著高頭應時殞命廣州客頻驗二報遂精勤佛法具說事緣遠近聞知莫不悲歎此明三世之有徵也出梁高僧傳交趾刺史何敞行部到蒼梧郡高要縣暮宿鵲奔亭夜猶未半有一女子從樓下出自云妾姓蘇名娥字始珠本廣信縣修里人早失父母又無兄弟夫亦久亡有雜繒百二十匹及婢一人名致富妾孤窮羸弱不能自振欲往傍縣賣繒就同縣人王伯賃車牛一乘直錢萬二千載妾并繒令致富執轡乃以前年四月十日到此亭外於時日暮行人既絶不敢前行因即留止致富暴得腹痛妾往亭長舍乞漿取火亭長龔壽操刀持戟來至車傍問妾曰夫人從何所來車上何載丈夫安在何故獨行妾應之曰何故問之壽因捉妾臂曰少愛有色寧可相樂耶妾時怖懼不肯聽從壽即以刀刺脅一創立死又殺致富壽掘樓下埋妾并婢取財物去殺牛燒車車釭及牛骨貯亭東空井中妾死痛酷無所告訴故來自歸於明使君敝曰今欲發汝尸骸以何為驗女子曰妾上下皆著白衣青絲履猶未朽也掘之果然敞乃遣吏捕壽拷問具服下廣信縣檢問與娥語同收壽父母兄弟皆繫獄敞表壽殺人於常律不至族誅但壽為惡隱密經年王法所不能捨鬼神訴千載無一請皆斬之以昭陰殺上許之出冥祥記漢時廣信縣或今之廣寧故云傍縣也高要縣乃肇慶府首縣附郭阿登時有會稽句章人至東野還暮不及門見路傍小屋然火因投宿止有一少女不欲與丈夫共室呼鄰人家女自伴夜共彈箜篌歌戲曰連綿葛上藤一緩復一絙汝欲知我姓姓陳名阿登將明悉無所見至東郭外有賣食母在肆中此人寄坐因說昨所見母聞阿登驚曰此是我女近亡葬於東郭出續搜神記晉河陰白馬寺曇邃法師嘗於夜中忽聞扣戶云欲請法師九旬說法邃不許固請乃赴之而猶是眠中比覺己身在白馬塢神祠中并一弟子自爾日日密往餘無知者後寺僧經祠前過見有兩高座邃在北弟子在南如有講說聲又聞有奇香之氣於是道俗共傳或云神異至夏竟神施以白馬一匹白羊五頭絹九十匹呪願畢於是各絶太山法相法師常山居精苦誦經太山祠有大石函貯財寶相時山行宿於廟側忽見一人玄衣武冠令相開函言訖不見其石函蓋重過千鈞相試提之飄然而起於是取其財以救貧民後居越城寺有神異不録右二出梁高僧傳陳國袁無忌寓居東平永嘉初得疫癘家百餘口死亡垂盡往避大宅權住田舍有一小屋兄弟共寢板牀薦席數重夜眠失曉牀出在戶外宿昔如此兄弟怪怖皆不眠後見一婦人來在戶前知忌等不眠前却戶外時未曙明月朗見之綵衣白裝頭上有范及銀叉象牙梳忌等便逐之初繞屋走四側頭髮及范之屬皆墮落忌悉拾之仍復出門南走臨道有井遂入井中忌還眠天曉視范及叉牙梳並是真物掘壞井得一楸棺三分井水所漬忌便易棺器衣服還其物於高燥處葬之遂斷出去怪集長安慧嵬禪師止長安大寺戒行澄潔多棲處山谷修禪定之業有一無頭鬼來嵬神色自若乃謂鬼曰汝無頭便無頭痛之患一何快哉鬼便隱形復作無腹鬼來但有手足嵬曰汝既無腹便無五藏之憂一何樂哉須臾復作異形嵬皆隨言遣之後久時天甚寒雪有一女子來求寄宿形貌端正衣服鮮明姿媚柔雅自稱天女以上人有德天遣我來以相慰喻廣談欲言勸動其意嵬執志貞崔一心無擾乃謂女曰吾心若死灰無以革囊見試女遂凌雲而逝顧謂歎曰海水可竭須彌可傾彼上人者秉志堅貞後以隆安三年與法顯俱遊西域廬山曇雍法師形長八尺雄武過人投廬山事遠為師內外經書多所綜涉志尚傳法不憚疲苦乃於山之西南別立茅宇與弟子曇果澄思禪門嘗於一時果夢見山神求授五戒果曰家師在此可往咨受後少時雍見一人著單夾衣風姿端雅從者三十許人請授五戒雍以果先受夢知是山神乃為說法授戒神䞋以外國匕筯禮拜辭別倐忽不見右二出梁高僧傳竺曇遂遂太元中年二十餘白晢端正流俗沙門嘗行青溪廟前過因入廟中看暮歸夢一婦人來語云君當來作我廟中神遂問婦人是誰婦人云我是青溪中姑一月許便病卒臨死謂同學年少我無福亦無大罪死乃當作青溪廟神諸君行便可見看之既死後諸年少既至便語相勞問音聲如昔時臨別云久不聞經唄思一聞之其伴慧覲便為作唄訖其猶唱讚語云岐路之訣尚有悽愴況此之乖形神分散窈冥之歎情何可言既而歔欷不自勝諸年少等皆為流涕出續搜神記始豐赤城山曇蘭禪師或云曇猷晉太元中遊剡止石城山後憩始豐赤城山見一處林泉清曠而居之有猛虎數十蹲在蘭前蘭誦經如故一虎獨睡蘭以如意扣虎頭訶曰何不聽經經于數日忽見一人長數丈呼蘭令去又見諸異形禽獸以恐蘭見蘭恬然自得乃屈膝而禮拜云法師威德既重來居此山弟子推此處以相奉珠欺王是家舅今往韋鄉山就之蘭曰貧道尋山願得相值何不共住神曰弟子無為不爾但部屬未狎法化卒難制御遠人來往或相侵觸人神道異是以去耳蘭曰本是何神居之久近欲移何處去耶神曰弟子夏帝之子居於此山二千餘年臨別執手贈蘭香三奩於是鳴鞞吹角陵雲而去爾後三年忽聞車騎隱隱從者彌峰俄而有人著幘稱珠欺王通既前從其妻子男女等二十三人並形貌端正有逾於世既至蘭所暄涼訖蘭問檀越住在何處答云安樂縣韋鄉山久服夙聞今與家纍仰投乞授歸戒蘭即授之受法竟䞋錢一萬蜜二器辭別而去便聞鳴笳動吹響振山谷蘭禪衆十餘共所聞見云云出梁高僧傳琅琊王凝之妻晉左將軍夫人謝氏𢍶之女也嘗頻亡二男悼惜過甚哭泣纍年若居至艱後忽見二兒俱還皆著鎖械慰勉其母宜自寬割兒並有罪若垂哀憐可為作福於是哀痛稍止而勤功德出冥祥記淮南胡茂回能見鬼雖不喜見而不可止後行至楊州還歷陽城東有神祠正值民將巫祝祀之至須臾頃有羣鬼相叱曰上官來各避走出祠去回顧見二沙門來入祠中諸鬼兩兩三三相抱持在祠邊草中望伺望沙門皆有怖懼須臾沙門去後諸鬼皆還祠中回於是信心遂精誠奉佛出續搜神記秦秦主姚萇者西戎羌也符堅之敗萇為宿將率其部屬反叛堅與之戰不利遂為萇縊殺之萇襲其位都雍關改長安為常安在御八年符堅領鬼兵白日入宮刺中其陰出血數斗而崩出通載高平李羡家奴健至石頭岡忽見一人云婦與人通情遂為所殺今欲報讎能見助否奴用其言果見人來鬼便捉頭喚奴與手即使到地其人半路便死鬼以一千錢及青絞緵袍一件與奴囑云此袍是市西門丁與許君可自著勿賣也出冥祥記宋河內司馬文宣頗信佛法元嘉九年丁母難弟喪月望旦忽見其弟身形於靈座上不異平日回遑歎嗟諷求飲食文乃試與言曰汝平生時修行十善若如經言應得生天若在人道何故乃生此鬼中耶沉吟俯仰默然無對文即夕夢見其弟云生所修善蒙報生天但靈牀之鬼是魔魅耳非吾身也恐兄疑怪故詣以白兄文宣明旦請僧轉首楞嚴三昧經令人撲繫之鬼乃逃入牀下又走戶外形稍醜惡舉家駭懼詈叱遣之鬼云餓乞食耳積日乃去頃之母靈牀頭有一鬼膚體赤色身甚長壯文宣長息孝祖與言往反答問周悉初雖恐懼末稍安習之鬼亦轉相附狎居處出入殆同家人於時京師傳相報告往來觀者門巷疊跡時南林寺有僧與靈味寺僧舍沙門與鬼言論亦甚欵曲鬼云昔世嘗為尊貴以犯衆惡受報未竟果此鬼身去寅年有四百部鬼大行疾癘所應鍾災者不忓道人耳而犯橫極衆多濫福善故使我來監察之也僧以食與之鬼曰我自有糧不得進此食也舍曰鬼多知我生何來何因作道人答曰人中來出家因緣本誓願也問諸存亡生死所趣略皆答對具有靈驗條次繁多故不曲載舍曰人鬼道殊汝既不求食何為久留鬼曰此間有一女子應在收捕而奉戒精勤故難可得比日稽留用此故也藉亂主人有愧不少自此已後不甚見形後往視者但聞語耳時元嘉十年也至三月二十八日語文宣云暫來寄住而汝傾家營福見畏如此那得久留孝祖云聽汝寄住何故據人先亡靈筵耶答曰汝家亡者各有所屬此座空設故權寄耳於是辭去天啓三年贊年十三順德縣馬岡村有梁念賓與弟及壻同居陽江城內丁屋巷俱為水師兵時福建賊船數百臨陽江港口起五縣兵艦征之失律被殺并溺水者數千人次日班師而失賓等其妻即請道士持幡竿出城臨河招魂妻執幡竿云甚重道士曰首七當歸回殺賓女篩灰于靈几下以席密圍驗其虛實次早黎明余往觀之見灰盡是山羊足迹道士云打落畜道矣次年賓等三人從福建沿路乞食而歸以是驗知鬼多欺諂詐現種種形變以求飲食然人既死神入六道生天者則有自然衣食聞人間五穀雜食穢氣上薰四十萬里生人畜者入胎則形神相隔那得還歸惟鬼一道可以往來而有管攝者不得自由縱受生未定其中陰身惟以香資身不食段食而亦不知所趣向處惟業緣報定方往受生處而託胎也今時世俗設靈位多是求食之鬼詐作親形或是隨道士巫覡覓食之魑魎致令妻子親屬或喜或怖妄生憂苦也長安王胡者叔死數載元嘉二十三年忽現形還家責胡以修謹有闕家事不理罰胡五杖傍人與鄰里並聞其語及杖聲又見杖瘢迹而不覩其形惟胡猶得親接叔謂胡曰吾不應死神道須吾算諸鬼録今大從吏兵恐驚損墟里故不將進耳胡亦大見衆鬼紛鬧若村外俄然叔辭去曰吾來年七月七日當復暫還欲將汝行遊歷幽途使知罪福之報也不須費設若意不已止可茶來耳至期果還語胡家人云吾今將胡遊觀畢當使還不足憂也胡即頓臥牀上泯然如盡叔於是將胡遍觀羣山備覩鬼怪末至嵩高山諸鬼遇胡並有饌設餘俗味不異世中惟薑甚脆美胡欲壞將還左右人笑胡云止可此食不得將還也胡末見一處屋宇華曠帳筵精整有二少僧居焉胡造之二僧為設雜果檳榔等胡遊歷久之備見罪福苦樂之報乃辭歸叔謂胡曰汝既已知善之可修宜當在家白足阿練戒行精高可師事也胡既奉此諫往其寺中遂見嵩山上年少僧者遊學衆中胡大驚與叔乖濶問何時來二僧答云貧道本住此寺往日不憶與君相識胡復說嵩高之遇二僧云君謬耳豈有此耶至明日二僧無何而去胡乃具告諸沙門敘說往日嵩山所見衆咸驚怪即追求二僧不知所在乃悟其神僧焉元嘉末有長安僧曇爽來遊江南具說如此也沙門曇始跣行泥水不汙足色踰白故時人謂白足阿練也甚為魏虜所敬滎陽尚書僕射鄭鮮之元嘉四年從大駕巡京至都夕暴亡乃倚靈几語家人曰吾壽命久盡早應過世賴比歲來敬信佛法放生布施以此功德延駐數年耳夫幽顯報應有若影響宜放落俗務崇心大教於時勝貴多皆聞之右三出冥報記京師瓦官寺慧果法師婺州人宋初遊京師止瓦官寺嘗於廁前見一鬼致敬於果云昔為衆僧作維那小不如法墮在噉糞鬼中法師德素高明又慈悲為意願助以拔濟之方昔有錢三千文埋在柿樹根下願取以為福果即告衆掘取果得錢三千文為造法華經一部并設齊供後夢見此鬼云已得改生大勝昔日也出梁高僧傳王文明宋泰始末作江安令妻久病女於外為母作粥將熟變而為血棄之更作亦復如初如此者再三母尋亡沒其後兒女在靈前哭忽見其母臥靈牀上貌若平生諸兒號感奄然而滅文明先愛其妻手下婢妊身將産葬其妻日使婢守屋餘人悉詣墓所部伍始發妻便現形入戶打婢其後諸女為父辦食殺雞刳洗已竟雞忽跳起軒首長鳴文明尋卒諸男相繼喪亡出述異記東海何淡之宋大司農不信經法多行殘害永初中得病見一鬼形甚長壯牛頭人身手執鐵叉晝夜守之憂怖屏營使道家作章符印籙備諸禳絶而猶見如故相識沙門慧義聞其病往候淡之為說所見慧曰此是牛頭阿旁也罪福不昧唯人所招君能轉心向法則此鬼自消淡之迷狠不革頃之遂死出冥祥記張乙泰始中被鞭瘡痛人教燒死人鬼末以傅之雇同房小兒登岡取一髑髏燒以傅瘡其夜戶內有爐火燒此小兒手又空中有物按小兒頭內火中罵曰汝何以燒我頭今以此火償汝小兒大喚曰張乙燒爾答曰汝不取與張乙張乙那得燒之按頭良久髮然都盡皮肉焦爛然後捨之乙大怖送所餘骨埋反故處酒肉醊之無復灾異也出述異記問人死魂入六道那得守此枯骨答此已墮鬼道無人祭祀復無所依託故守枯骨而瞋豈能燒鬼耶襄城李者其父為人不信妖邪有一宅由來凶不可居居者輒死父便買居之多年安吉子孫昌盛為二千石當徙家之官臨去請會內外親戚酒食將行父乃言曰天下竟有吉凶否此宅由來言凶自吾居之多年安吉乃得遷官鬼為何在自今已後便為吉宅居者住止心無所嫌也語訖如廁須臾見壁中有一物如卷席大高五尺許正白便還取刀斫之中斷便化為兩人復橫斫之又成四人便奪取刀反斫李殺持至座上斫殺其子弟凡姓李必死惟異姓無他尚幼在抱家內知變乳母抱出後門藏他家止其一身獲免字景真位至湘東太守出續搜神記齊會稽弘明法師永明中止雲門寺誦法華經禮懺為業每旦水瓶自滿實諸天童子為給使也又感虎來入室伏牀前久之乃去又見小兒來聽經云昔是此寺沙彌為盜僧廚食今墮廁中聞上人讀經故力來聽願助方便冀免斯纍明為說法領解方隱後山精來撓惱明乃捉取以腰繩繫之鬼謝遂放因之永絶出梁高僧傳靈苑曇超禪師建元末居錢塘靈苑山一夕忽聞風雷之聲見一人執笏而進稱嚴鎮陳通須臾有一人至形甚端正羽衛連翩下席禮敬自稱弟子居在七里任周此地承禪師至蒙師留蒼生之福然富陽民無故鑿麓山下為磚斷壞龍室羣龍共忿誓三百日不雨今已一百日餘田種永罷師既道德通神屈師往龍處潤澤蒼生超曰興雲降雨此檀越力吾何能哉神曰弟子部曲止能興雲不能降雨是故相請耳超諾之超乃南行五里至赤庭山遙為龍呪願說法至夜羣龍作人來禮超乞受三歸晡時俄而大雨即往臨泉寺臨縣令聞辦舟迎超超即日遁還靈苑出梁高僧傳并通戴楊州白塔寺沙門道昶掌知僧物自在侵用忽有冥官數人白日入房曳昶下地欲斷其頸昶驚叫乞命官厲聲言合房資財並送還僧當放汝活昶叩頭言不敢違命即鳴鐘集衆盡捨衣服造像設齊冥官三日復至見昶一鉢一衲不言而去昶自是勉勵進修卒成明行琅琊攝山法度法師宋末遊於京師齊郡高士名僧紹抗迹人外隱居攝山挹度待以師友之禮及亡捨所居為棲霞寺請度居之先有道士欲以寺地為館住者輒死及後為寺猶多恐動自度居之羣妖皆息經歲許間忽有人馬鼓角之聲俄見一人持紙名通曰靳尚形甚都雅羽衛亦嚴致敬度已乃言弟子主有此山七百餘年神道有法物不能干前諸棲託或非真正故死病相繼亦其命也法師道德所歸謹捨以奉給并願受五戒永結來緣度曰人神道殊無容相屈且檀越血食祭祀此最五戒所禁尚曰若備門徒輒先去殺於是辭去明旦度見一人送錢一萬香燭刀子疏云弟子靳尚奉供至月十五日度為設會尚又來同衆禮拜行道受戒而去攝山廟巫夢神告曰吾已受戒于度法師祠祀勿得殺戮由是廟同薦止菜脯而已度嘗動散寢於地見尚從外來以手摩頭足而去頃之復來持一琉璃瓶瓶中如水以奉度味甘而冷其徵感若此齊竟陵王子良始安王等並遙恭以師敬資給四事六時無闕也右二出梁高僧傳南陽宋定伯年少時夜行逢鬼問曰誰鬼尋復問之卿復誰定伯誑言我是鬼鬼問欲至何所答曰欲至宛市鬼言我亦欲至宛市遂行數里鬼言步行太遲可共遞相擔也定伯曰大善鬼便先擔定伯數里鬼言卿太重將非鬼耶定伯言我新死故身重耳伯因後擔鬼鬼略無重如是再三定伯復言我新死不知鬼皆何所畏忌鬼言惟不喜人唾於是共行道遇水定伯令鬼先度聽之了無聲音定伯自度漕漼作聲鬼言何以聲定伯曰新死不習度水故爾勿怪吾也行欲至宛市定伯便擔鬼著頭上急持之鬼大呼聲咋咋然索下不復聽之徑至宛市中下著地化為一羊便賣之恐其變化即連唾之得錢千五百而去于時石崇言定伯賣鬼得千五百文出列異傳石崇晉時人魏汾州玄中寺釋曇鸞家近五臺山神迹靈異後往江南陶隱居處求覓仙方陶欣然授以仙方十卷還至浙江有鮑郎子神者一鼓湧浪七日方止正值波初無由得度鸞便往廟所以情祈告必如所請當為起廟須臾神即現形狀如二十歲告鸞曰若欲度者明旦當得願不食言及至明晨濤猶鼓怒才入船裏恬然安靜依斯達到梁帝見重因出敕為江神更起靈廟後辭帝還魏境行至洛中逢中天竺國三藏菩提流支鸞往啓曰佛法頗有長生不死法勝此土仙經者乎支唾地曰是何言歟非相比也此方何處有長生不死法縱得長年少時不死終輪三有即以觀經授之曰此大仙方依之修行當得解脫生死永絶輪回後移住汾州北山石壁玄中寺一心依經作淨土業臨終日幡華幢蓋高映院宇香氣蓬㶿寺衆並同矚之以魏興和四年卒出梁高僧傳周河南王彥偉為性凶惡好遊獵父母孤養憐愛極重每諫不許共惡人交遊不聽射獵恐損身命不存係嗣偉不從父訓常獵不止兼逐惡人父母既見不止凶行罰杖五十身瘡不得出門以恨父母伺夜眠之後密以土袋壓父母口加身坐上望氣不出意令其死無其瘡瘢將為卒亡不疑我作忽見鬼來入堂震動家內大小並覺翻偉牀前偉便仰臥土袋已在偉腹父母蘇覺遂挽兒腹上土袋不能去身偉復見鬼壓土袋上極困垂死唱叫救命合家大小及以鄰人併力挽之必竟不移偉聲不出但得以手叩頭合掌而卒見李歸心録唐趙郡眭仁蒨邯鄲人也少事經學不信鬼神常欲試其有無就見死人學之十餘年不能得見後徙家向縣於路見一人如天官衣冠甚暐曄乘好馬從五千餘騎視仁蒨而不言後數見之常如此經十年凡數十相見後忽駐馬呼仁蒨曰比頻見君情相眷慕願與君交遊蒨即拜之問云公何人耶答曰吾是鬼耳姓成名景本弘農西晉時為別駕今任胡國長史仁蒨問其國何在王何姓名答曰黃河已北總為臨胡國國都在樓煩西北沙磧是也其王即故趙武靈王今統此國總受太山控攝每月各使上相朝於太山是以數來過此與君相遇也吾乃能有相益令君預知禍難而先避之可免橫害惟死生之命與大禍福之報不能移動耳仁蒨從之景因命其從騎常掌事以是贈之遣隨蒨行有事令先報知即汝所不知當來告我於是便別掌事恆隨逐如侍從者頃有所問無不先知時大業初陵岑之象為邯鄲令子文本年未弱冠之象請仁蒨於家教文本書蒨以此事告文本仍謂曰成長史語我有一事羞君不得道既與君交亦不能不告君鬼神道亦有食然不能得飽常苦饑渴若得人食便得一年飽衆鬼多偷竊人食我既貴重不能偷之從君請一餐蒨既告文本文本即為具饌備設珍饈蒨曰鬼不欲入人屋可於外水邊張幕設席陳酒食於上文本如其言至時仁蒨見景兩客來坐從百餘騎既坐文本向席再拜謝以食之不精蒨傳景意辭謝初文本將設食仁蒨請有金帛以贈之文本問是何等物蒨云鬼所用物皆與人異惟黃金及絹為得通用然亦不如假者以黃色塗大錫作金以紙為絹帛最為貴上文本如言作之及景食畢令其從騎更代坐食文本以所作金錢絹贈之景深喜謝曰因眭生煩郎君供給郎君頗欲知壽命乎文本辭云不願知也景笑而去數年後仁蒨遇病不甚困篤而又不起月餘日蒨問掌事掌事不知便問長史長史報云國內不知後月因朝太山為問消息相報至後月長史來報云是君鄉人趙某為太山主簿主簿一員闕薦君為此官故為文案經紀召君耳案成者當死蒨問請將案出景云君壽應年六十餘今始四十但以趙主簿橫徵召耳當為請之乃曰趙主簿相問眭兄昔與同學恩情深至今幸得為泰山主簿適遇一員官闕明府今擇人吾已啓府君府君許相用兄既不得長生命當有死死遇濟會未必當官何惜一二十年苟生延時耶今文書已出不可復止願決作來意無所疑也蒨憂懼病逾篤景謂蒨曰趙主簿必欲致君君可自往太山於府陳訴則可以免蒨問何因見府君景曰鬼者可得見耳往太山廟東度一小嶺平地是其都所君往自當見之蒨以告文本文本為具行裝數日景又告蒨曰文書欲成君訴懼不可免急作一佛像彼文書自銷蒨告文本以三千錢為畫一座像於寺西壁訖而景來告曰免矣蒨情不信佛意尚疑之因問景云佛法說有三世因果此為虗實答曰皆實也蒨曰即如是人死當分入六道那得盡為鬼而趙武靈王及君今尚為鬼耶景曰君縣內幾戶蒨曰萬餘戶又曰獄囚幾人蒨曰常二十人已下又曰萬戶之內有五品官幾人蒨曰無又曰九品已上官幾人蒨曰數十人景曰六道之義分一如此耳其得天道萬無一人如君縣內無一五品官得人道者萬有數人如君縣內九品數十人入地獄者萬亦數十人如君獄內囚惟鬼及畜生最為多也如君縣內課役戶就此道中又有等級因指其從者曰彼人大不如我其不及彼者猶多蒨曰鬼有死乎答曰然蒨曰死入何道答曰不知如人知生而不知死後之事蒨曰道家章醮為有益否景曰天帝總統六道是謂天曹閻羅王者如人間天子太山府君如尚書令録五道神如諸尚書若我輩國如大州郡每斷人間事道家上章為人請福如求神之恩天曹受之敕下閻羅王云以某月日得某甲訴云云宜盡理勿令枉濫閻羅敬受而奉行之如人奉詔也無理不可求免有枉必當得申何為益也蒨問佛家修福何如景曰佛是大聖無文書行下其修福者天神敬奉多得寬宥若福厚者雖有惡道文字不得追攝此非吾所識亦莫知其所以然言畢即去蒨一二日能起便愈文本父卒還鄉里蒨寄書曰鬼神定是貪諂往日欲郎君飲食乃爾殷勤比知無復利相見殊落漠然常掌事猶現隨本縣為賊所陷死亡略盡僕為掌事所導常遇賊不見竟以獲全貞觀十六年九月八日文官賜射於玄武門文本時為中書侍郎與家兄太府卿并治書侍御史馬周給事中韋昆及臨對坐文本自語人云爾出冥報記按後地獄道人雖多何如鬼畜鬼人不見而畜則水陸空行胎卵溼化微細昆蟲遍界皆是故云最多也濩澤縣武德六年李録事死經七日隱身謂妻曰計吾猶有六年在世但為司命枉來取我我已訴閻王蒙放在人間浮遊六年今在鬼道又曰人命無常何不修福可往玄鑒法師所聽法遂與妻共入講堂與人言議有問曰何不現形答曰鬼趣受身極陋自不忍見況復他人又往景業寺聽餘法師講維摩經餘曰今講此經感何人聽答曰自人頭已上便是鬼神上及諸天重級充滿然見諸天聞法師酒氣皆回面而聽非惟此會獨感諸天但有法事無不來降餘聞即悔過遂不復飲出續高僧傳餘雖犯酒而具正見慧解無謬故感天龍鬼神共聽所謂破戒不破見聞即悔過非智莫能倘說不合經旨即有謗法之罪鬼神得而訶之奚感天聽耶武帝穆宗之子廢釋教服金丹受符籙丹發背燥悶失常旬日不能言而崩年三十四在位六年報應傳曰正月十五日有人夜行至穆宗陵下忽聞人語謂是盜馬逐泊衰叢之內俄而空有朱衣執版宣曰冢尉何在有二吏出應曰在矣朱衣曰録海西君使者至也未吏曰計程十八日方至朱衣曰何稽吏曰李炎坐毀佛教奪壽去位當與海西君同録其魂而至時有賈客鈴聲東來朱衣二吏忽不見數日後武帝果崩出通載宰相李炎字德裕佐武帝毀教後貶崖州司戶惡疾而卒詳見統紀并太平廣録洛州龍朔元年景福寺比丘尼修行房中有侍女任五娘死後修行為五娘立靈經月餘日其姊及弟於夜中忽聞靈座上呻吟其弟初甚恐懼後乃問之答曰我生時於寺上食肉坐此大苦痛我體上有瘡恐汙牀席汝可多將灰置牀上也弟依其言置灰後看牀上大有膿血又語弟曰姊患不能縫衣汝大藍縷宜將布來我為汝作衫及襪弟置布於靈牀上經宿即成又語其姊曰我小時染患遂殺一螃蟹取汁塗瘡得差今入刀林地獄肉中現有折刀七枚願姊慈流為作功德救助知姊煎逼交不濟辦但隨身衣服無益死者今並未壞請以用之姊未報間乃曰我自取去良久又曰衣服已來現在牀上其姊試往觀之乃其殮之服也遂送淨土寺寶獻師處憑寫金剛般若經每寫一卷了即報云已出一刀寫完七卷了乃云七刀並得出訖今蒙福助即往託生與姊及弟哭別而去吳興沈玄法說淨土寺僧智整所說亦同出冥報拾遺梁望蔡令殺牛飲啖臥佛堂上感白癩病死唐宣宗敕州郡國忌行香不得携酒肉入寺宋太宗詔國忌宰相已下寺觀行香禁絶腥酒出統紀世俗命終不知為亡者作福猶盛為殯殮陰陽既分存亡體異故云無益死者寧知為彼追福衣食自備乃至出生人天如冥祥記云宋江陵龍華寺僧妙既亡之後一夕歸房靈几語弟子可宗宗問和上今生何處妙曰粗可耳但應受小謫二年得免欲訴所司為無袈裟可急為製請僧設供以衣施之我即得也宗如教飯僧䞋衣既畢比丘道猛即見妙身披衣入堂依僧次坐聽經至散乃不復見斯則施衣得衣報施食得食報信不誣矣志磐法師曰律明亡人三衣惟許施僧共分未聞佛令披於亡軀而從火焚也末代無知多行非法有識之士尚須辨明若坐逝不壞結塔以葬者猶可以披於真體若從茶毗火化之法者則不當披搭自取燒衣違律之過或謂亡僧無衣者則當依冥祥記為之磐自聞此過姪真視真誥真亢不幸早亡焚龕之日皆不披袈裟惟用布偏衫裙而已設齊之前以平時所服七條作拈鬮法於僧中施且復囑後人當力行於自身必壞之際也敢告知識共崇此法梵語袈裟華言壞色衣下屬五大色也非應赴所著五彩者今有不諳律教掛亡衣樹上深為不法也鬮音鳩拈鬮取也姚明解本是普光寺沙門也性聰敏有文藻工書翰善丹青至於鼓琴亦當時獨絶每欣俗網不樂道門至龍朔元年舉應詔赴洛陽及升第歸俗頗有餘言未幾而卒後託夢於相知淨土寺僧智整曰明解宿無福業不遵內教今受大罪非常饑乏儻有故人之情頗能惠一餐否智整夢中許諾及其寤後乃為設食至夜才眠即見明解來愧謝之云云博陵崔軏乃王之弘壻也之弘貞觀年中為沁州和川縣令與女適軏軏於和川會病而卒卒經數十日其家忽於夜中聞軏語聲初時傾家驚恐其後乃以為常聞語云軏是女壻雖不合於妻家立靈然以苦無所依但為置立也妻從其請朝夕置食不許置肉惟令下其素食恆勸禮佛不聽懈怠又具說地獄中事云人一生恆不免殺生及不孝自餘之罪蓋亦小耳又云軏雖無罪然大資福助為軏數設齊供并寫法華金剛般若觀音等經各三兩部兼舊功德如獲羅漢自茲以後即不復來王家一依其言寫經設供軏忽更來愧謝因云今即取別舉家哭而送之軏有遺腹之子已年四五歲云軏此子必有仕宦願善養畜自此已後不復更來見王之弘自說右二出冥報記京兆殷安仁家富素事慈門寺僧以義寧元年初有客寄其家停止客盜他驢於家殺之驢皮遺安仁家至貞觀三年安仁遂見一人於路謂安仁曰追汝使明日至汝當死也安仁懼徑至慈門寺坐佛殿下經宿不出明日果有三騎并步卒數十人皆兵仗入寺遙見安仁呼出安仁不應而念誦逾進鬼相謂曰昨日不即取今日修福如此何由可得因相與去留一人守之守者謂安仁曰君往日殺驢驢今訴君使我等來攝君耳然須共對不去何益安仁遙答曰往者他盜自殺驢但以皮與我耳本非我殺何以見追倩君還為我語驢我不殺汝然今又為汝追福於汝有利當捨我也此人許諾曰驢若不許我明日更來如其許者不來矣言畢而出明日遂不來安仁於是為驢追福而舉家持戒菜食云爾盧文勵說之安仁今現在出冥報拾遺嵩嶽間居寺元圭禪師卜廬于嶽中龐塢時有峩冠袴褶部曲繁多輕步舒徐稱謁大師圭覩其貌偉精爽不倫謂之曰善來仁者胡為而至曰師寧識我耶圭曰吾觀佛與衆生等吾一目之豈分別識也對曰我此嶽神也吾能利害生死於人師安得一目我哉圭曰汝能生死于人吾本不生汝焉能死吾視身與空等視吾與汝等汝能壞空與汝乎苟能壞空及壞汝吾則不生不滅汝尚不能如是叉焉能生死吾耶嶽神稽首再拜曰我亦聰明正直於餘神豈能如師有廣大之智辨乎願授之正戒令我度世助其威福圭曰神既乞戒即既戒也所以者何戒外無戒又何戒哉神曰此理也我聞茫昧止求師戒我身為門弟子圭辭不獲即為張座焚香秉爐正機曰付汝五戒汝能奉持即嚮曰能不能即曰否神曰洗耳傾聽虗心納教圭曰汝能不淫乎神曰亦娶也曰非謂此也謂無羅欲也神曰能曰汝能不盜乎神曰何乏我也焉有盜取哉曰非謂此也謂饗而福淫不供而禍善也神曰能曰汝能不殺乎神曰政柄在躬焉曰不殺曰非謂此也謂有濫誤混疑也神曰能曰汝能不妄乎神曰我本正直焉得有妄曰非謂此也謂先後不合天心也神曰能曰汝能不遭酒敗乎神曰力能圭曰如上是為佛戒也又言以有心奉持而無心拘執以有心為物而無心想身能如是則先天地生不為精後天地死不為老終日變化而不為動畢盡寂默而不為休悟此則雖娶非妻也雖饗非取也雖柄非權也雖醉非惛也若能無心於萬物則羅欲不為淫福淫禍善不為盜濫誤混疑不為殺先後違天不為妄惛荒顛倒不為醉是謂無心也無心則無戒無戒則無心無佛無衆生無汝及無我無我無汝孰能戒哉神曰我神通亞佛圭曰汝神通十句五能五不能佛則十句七能三不能神悚然避席啓跪頗恭曰可得聞乎曰汝能㑦上帝東天行而西七曜乎曰不能圭曰汝能奪地祇融五嶽而結四海乎曰不能圭曰是為五不能也圭曰佛能空一切相成萬法智而不能即滅定業佛能知羣有性窮億劫事而不能化導無緣佛能度無量有情而不能盡衆生界是為三不能也定業亦不牢久無緣亦謂一期衆生界本無增減廓無一人能主有法有法無主是謂無法無法無主是謂無心如我解佛亦無神通也但能以無心通達一切法耳作用冥現有情前也若有心有作作用必不普周焉嶽神曰我誠淺昧未聞空義師今授我戒我當奉行更何業因可拘塵界我願報慈德效我所能圭曰吾觀身無物觀法無常了然更有何欲神曰師必命我為世間事展我少小神功使已發心初發心未發心不信心必信心五等人目我神縱知有佛有神有能有不能有自然有非自然者圭曰無為是無為是神曰佛亦使神護法師寧隳叛佛耶隨意垂誨圭不得已而言曰東巖寺之障也莽然無樹北岫有之而背非屏擁汝能移北樹於東嶺乎神曰已聞命矣又陳曰我必昏夜風雷擺搖震運願師無駭即鄭重作禮辭去圭門送而且觀之見儀衛逶迤如王者之行狀又復碧靄紅霞紫嵐皓氣間錯四散幢蓋環珮戈戟森森凌高𥧲空杳渺隱沒焉其夕果有暴風吼雷奔雲霆電隆棟壯宇岌礘將圮定僧瞻動宿鳥聲狂互相敲磕物不安所圭謂衆僧曰無怖無怖神與我契矣詰旦和霽則北巖松柏盡移東嶺森然行植焉而圭謂其徒曰吾歿後無令外知若為口實人將妖我也出宋高僧傳高僧傳中天帝閻王及神請說法受戒甚多此不繁録明高祖帝曰有來奏者野有暮持火者數百候之倐然而滅聞井有汲者驗之無迹俄而呻吟於風雨間日悲號于星月有時似人白晝誠有應人而投石忽現忽隱現之則一體如人隱之則寂然杳然或祟人以禍或佑人以福斯數狀昭昭然皆云鬼神而已臣不敢匿謹拜手以奏時傍人乃曰是妄誕耳朕謂傍曰爾何知其然哉對曰人稟天地之氣而生故人形于世少而壯壯而老老而死當死之際魂升于天魄降于地夫魂者氣也既達高穹逐清風而四散且魄骨肉毫髮者也既仆于地化土而成泥觀斯魂魄何鬼之有哉所以仲尼不言者為此也帝曰爾所言者將及性理而未為是乃知膚耳其鬼神之事未嘗無甚顯而甚寂所以古之哲王立祀典者以其有之而如是其於顯寂之道必有為而為且前所奏者其狀若干卿云無鬼神將無畏于天地不祭食于祖宗是何人哉今鬼忽顯忽寂所在其人見之非福即禍將不遠矣其于千態萬狀呻吟悲號可不信有之哉出皇明録徽州歙縣羅田方伯雨先生族弟婦孕未産而死遂殯葬之里中有賣點心店日見一女子將錢買餅去後時持一新被來按店人搭被架上其家有婢偶至店見被云此是我家孺人殯殮之被何得在此店人云有一女子每日持錢來買點心今彼無錢將此被按復說其形貌服色婢歸告主次日遣人往店後伺之果見彼來取點心去隨後㫐窺彼至墓邊即滅聞冢中兒啼回報其主主使人開冢母顏如生既抱兒出母色即變矣其店始覺前時見匱日有少紙灰兒後長成族皆喚為鬼叔崇禎末年其人尚在但日久忘其名伯雨先生孫叔翼為余說之福田經云有一比丘名曰須陀耶白佛言母妊我數月得病命終埋母冢中月滿乃生冢中七年飲死母乳用自濟活微福值佛逮得應真如此則耳目不到古今信非一也應真即羅漢也伯雨諱時化杭州太守乃十四名家之一有四書易注行世歸信三寶臨終沐浴衣冠孫謂其升堂遣人伐鼓遂端坐而逝廣州新會縣潮頭村有一人姓張者年將五十獨往鄰鄉回至中途度水被水鬼牽挽欲溺水中其人雄勇與之共打得脫回家頸項上盡是鬼甲𭺗傷痕時天啓七年贊年方十七在彼村親見廣信博山能仁寺崇禎間無異和尚已往時有檀越至山請僧施食令一沙彌事香燭被鬼執縛於臺下口鼻涎沫俱出空中有一人云此沙彌不清潔衆鬼欲縛至桅竿下我乃勸止然汝等向來施食皆不至誠諸鬼俱不得食空回又汝等每在彌勒閣學𦦨口經呪或赤體或尸臥念誦真言不如法折福獲罪云云僧問曰汝是何人答曰我是某長老今住在西禪堂後為守護此叢林故也次晚一僧自發誠心施食空中復曰今晚鬼衆略得小食也博山僧說之也據此施食則必戒德精嚴真言梵音契印無乖一心至誠念餓鬼苦或能少益幽途不然虗費信施自獲大愆損福折壽不少況諸餓鬼長劫不聞水漿之名出家釋子寧無悲心愍念彼苦每日猶當自備水飯誦施食真言甘露水真言以除彼饑渴惟須真言呪語梵音無謬乃獲其益故佛教令天雨時向空念甘露水真言令諸餓鬼得餐甘露以濟饑渴自增福壽也廣州東莞縣西湖張一鵬崇禎末年自廣城回至流花渡頭已將暮水濵見一人似富家長者曰君渡河尚十餘里不及家矣吾有一小館不棄可過宿主人設酒饌食畢具鋪蓋甚殷勤睡中聞鄰家鐘鼓聲若祭奠者至天明見在空房內惟一草薦枕者是磚驚起却在人家中家人見在內出羣譁之以其是賊聚鄰里詰其故鵬乃說有主人水邊招留宿衆問其所招宿者何狀乃其所祭之父是日生晨子享以孝誠故感先人來應也一鵬是橋族叔對橋說之此墮鬼趣無管攝者乃得回家也東莞縣有東湖西湖非浙之西湖也清東莞寮步村康熙戊申三月有鬼仙自稱錢公子時能現形在鄺孝康公錫家夜間常與姬人七八絃管歌唱而能詩文人皆就之錫每設食同歡恣錫拊摩遍身羅綺并新絨靴惟不許摩頭及然燈燭耳或時嫌主人設食不精即喚使者另取須臾熱肴暖酒忽至共為樂飲時錫內人忽病錫啓公子曰寧有方術耶公子即撮藥命使者當前煎好送服之時張穆芝聞知六月初一日至鄺家欲延公子與語佛道令其知有向上大事值公子他遊尚留使者在鄺家穆即作書焚致之并寄香荔使者報曰公子遠去若他人書不能為投張先生不敢不為奔走也越二十日穆時在莞城外東湖如菴與諸子偕破浪用微二三上人清話一友人見案上有一緘未啓問曰是何人書穆亦不知何人何時送至發而讀之乃公子復書而柬封絶佳箋皆浮花甚奇另封香七炷似有奇香薰襲芳馥如宮餅其文清新書法頗奇非俗筆之所能也書曰承遠致奇香丹荔謝謝先生蓋世才也道不逢時寄迹於山林泉石之間能人之所不能者捨人之所不能捨其去仙一間耳余浪迹蓬山玉洞輒聞芳名嘖嘖天外矣茲承先生援我入于禪關我亦欲援先生入于仙苑方遊海嶽未及南來紫虗碧落接晤有期并致高友不宣另一箋曰先生至誠故不惜破格修復閲竟祈即火之勿泄勿戲不然是求親而反疏不獨余之過也時穆與諸子讀訖即焚之忌其使者在傍以報公子謂穆之不誠也遂與諸子共記録之廣州省城濠畔街金衢會館康熙九年五月十三日盛陳品物奉賀關帝壽畢衆共飲食有醫士張妙忽見一人執手掣去行步如風足不著地至一處宮殿甚壯麗旁有小廟引入見關帝緑袍青巾張即拜跪帝曰吾生日在七月非五月也世間不宜殺生所殺猪羊若非純白黑者吾則不能為之超生今皆養在山中已後不必殺也當引此人至山頂可望天下各省吏引至頂指曰此廣東省城也張便見其家吏一推遂醒張向郭青霞說之右三出鐵橋集凡有威德之神自有勝妙飲食若天甘露者豈希世間羶腥耶隋文帝十二年天台智者大師至玉泉山安禪見二人威儀如王長者美髯同少者致敬曰弟子關羽當與子平建寺化供願師安禪七日以須其成乃役神兵建之七日出定湫潭千丈化為平址棟宇煥麗巧奪人目師領徒入居晝夜演法一日神聞妙法白師曰願洗心易念求戒永為菩提之本師即為受五戒於是神之威德昭布千里故為護僧伽藍神寧受葷酒今世俗皆知食葷酒著皮底履悉不能登武當山而民間俱以猪羊三牲祀武帝何自相矛盾一至如此乎大師身歷九朝為七帝之師梵語僧伽藍華言衆園謂衆僧所住之園即寺院也順德龍山鄉螺岡右煙還莊林孫霽字霞凝太史公之長孫也宅右有書樓樓右小池池上軒曰菡萏榭其砌曰芳洲竹木花果森然凝偕談璨叔讀書開社其間有康孫蒙鄧胡諸子師事璨叔於康熙癸丑五月夕屢于樓下右房窗外沙石從空而下社人異之自六月初七日至二十一夜怪異頻作璨怒罵而不止凝語璨曰此誠鬼也吾二人肅誠祀之告以襟影如吾輩不德降殃奚辭不然余何悔也是夕具牲酒告之土神復從奠之曰吾之居清淨安舒吾之友敬而且久吾之隱衷可白蒼穹祖孫父子二十年相從卜宅於此無悸無忡胡為而來亂我文席豈余不德倘汝冤抑男耶女耶毋惑朝夕苟汝頑冥明神是殛祭畢凝猶獨坐期有所見五鼓月明如晝循步廊下突見一手箱開之箱上則一展金扇扇上有女冠扇下有女履皆市中紙作店賣者另一酒盞覆箱角揭視即適間祭肉皮刻一去字箱是胡子物能啓堅鎖而置之二十四夜仍有種種怪異二十五晚復飛沙下凝奮罵曰誰是汝冤即可詳言何得漫為觸惱耶未幾座傍得一木葉雕刻工巧作桃葉形葉紋陰陽凹凸枝蔓具全長寸八分闊七分上飾以胭脂題云古人誤我今圖報月下諸君勿怪愆凝與璨視之曰果冤乎古月疑是胡子事凝曰今授汝紙筆詳以告我將禮普陀度汝二十七夜于胡豫窗前得七律一五絶一詞一律云諸君命妾闡幽思古情題起不勝悲月底佳人應有恨風簷學士勿多疑萬種愁懷茲欲報十年冤債此支持行行我亦尋踪跡任走天涯我亦知絶云狂風御柳時金井自傷悲若憐君命短教妾早歸依詞曰種種愁腸欲泄只待時乖命劣諸君何必枉勞思各自門前掃雪凝遂與璨相議作佛事超度之曰汝若歸依佛法可無姓名乎憐君是指胡子少頃于窗前得一詩云非青非白又非紅妾長深閨宅向東君謂始王嬴亥子何必多疑在箇中凝略解其意復求其直書姓名以登法事牒中未幾得一札云妾言已盡何必瑣瑣雖有乳名言之哽咽何多贅乎次日凝三家叔載說慕其異來觀璨叔胡子及凝四人求其顯示而胡子猶強辨亥子之說凝怒而言曰亥子何人即林即談其亦言之莫隱何諱也未幾于疏稿下得一札一詩文多不録四鼓聞擊聲持燈覓之於胡子牀頭得一詩一札云茲蒙諸君超妾可做衣三百六十錢三十斤廣濟衆幽魂是為妾作一盂蘭會則感德不淺何必區區求姓名乎妾原無罪不久出人不超亦可作此疏牒不可為妾而設只泛作超幽盂蘭疏牒可耳不然則妾無因而受君惠地府云一文必報之謂句雖君不靳如其妾之披毛戴角還不益增一劫罪哉非愛妾也適滋妾罪耳何也以諸君非我對頭不敢妄受也惟泛作超幽兼以妄列幽魂中可也若是對頭則雖七日夜建醮超幽亦可受之亥子非二位相公何必盛怒載說與璨曰事既白矣有才如此不識能贈我輩一詩否未逾時即得一詩于右房外榻間題云贈林三老爺詩載存而和之次朝得札於硯底云請去冤抑二字并疏中所干妾語乞為𠜂改之二十九延三上人至卜初一日作法事是夜諸友過坐齊中觀設佛事聞樓上聲響得二律一題云贈談林二相公同館有感一題云五月過訪煙還莊旅于芳洲池舍有感時孫康二子囑之曰吾輩同館多時每覩異跡獨不能邀一佳章耶囑未幾即得詩于孫子房壁間題云與孫康二國士同旅于芳洲池舍寄懷越朝七月初一日預啓盂蘭法事黎黃溫蒙及凝家叔舍弟七人居士輩在上行禮璨稽首秉爐誠篤傍晚璨代胡子懇祝遠近環觀者不啻百十人矣忽有二詩從空飄下一云贈溫相公一云答談相公代祝者其詩筆跡附後時胡子不能自昧跪拜悚懼是夜施食法事畢各歸憩息體上人猶向池默誦楞嚴呪欲其速去凝與黎寧光亦祝其藉法力超生毋淹滯也此時詩篇短札紛飛而下其一題云奉謝二位大師承命自應藉方也再容我半夕一話乃去何如詩云稽首慈悲法士前憫豫孤魂悶懨懨藉力超升非獨我諸魂咸仗早生天英靈美譽何堪受但凡機事不應言明日二師歸淨土敢乞楊枝坐寶蓮又贈禮懺諸公詩筆跡附後又致別談相公詩云今君為妾祭羣幽飄薄孤魂遂所求僧衆秉誠齊下列雄儒附會在上頭法力普慈無弗屆雨露同沾福倍休省悔又當兼戒殺從此科名靡不售傍注小字云妾所贈之言屢多不合諸尊幸勿怪也所譽之言或效或不效亦自有別無非勸人為善去惡而已勉之請了請了璨喜曰付之傳記正余心也不轉瞬而凝膝上落一紙云所云付傳者謂將字跡傳人以傳戒後世也非謂傳字然付之傳益妙後一傳字原圈去聲若真付傳則前後所錯別之字俱煩改之更平仄韻有未合者訂之尤妙云云既法事告成送諸上人返棹初四日諸友商紀其事亭午而紀成歡飲達二鼓席中得一詩一札云自別後天帝嘉妾有仇不報三月後乃生人間使得一闡吾未達之才俟九月乃敬彚詩文付來入傳以成諸君子一段美意希勿笑吾馮婦也則幸甚矣仙媛親筆附下凝曰余嘗見仙鬼之事或得之書傳或得之傳述多矣或有聞其聲者或有見之事者多矣卒未有能任筆墨對答如流有響則應如覿面與語若此者也況其怨而能忍無分毫凌厲之氣受惠則亷期約必信而所貽贈篇章語類多針戒端方正大絶無女子情態豈可與魑魅同日語哉故重之曰仙媛云今其札謂天帝嘉之益知福善不爽焉其踪跡不敢半語粉飾其詩札不敢隻字增損雖錯別亦仍其跡聊以紀異非好事也仙書字字前後如一余敬存之統俟九月詩文何如乃彙付裝潢出仙媛傳前後所贈之詩札有數十紙今僅刻三五餘悉載仙媛傳然媛雖為冤債而來竟不言冤之所以胡子亦終不肯自雪其過惟悚惕而已有冤不報正符大士之心今時下愚小冤尚憤憤覓報況其得權勢者肯忘瑕疵乎如戒經中不共戴天之讎尚不加報故云殺生報生生生何益此之謂歟惟惜媛具斯世智利根深達善惡因果之源而未知有向上一著倘時得遇作家宗匠即當下棄却瓢囊矣音釋攖音英觸迫近也癭音潁頸瘤也㓟䍤上音披刀析也下音濟上聲以手出汁也頡胡結切音纈直項也塸音歐墓也又聚沙也慘音參上聲愁也痛也又酷毒也洟音剃鼻出曰洟目出曰涕涕音體䢼音恭范女人冠飾也䀸音志目光剡音閃縣名在會稽脯音府乾肉眭蒨上音為姓也下倉殿切音倩邯鄲上音寒下音單趙縣也倩七正切清去聲假借使人也隧音遂龐塢上音旁下音烏上聲隳音灰逶迤上音威下音駝䆮音浸上聲礘圮上音泣下音痞㫐音杳遠望也姬音雞婦女美稱機音己几也謂設而不倚𢍶同㪻音見麓音六山足漕漼上音曹下音催上聲多羅樹無枝節身如棕櫚菩薩梵語具云菩提薩埵此云覺有情上求佛道下化衆生故云覺有情亦云開士謂能開悟一切衆生也亦云大士謂上求下化建立大事也靳音僅楚有大夫姓靳名尚附西湖南天竺真觀法師常講法華備五種法師之業盥洗渧地不濡龍王化作老人日至聽經師因久旱請其降雨王為諸龍求戒師作法召授即時降雨龍王峩冠朱服夜來頂禮師問以多旱之因龍曰人無正信多行惡行天將地肥流入深土五穀食無肥膚旱涸固有由也出高僧傳姑蘇曹魯川居士為豫言有女在夫家夏坐室中一蛇從墻上逐鴿墮庭心家人見而死之數日後蛇附女作語魯川往視則云我昔為荊州守高歡反追我至江滸遂死江中我父母妻子不知安否魯川驚曰歡六朝時人今歷隋唐宋元而至大明矣鬼方悟死久并知為蛇復曰既作蛇死亦無恨但為我禮梁皇懺一部吾行矣乃延泗洲寺僧定空禮懺懺畢索齊為施斛食一壇明日女安隱如故懺之功大矣哉出雲棲大師竹窗隨筆搜神記晉于寶死而復穌見天地間鬼神事遂撰集古今神祇靈異名曰搜神記釋法聰說法於浙西之蘇杭嘉興縣有神曰高王降其祝曰為我請聰法師來受菩薩戒居人依其言而請之受戒訖又降祝曰自今以往酒肉五辛一切悉斷後若祈福可請衆僧在廟設齊行道歷二年秀州海鹽縣神曰鄱陽府君因常祭降祝曰為我請聰法師講涅槃經衆乃迎師就講神又降祝曰神道業障多有苦惱自聽法來身鱗甲內已息細蟲噉苦願為我請師更講大品般若經師復為講之神降祝謝出高僧傳唐慧稜法師貞觀十四年正月半有感通寺昶法師曰夢見閻王請稜公講三論昶公講法華啓稜公可否稜曰善哉慧稜發願常處地獄教化衆生講大乘經既有此徵斯願畢矣至九月末蔣王見稜氣弱送韶州鐘乳逼令服之其夕夢見一衣冠者曰勿服此乳閻王莊嚴道場已竟大有乳藥至十月半黃昏時遂覺不愈告寺主寶度曰吾憶年八歲往龍泉寺禮觀音未至耆闍崛山已講三遍皎如目前言未訖外有大聲告曰法師早起燒香使人即到寶度曰何人答曰閻王使者迎稜法師即起燒香洗浴懺悔禮佛訖還房中取一生私記經旨焚之曰此私記於他讀之不得其致矣至小食時異香忽來稜斂容便卒出高僧傳海昌村民某有老媼死附家人言平生事及陰府報應甚悉家人環而聽之某在衆中忽攝心念佛媼謂曰汝常如此何患不成佛道問何故曰汝心念阿彌陀佛故問何以知之曰見汝身有光明故村民不識一字瞥爾顧念尚使鬼敬況久修者乎是故念佛功德不可思議出竹窗二筆越王鏐建龍冊寺請僧可周於天寶堂夜為冥司講經鬼神現形聽法兼施法食賜可周金鉢紫衣加精志通明之號出高僧傳護法論問曰或謂佛教有施食真言能變少為多如七粒變十方之語豈有是理無盡曰不然子豈不聞勾踐一器之醪而衆軍皆醉欒巴一噀之酒而蜀川為雨心靈所至而無感不通況托諸佛廣大願力廓其善心變少為多何疑之有故元世祖問扮彌帝師曰施食至少何普濟無量幽冥帝師曰佛法真言力猶如飲馬珠或曰子今何以不用一器之醪令衆皆醉一噀之酒而令注雨答曰心生疑惑何能感格信而無疑故曰寂然不動感而遂通也
