body:
  text: 廣州南海寶象林沙門弘贊在犙輯畜生道畜生者梵語帝利耶瞿榆泥此云旁行又曰旁生由其形傍故行亦傍皆負天而行又其受果報傍故名傍生由先其造作增上愚癡身語意十惡行往彼生彼稟性暗鈍不能自立為人畜養故號畜生然胎卵溼化水陸空行遍滿人間山野澤中欲色界天修羅地獄鬼趣皆悉有之是故以傍生譯之由不屬畜養者多故樓炭經云畜生有其三種一魚二鳥三獸於此三中一一無量正法念經云種類不同有四十億復有蜎飛蠕動微細昆蟲非數所知者皆名傍生其形大小各異飲食亦殊而鳥之大者不過金翅大鵬頭尾相去八千由旬高下亦爾兩翅各長四千由旬以龍為食莊周云大鵬之背不知幾千里將欲飛時擊水三千里翼若垂天之雲搏扶搖而上去地九萬里方乃得逝要從北溟至于南溟一飛六月終不中息準此猶是小金翅鳥也獸之大者無過於龍如難陀跋難陀二龍王身繞須彌山七匝頭猶山頂尾在海中魚之大者無過摩竭即鯨魚也身長三百由旬或四百由旬乃至七百由旬眼如日月鼻如大山口如赤谷齒如白山莊周所謂吞舟之魚也又云水獸大者如巨靈之龜首冠蓬萊海中遊戲言其小者形逾微塵非凡眼可見故佛不聽天眼觀水但以肉眼看水無蟲即得飲用莊周云鳥之微者不過鷦鷯於蚊子鬚上養子有卵鬚上孚乳其卵不落雖然如此豈同天眼所見者處處皆遍也如經所説畜生種類各各差別業因得報好醜亦各不同如龍驥麟鳳孔鸚鵡山雞畫鴙為人所貴情希愛樂如豺狼虎豹獼猴蚖蛇梟鴟等人所惡見不喜聞聲而壽極長者不過一劫如大龍王等壽極短者不過蜉蝣之蟲朝生暮死不盈一日中間長短豈能定之若其業報未盡捨身又復受身故舍利弗尊者觀一鴿過去前後各八萬劫猶不得脫鴿身復見祇陀林石上衆多金色螻蟻七佛已來尚不能離于蟻身故知一失人身萬劫難復此之謂歟俗以莊周為虛誕不信鷦鷯之説可取西洋顯微鏡一觀即見蚊之鬚眉身毛粗長豈無鷦鷯孚乳者哉大鵬證驗見後大法炬經云佛言一切衆生皆悉隨其形類而置名字如鳥等而彼餓鬼衆生之中無有決定差別名字勿謂天定天也人定人也餓鬼定餓鬼也如一事上有種種名如一人上有種種名如一天上乃至餓鬼畜生有種種名亦復如是亦有多餓鬼全無名字於一彈指頃轉變身體作種種形云何可得呼其名也彼中惡業因緣未盡故於一念中種種變身法句喻經云昔佛在舍衛國為天人説法時城中有長者財富無數為人慳貪不好布施食常閉門不喜人客若其食時輒敕門人堅閉門戶勿令有人妄入門裏乞丐求索爾時長者欻思美食便敕其妻令作飯食教殺肥雞薑椒和調煮之令熟即時已辦敕外閉門夫妻二人同坐一小兒著坐中央便共飲食夫妻取雞肉著兒口中如是數數初不有廢佛知此長者宿福應度化作沙門伺其坐食現出座前便呪願之且言多少布施可得大福長者舉頭見化沙門即罵之言汝為道人何無羞恥室家坐食何為搪𠊲沙門答曰卿自愚癡不知羞恥今我乞士何故慚羞長者問曰吾及室家自共娛樂何故慚羞沙門答曰卿殺父妻母供養怨家不知慚恥反謂乞士何無羞愧長者聞已驚而問之道人何故説此答曰案上雞者是卿先世時父以慳貪故常生雞中為卿所食此小兒者往作羅剎卿作賈客大人乘船入海舟輒失流墮羅剎國中為羅剎所食如是五百世壽盡來生為卿作子以卿餘罪未畢故來欲相害耳今此妻者是卿先世時母以恩愛深固今還與卿作婦今卿愚癡不識宿命殺父養怨以母為妻五道生死輪轉無際周旋五道誰能知者惟有道人見此覩彼愚者不知豈不漸恥於是長者㱇然毛豎如畏怖狀佛現威神令識宿命長者見之即識宿命尋則懺悔謝過便受五戒佛為説法得須陀洹道以修羅攝于天鬼畜故云五道若兼修羅則名六道既有三惡道應有三善道為當但譯人略之也天竺闍夜多尊者詣城乞食見一烏便微笑弟子問之尊者曰過去劫中我欲出家父母不聽強為聘妻得一子六歲我復欲去父母教兒抱住我腳啼哭言父若捨我依誰養活先當殺兒然後可去由此兒故不得出家從是九十一劫流轉六道未曾得見今以道眼觀見彼烏乃是前子愍其愚癡久在生死是以微笑若障人出家非止報於惡道後得人身多生無目是故智者見人出家方便成就勿作留難出付法藏經晉梓潼杜願字永平梓潼涪人也家巨富有一男名天保願愛念年十歲泰元三年暴病而死經數月日家所養豬生五子一子最肥後官長新到願將以作禮捉就殺之有一比丘忽至願前謂曰此豚是君兒也如前百餘日中而相忘乎言竟忽然不見四顧尋視見在西天騰空而去香氣充市彌日乃歇沙門支遁字道林陳留人也神宇雋發為老釋風流之宗嘗與其師辨論物類謂雞卵生用殺之未足與諸蜎飛蠕動同罰師尋亡忽現形來至遁前手執雞卵投地破之見有雞雛出殼而行遁即悟之悔其前言之失俄而師及雞雛並滅不見右二出冥祥記卵在雞腹已有識神投之如人在胎無二也隋宜州城東南四十餘里有一家姓皇甫居家兄弟四人大兄小弟皆勤事生業仁慈忠孝其第二弟名遷交遊惡友不事生活大業八年母在堂內取六十錢欲令市買且置牀上母向舍後其遷從外來入堂左右顧視不見人便偷錢將出私用母還覓錢不得不知兒將去遂勘合家良賤並云不得母恨不清遂鞭打合家大小大小皆怨至後年遷亡託胎家內母豬腹中經由三五月産一豚子年至兩歲八月秋社至須錢賣遠村社家得錢六百文社官將去至於初夜合家大小見豬先以鼻觸其婦盿夢云我是汝夫為取婆六十錢枉及合家浪受楚拷令我作豬今來償債已賣與社家社家縛我欲殺汝是我婦何忍不語男女贖我婦初一夢忽寤心驚仍未信之復眠還夢如是豬復以鼻觸婦婦驚著衣向堂報姑姑已起坐夢亦同婦兒女皆同夢見一夜束裝令兒及遷兄并持錢一萬二千文母報兒云社官儻不肯放求倍與價恐天明將殺馳騎急去去舍三十里兒既至彼不云己親恐辱家門但云不須殺今欲贖豬社家不肯吾今祭社時至豬不與君再三殷勤不放兄兒怕急恐慮殺之私憑一有識解信敬曾任縣令具述委曲實情後始贖得既得豬已驅向野田兄語豬云汝審是我弟汝可急前還家兒復語豬審是我父亦宜自前還家豬聞此語馳走在前還舍後經多時鄉親並知兒女恥愧比鄰相嫌者並以豬譏罵兒女私報豬云爺今作業不善受此豬身男女出頭不得爺生平之日每共徐賢者交厚爺向徐家兒女送食往彼供爺豬聞此語瀝淚馳走向徐家徐家離舍四十餘里至大業十一年內豬於徐家卒信知業報不揀親疏皎若目前可不慎歟長安弘法寺靜林法師是遷鄰里親見其豬法師向余説之楊州卞士瑜者其父在隋以平陳功授儀同慳吝嘗雇人築宅不還其價作人求錢瑜父鞭之作人怒曰若實負我死當與我作牛須臾之間瑜父死其年作家孕産一黃犢腰有黑文橫絡周匝如人腰帶右跨有白文斜貫大小正如象笏形牛主呼之曰卞公何為負我犢即屈前膝以頭著地瑜以錢十萬贖之牛主不許死乃收葬瑜為臨自説之爾洛陽大業中有人姓王常持五戒時言未然之事閭里敬信之一旦忽謂人曰今當有人與我一頭驢至日午果有人牽驢一頭送來涕泣説言吾早喪父為母寡養一男一女女嫁而母亡二年矣寒食日持酒食祭墓此人乘驢而往墓所欲渡伊水驢不肯渡鞭其頭面破傷流血既至墓所放驢而祭俄失其驢還本處其日妹獨坐兄家忽見其母入來頭面流血形容毀悴號泣告女我生時避汝兄送米五升與汝坐得此罪報受驢身償汝兄五年矣今日欲渡伊水水深畏之汝兄鞭捶我頭面盡破仍期還家更苦打我我走來告汝吾今償債垂畢何太非理相苦也言訖出尋之不見其母兄既而還女先觀驢頭面傷破流血如見其母傷狀女抱以號泣兄怪問之女以狀告兄亦言初不肯渡及失還得之言狀符同於是兄妹抱持慟哭驢亦涕淚皆流不食水草兄妹跪請若是母者願為食草驢即為食既而復止兄妹莫如之何遂備粟送王五戒處乃復飲食後驢死兄妹收葬焉冀州臨黃縣東有耿伏生者其家薄有資産隋大業十一年伏生母張氏避夫將絹兩匹乞女數歲之後母遂終亡變作母豬在其家內復産二豚伏生並已食盡遂便不産伏生即召屠兒出賣未取之間有一客僧將一童子從生乞食即於生家少停童子入豬圈中遊戲豬語之言我是伏生母為于往日避生父眼取絹兩匹乞女我坐此罪變作母豬生得兩兒被生食盡還債既畢更無所負欲召屠兒賣我請為報之童子具陳向師師時怒曰汝甚顛狂豬那解作此語遂即寢眠又經一日豬見童子又云屠兒即來何因不報童子重白師主又亦不許少頃屠兒即來取豬豬踰圈走出而向僧前牀下屠兒遂至僧房僧曰豬投我來今為贖取遂出錢三百文贖豬後乃竊語伏生曰家中曾失絹否生報僧云父存之日曾失兩匹又問姊妹幾人生報云惟有一姊嫁與縣北公乘家僧即具陳童子所説伏生聞之悲泣不能自已更別加心供養豬母凡經數日豬忽自死託夢其女云還債既畢得生善處兼勸其女勉修功德唐京兆貞觀中魏王府長史韋慶植有女先亡韋夫婦痛惜之後二年慶植將聚親賓客備食家人買得羊未殺夜慶植妻夢其亡女著青裙白衫頭髮上有一雙玉叉是平生所服者來見母涕泣言昔嘗用物不語父母坐此業報今受羊身來償父母命明旦當見殺青羊白頭者是特願慈恩垂乞性命母驚寤旦而自往觀羊果有青羊項膊皆白頭上有兩點白相當如玉叉形母對之悲泣止家人勿殺待慶植至放送之俄而植至催食厨人白言夫人不許殺青羊怒即命殺之宰夫懸羊欲殺賓客數人已至乃見懸一女子容貌端正訴客曰是韋長史女乞救命客等驚愕止宰夫宰夫懼植怒又但見羊鳴遂即殺之既而客坐不食植怪問之客具以言慶植悲痛發病遂不起京下土人多知此事崔尚書敦禮具為臨説長安市里風俗每至歲元日已後遞作飲食相邀號為傳坐東市筆生趙大次當設之有客先到向後見其碓上有童女年可十三四著青裙白衫以汲索繫頸屬於碓柱泣淚謂客曰我主人女也往年未死時盜父母百錢欲買脂粉未及用而死其錢今在厨舍內西北角壁中坐此盜罪今當償父母命言畢化為青羊白頭客驚告主人主人問其形貌乃是小女死已二年矣於厨壁取得百錢似久安處於是送羊僧寺合門不復食肉盧文勵傳向臨説爾右七出冥報記文宗食厨御膳烹雞子忽聞鼎中有聲極微聽乃羣卵呼觀世音菩薩悽愴之甚監宰以聞帝遣驗之果然帝歎曰吾不知佛道神力乃能若是敕自今不得用雞子又一日食蛤蜊有擘不開者焚香禱之乃開俄變為大士像帝召太山惟政禪師問之云云即詔天下寺院立觀音大士像奉祀焉出統紀京都西市北店有王會師者其母先終服制已畢至顯慶二年內其家乃産一青黃母狗會師妻為其盜食乃以杖擊之數下狗遂作人語曰我是汝姑新婦杖我大錯我為嚴酷家人過甚遂得此報今既被打羞向汝家因即走出會師聞而涕泣抱以歸家而復還去凡經四五會師見其意止乃屈請市北大街中正是己店北大牆後作小舍安置每日送食市人及行客就觀者極衆投餅與者不可勝數此犬恆不離此舍過齋時而不肯食經一二歲莫知所之過齋時即過午時也并州李信文水縣之太平里人身為隆政府衛士至顯慶年冬隨例往朔州赴蕃乘赤草馬一匹并將草駒是時歲晚凝陰風雪嚴厚行十數里馬遂不進信以蕃期期逼促撾之數十下馬遂作人語謂信曰我是汝母為生平避汝父將石餘米乞女故獲此報此駒即是汝妹也以力償債汝復何苦敦逼如是信聞之驚愕流涕不能自勝乃拜謝之躬負鞍轡謂曰若是信娘當自行歸家馬遂前行信負鞍轡隨之至家信兄弟等見之悲哀相對別為厰櫪養飼有同事母屈僧營齋合門莫不精進鄉閭道俗咸歎異之時工部侍郎溫無隱岐州司法張金停俱為丁艱在家聞而奇之故就信顧訪見馬猶在問其由委並如所傳汾州路伯達孝義縣人至永徽年中負同縣人錢一千文後乃違契拒諱及執契作徵遂共錢主於佛前為誓曰若我未還公願吾死後與公家作牛畜言訖未逾一年而死至二歲時向錢主家牸牛産一赤犢子額上生白毛為路伯達三字其子姪恥之將錢五千文求贖主不肯與乃施與隰城縣啓福寺僧真如助造十五級浮圖人有見者發心止惡竟投錢物布施右三出冥報拾遺明韶州曲江縣劉村劉家於崇禎末年畜一牡狗數年一日入厨下劉妻慮狗偷食以木杓擊頭遂死其夜狗託夢主人曰我是叔之姪子因負叔銀八錢為叔守護家庭債償已畢叔寤未之信復寐夢如前次早將狗後山埋之是夜狗復託夢叔曰蒙叔大恩埋我後山今被同鄉某偷去食猶未盡尚有一腿懸在厨竈上熏次早主人往山看果被盜去至盜者家問之初不肯認主人曰尚餘一腿挂廚上熏并説狗之因緣其人驚怖愧謝不已犙親聞録之經説一切衆生輪回五道中互為眷屬斯言不虛也今人所養六畜或負債而來償或愛家而來生凡眼不見誰知非自眷屬而殺而食者可不傷心哉清紹興王漢沖言其紹興府順治庚子年東關有婦人五十歲常假募化作佛事騙人忽病數月漸化為豬嘴長生毛喜同豬臥聲亦似豬也廣州羊城橋與王子潘君寓葉鳴岐館樓宴飲有鱉四隻擬烹供客橋與潘君極言其多異不宜殺岐曰吾曾見鱉中有物似回子狀頭面衣褶皆全橋曰回子在鱉中亦大怪矣又常聞鱉託夢於人求救而人為口腹頓昧惻隱之心嗟哉右二出鐵橋集大清初羊城四牌樓市中宰一大鱉腹中有四死孩子人見以問余余曰此名鱉寶能為人言非祟也鱉生則生鱉死隨死如人身毛孔八萬戶蟲人死隨死也有人欲見者畜鱉于盤屏處窺伺每至望日月至中天鱉舉頭望月其寶出於鱉頂上唱舞頭似回回人欲得之要得其法俗云若得者剖腳肚以藏之遇地下有寶即報人知余少年時曾聞有人煮鱉鑊中喚救命及開鑊而鱉已死祇謂鱉怪寧知其寶而可殺乎余昔住靜英德縣西來山白象林有沙彌心空擬次日赴墟買生放是夕夢有四十五人求救命次早往墟遇田蛤一籠數之得四十五遂買回放之然一切衆生希生怖死食息苦樂與人無殊形雖萬類不同其性一也人皆習俗久而不察或殺或食共結萬世之怨一朝報至悔何及哉田蛤亦名田雞別名蝦蟇嶺南多食淨度三昧經云罪福相纍重數分明後當受罪福之報一一不失菩念受天上人中身惡念受三惡道身一日一夜貪瞋癡惡念不可數計種未來生死根後當受八億五十萬雜類之身百年之中種後世災甚為難數魂神逐種受形遍三千大千剎土大智度論云好殺之人有命之屬皆不喜見若不好殺一切衆生皆樂依附故持戒人命欲終時其心安樂無疑無悔若生天上若在人中常得長壽是為得道因緣乃至成佛住壽無量殺生之人今世後世受種種身心苦痛不殺之人無此衆苦地持經云殺生之罪能令衆生墮三惡道若生人中得二種果報一者短命二者多病如是十惡一一皆備五種果報一者殺生何故受地獄苦以其殺生苦衆生故所以身壞命終地獄衆苦皆來切己二者殺生何故出為畜生以殺生無有慈惻行乖人倫故地獄罪畢受畜生身三者殺生何故復為餓鬼以其殺生必緣慳心貪著滋味復為餓鬼四者殺生何故生人而得短壽以其殺生殘害物命故得短壽五者殺生何故兼得多病以殺生違適衆患競集故得多病當知殺生有如是苦是則殺他還是自殺其有智者肯自殺乎餘九惡詳如經文藏典所載過去劫時釋迦如來曾為師子象王麞鹿獼猴鴈共命之鳥乃至鼠蝨等昔有一鱉婦懷孕病語其夫曰我欲得獼猴心肝食乃瘥夫曰猴在山中云何能得婦曰不得當死夫往山中見猴樹上曰吾與卿為友或此山無果我能乘載卿度水往別山有好果處豈不快耶猴即可之異日猴騎鱉背度水至中流鱉曰我婦思汝心肝食故與為友猴曰何不早説我心肝猶挂樹上未將來可載我還取來鱉便乘猴至岸猴即上樹久而不下鱉曰善友何不下來猴曰誰有間心挂樹枝猴者釋迦世尊是鱉者調達是又昔有一仙人姓迦葉山中修行語蝨云我若入禪定時汝勿咬我令我心亂我出定時恣汝所食後時有一跳蚤俗云狗蝨問蝨曰阿姨汝何肥白蝨曰我如主教出定恣我飲食故也蚤於異時俟仙入定亂唼仙人仙人即嗔焚火抖衣蚤即跳去蝨被燒死蝨者世尊是蚤者調達是又一生佛與調達為共命之鳥一身二頭在一毒樹下踞世尊頭睡調達頭見一毒花墮地即便食之欲毒死彼頭不知二命俱喪故知今人不可與人為怨世世相值皆為讎對也佛未成道既爾我等於六道中生死輪回無不受萬類之身今若不離惡修善萬類奚免有智者當自思之一一俱詳藏經文多不能具録統紀云祭天地祀宗社必殺牲以備物皇王以來用以為法有國家者掌之為故且不敢有所議也夫司天地之化所以稱上帝稱皇天后土者至聖至神也烏有神聖而好殺牲牢之命肯歆腥臊之食哉由夫上古之俗茹毛飲血以是養己必以是事神朴陋之見曾不知牷牢腥臭之為瀆也蒸民即粒俗不能變聖賢教世師古法以著之禮經於是後王遵而行之莫或敢議其可否者以養己猶古不思事神之不當瀆也夫果於殺命不仁也薦以腥臭不義也以不仁不義為養己之舊習尚當思有以節以求全好之心豈於事天地祖宗之神靈而欲以牲牢腥臭之物以瀆之哉自佛法東漸勸修齋戒天帝尚知事佛豈人事天而不知事佛乎知所以事佛則不當以牲牢瀆天為可信矣惟有梁武皇魏獻文孝文二帝敕郊廟祭祀不用牲牷而易之以蔬麵酒果可謂違古而道奉黍稷薦明水是亦三代之祀法也烏在乎牲牢腥臭之物哉齊宣帝從僧稠禪師受菩薩戒永不食肉盡停五坊鷹犬傷生之具及境內屠殺隋文帝三年詔天下正五九并六齋日不得殺生命唐高祖武德二年詔正五九月及十齋日不得行刑屠釣永為國式如意元年敕斷天下屠釣武后敕斷天下屠釣肅宗詔天下立放生池凡八十一所顏真卿撰碑宋太祖詔民間二月至九月不許採捕彈射著於令真宗詔天下州郡放生池悉與興復無池之處沿江淮州郡近城五里並禁漁捕詳附八關齋法後音釋大鵬孔氏志怪曰昔楚文王少時好獵有人獻一鷹異時俄而雲際有物凝翔飄颻鮮白而不辨其形鷹見即竦翮而升矗若飛電須臾羽墮如雪血灑如雨良久有一大鳥墮地而死兩翅廣數十里喙邊有黃衆莫能知時有識者曰此大鵬雛始飛故為鷹所制欻音忽倐起也㱇音瑟悲意櫪音力食牛馬槽器也歆虗今切吸平聲神饗氣也牷音全祭祀之牛色純曰犧體完曰牷順德黃連村馬翁芝為人不信善性好嗜狗其子娶勒樓伍侯創女為妻創季子出家於鼎湖山慶雲寺字目修康熙庚申十二月十四夜夢身在黃連俗姪店中忽見翁芝惶遽奔至曰師當救我修問何事翁曰有人捉我修曰可入此店房內我為閉戶隨後即有數人逐來云捉翁芝修曰此吾姪空店無人我為看守耳數人遂去次日修向同寮僧曰俗親馬翁芝死將二十年吾未嘗記憶彼何以昨夜有此異夢午後即有數獵人將犬從山後逐一麞至麞惶怖跳入寺內困篤臥地不能動起僧衆呪願護之將夜修抱回自寮席以草蓋以衣拊摩至夜半方能動起次早用葉裹齋菜豆腐與食隨修出入馴如家犬始悟前夢數日後修引出寺外放之竟不肯去修曯曰若實吾親當去後倘有難緣我再救汝乃勉強而去時有識者見麞皮毛稀疏謂將有二十年矣不久回寺右溪邊而死匠人見欲剝皮未獲刀修因事偶至溪邊見匠人持刀將剖修遂救免以麞全身葬之有難緣再救語不虗也犙録之噫一切衆生靈性叵測昔鼎湖方丈後渠竇口有一蟾蜍大如小碗黃黑班色而腹甚皤令人可厭侍者持出三重門外溪邊放之夜即回至本處如是再三後持出山外數十丈懸岸叢樹上放下之三日復還本處余即誡之不許再放任其自安後有鄉人送一狗至每日向之怖吠彼乃上山梅樹下剖一穴藏之以頭朝方丈也又羅浮山蝴蝶小者大七八寸大者二三尺其色各異亦有五彩兼備豐艷耀目其繭大如拇指或如雞卵人取繭回或數百里或數千里藏一二月或三五月至三月中懸於簷下或花果樹邊當出之夜即有一蝶來伴之此是雌彼雄者來此是雄彼雌者來一二時間或半日一日即俱飛去人雖萬物之靈豈能若是乎如昔蔡京進太師楚國公京喜食鶉預籠畜而烹之曾夢鶉數千訴于前其一致詞曰食君廩中粟充君箸下肉一羹數百命生死猶轉轂看君壽千春禍福相倚伏京甚畏之出漢溪詩話此集刻在先翁芝事在後故續入此羅浮山在廣東惠州府蟾蜍俗云蝦蟆地獄道地獄者胡言泥犁梵音名捺落迦捺落名人迦名為惡惡人生彼處故名捺落迦有翻為不可樂或翻苦具或翻苦器由彼先時造作增長增上暴惡身語意惡行往彼令彼相續故名捺落迦地獄者從義立名謂地下之獄也又獄者局也謂拘局罪人不得自在故名地獄婆沙論云謂彼罪人為獄卒阿傍之所拘制不得自在也然此之一道有其多處或在地下或處地上或居空中故梵本不云地獄而言捺落迦論云此贍部洲下有大地獄洲上有邊地獄及獨地獄或在谷中山上或在曠野空中或海邊廟中餘三洲惟有邊獨地獄無大地獄如此地獄雖多準三法度論經總為三攝一熱二寒三邊第一熱獄有八在贍部洲下謂此洲下有五百由旬土泥次下有五百由旬白墡次下一萬九千由旬有七大獄於中安立次下二萬由旬是無間獄從洲下至無間獄底共有四萬由旬無間縱廣高下各二萬由旬七獄一一縱廣有萬由旬贍部洲下至無間上尖下濶猶如穀聚八獄於中重壘而住長阿含經云大地獄其數總八其八獄各有十六小獄圍繞謂其八獄各有四門一一門外各有四遊增有情遊彼其苦增故一煻煨增二尸糞增三鋒刃增此增復有三種一刀刃路二劒葉林三鐵刺林此三種皆鐵林故同一增攝也四烈河增并前本獄以為十七如是八大獄并諸眷屬總有一百三十六所故經中説有一百三十六捺落迦也一等活獄亦名更活或獄卒唱令生或冷風吹活兩緣雖異令活一等故名等活獄由習近殺害樂習增長墮此獄中人間五十歲此獄為一晝夜壽五百歲如上四天王壽二黑繩獄先以鐵繩拼後以鐵斧斫由習近殺生偷盜墮此獄中人間一百歲此獄為一晝夜壽一千歲如上忉利天壽三衆合獄亦名衆磕兩山下合以磕罪人由習近殺生倫盜邪淫墮此獄中人間二百歲此獄為一晝夜壽二千歲如上夜摩天壽四呼呼獄亦名叫喚獄卒逼趣罪人叫呼而走由習近殺盜淫妄墮此獄中人間四百歲此獄為一晝夜壽四千歲如上兜率天壽五大呼獄亦名大呼喚四山火起欲逃無路號咷大叫由習近殺盜淫妄勸人飲酒墮此獄中人間八百歲此獄為一晝夜壽八千歲如上化樂天壽六燒然獄亦名炎熱火鐵狹近於中受熱由殺盜淫妄飲酒邪見墮此獄中人間一千六百歲此獄為一晝夜壽一萬六千歲如上他化天壽七大燒然獄亦名大炎熱山火相搏鏟炙罪人由殺盜淫妄以酒飲人邪見不信或破比丘比丘尼戒墮此獄中壽經半劫八無間獄亦名無擇一投苦火永無樂間既苦無間何所可擇無彈指頃歇苦由作五逆業墮此獄中梵名阿鼻此云無間亦名無救觀佛三昧經云阿鼻獄受大苦一日一夜如人間六十小劫如是壽命盡一大劫具五逆者受罪五劫復有衆生犯四重禁虛食信施誹謗邪見不識因果斷學般若毀十方佛偷僧物淫泆無道逼掠淨尼毀辱所親此人罪報經十萬四千大劫復入東方十八鬲中受苦南西北方亦復如是第二寒獄亦有八在此洲外鐵圍山底仰向居止罪人於中受寒凍苦一頞浮陀獄由寒苦所切肉生細匏二泥羅浮陀獄此云疱裂由寒風吹通身疱裂此二獄從身相受名三阿吒吒獄由寒苦增甚脣動不得惟舌得動故作此聲四阿波波獄由寒增甚舌動不得脣作此聲五嘔喉獄由寒增甚脣舌不得動喉內振氣故作此聲此上三獄約受苦聲以立名也六波羅獄此云青蓮華此華葉細由肉色細坼似此華裂七波頭摩獄此云赤蓮華由肉色大坼似此華開八分陀利獄此云白蓮華由彼骨坼似此華開此上三獄從瘡相受名此八獄中衆生極寒所逼由身聲瘡變異故立此名若小寒氷獄隨處亦有如後劉薩訶所見者按地藏經大地獄有十八次有五百乃至千百名號各別十八泥犂經具十八名字一一獄中受苦各異壽命長短不同詳如二經此不繁録第三邊獄有三一山間二水間三曠野受別業報此應寒熱雜受莊椿録云孤獨地獄在閻浮提諸處有八萬四千座苦報轉輕如僧護億耳所見者今總約其報第一根本極重之罪殺父母殺阿羅漢破和合僧逼姦淨尼出佛身血無有懺悔五逆之罪及上上品十惡業感八大地獄上中品十惡生寒冰等地獄上下品十惡生孤獨小地獄中經云閻羅王一念之惡便總獄事自身受苦亦不可論閻羅大王昔為毗沙國王與維陀始王共戰兵力不如因立誓願願我後生為地獄主治此罪人十八大臣及百萬衆皆悉同願毗沙王者今閻羅王是十八大臣今十八獄主是百萬之衆今牛頭阿旁等是地獄經云閻王住地獄間宮城縱廣三萬里銅鐵所成每日晝夜三時有大銅鑊滿中煬銅自然在前有大獄卒臥王熱鐵牀上鐵鈎擘口煬銅灌之縱咽徹下無不燋爛彼諸大臣亦復如是受罪畢復起治事十八獄主者一曰迦延典泥犂獄二號屈遵典刀山獄三名沸進壽典沸沙獄四名沸曲典沸屎獄五名迦世典黑耳獄六名𭗡傞典火車獄七名湯謂典鑊湯獄八名鐵迦然典鐵牀獄九名惡生典𭗡山獄十名呻吟典寒冰獄十一毗迦典剝皮獄十二遙頭典畜生獄十三提薄典刀兵獄十四夷大典鐵磨獄十五悅頭典灰河獄十六穿骨典鐵柵獄十七名身典蛆蟲獄十八觀身典煬銅獄如是各有無量地獄以為眷屬獄有一主牛頭阿旁其性𠒋虐無一慈忍見諸衆生受此惡報惟憂不苦惟恐不毒或問阿旁云衆生受苦甚可悲念而汝常懷酷毒無慈愍心阿旁答言如此罪惡諸受苦者不孝父母謗佛謗法謗僧賢聖罵辱六親輕慢師長毀陷一切惡口兩舌諂曲嫉妒離他骨肉瞋恚殺害貪欲欺詐邪命邪求及以邪見懈怠放逸造諸怨結如是等人來此受苦每至免脫之日恆加勸諭此中劇苦非可忍耐汝今得出勿復更造而此罪人初無改悔今日得出俄頃復還展轉輪回不知痛苦令我筋力身疲此諸衆生從劫至劫與其相對以是事故我於罪人無片慈心故加楚毒望其知苦知慚知恥不復更還觀此衆生真實至苦終不肯避決不修善往趣涅槃既是無知之物不知避苦求樂所以痛劇倍於人間何容於此而生慈忍正法念經云閻羅王為罪人説偈曰汝得人身不修道如入寶山空手歸汝今自作還自受叫喚苦者欲何為餘諸地獄相狀刑具及受報差別等事經論備載此不繁録然凡夫所造善惡之業如形影隨身人死但亡其身不亡其行如然火夜書火滅字存火至後成今世所作後世成之故經云若言業無住處者是業住於過去世中待時待器得受果報如人服藥經於時節藥雖消滅時到則發好力好色身口意業亦復如是雖是過業時到則受譬如小兒初所學事雖念念滅無有住處然至百年亦不忘失餘如經説提謂經云長者提謂白佛言三長齋何以正月一日至十五日復言如何名禁佛言四時交代陰陽易位歲終三覆以校一月六奏三界皓皓五處録籍衆生行異五官典領校定罪福行之高下品格萬途諸天帝釋太子使者日月鬼神地獄閻羅百萬神衆等俱用正月一日五月一日九月一日四布案行帝王臣民八夷飛鳥走獸鬼龍行之善惡時與四天王月八日十五日盡三十日所奏同無不均天下使無枉錯覆校三界衆生罪福多少所屬福多者即生天上即敕四鎮五官大王司命增益壽算下閻羅王攝五官除罪名定福祿故使持是三長齋是故三覆八校者八王日是也亦是天帝釋輔鎮五官四王地獄王阿修羅諸天案行比校定生注死增減罪福多少有道意無道意大意小意開解不開解出家不出家案比口數皆用八王日何等八王日謂立春春分立夏夏至立秋秋分立冬冬至是謂八日天地諸神陰陽交代故名八王日月八日十四日十五日二十三日二十九日三十日皆是天地用事之日上下弦望朔晦皆録命上計之日故使於此日自守持齋以還自校使不犯禁自致生善處如經所説佛語無二誰敢不信儻或有疑如後所出當自知之涅槃此云不生不滅晉清河趙泰字文和貝丘人也祖父京兆太守泰郡舉孝廉精思典籍年三十五時嘗卒心痛須臾而死心尚暖留尸十日平旦喉中有聲如雨俄而穌活説初死之時有一人來近心下復有二人乘黃馬從者二人夾扶泰掖徑將東行至一大城崔嵬高峻城邑青黑將秦向城入經兩重門有瓦屋可數千間男女大小亦數千人行列而立吏著皂衣有五六人條疏姓字云當以科呈府君泰名在三十須臾將泰與數千男女一時俱進府君西向坐簡視名簿訖復遣泰南入黑門有人著絳衣坐大屋下以次呼名問生時作何罪行何福善汝等辭以實報比恆遣六部使者常在人間疏記善惡具有條狀不可得虗泰答父兄仕宦皆二千石我少在家修學而日無所事亦不犯惡乃遣泰為水官監作使將二千餘人運沙裨岸晝夜勤苦後轉泰水官都督知諸獄事給泰馬兵令案行地獄所至諸獄楚毒各殊或針貫其舌血流竟體或披頭露髮裸形徒跣相牽而行有持大杖從後催促鐵牀銅柱燒之洞然驅迫罪人抱臥其上赴即焦爛尋復還生或炎爐巨鑊焚煮罪人身首碎墜隨沸翻轉有鬼持叉倚于其側有三四百人立于一面次當入鑊相抱悲泣有劍樹高不知限量根莖枝葉皆劍為之人衆相訾自上自攀身首割截尺寸離斷泰見祖父母及二弟在此獄中相見涕泣泰出獄門見有二人賫文書來語獄吏言有三人其家為彼於寺塔中懸幡燒香救解其罪可出福舍俄見三人自獄而出已有自然衣服完整在身南詣一門云名開光大舍有三重門朱采照發見此三人即入舍中泰亦隨入前有大殿珍寶周飾精光耀目金玉為牀見一神人姿容偉異殊好非常坐此座上邊有沙門立侍甚衆府君來恭敬作禮泰問此是何人府君致敬吏曰號名世尊度人之師有願令惡道中人皆出聽經時云有百萬九千人皆出地獄入百里城在此列者奉法衆生也行雖虧始尚當得度故開經法七日之中隨本所作善惡多少差次免脫泰未出之頃已見十人升虗而去出此舍復見一城方二百餘里名為受變形城地獄考治已畢者當於此城更受變報泰入其城見有屋數千區各有坊巷正中有瓦屋高壯欄檻采飾有數百局吏對校文書云殺生者當作蜉蝣朝生暮死劫盜者當作豬羊受人屠割淫泆者作鶴鶩麞麋兩舌者作鴟梟鵂鶹捍債者為驢騾牛馬泰案行畢還水官處主者語泰卿是長者子以何罪過而來在此泰答祖父兄弟皆二千石我舉孝廉辟不修行堅志念善不染衆惡主者曰卿無罪過故相使為水官都督不然與地獄中人無有異也泰問主者曰人有何行死得樂報主者曰奉法弟子精進持戒得樂報無有謫罰也泰復問曰人未事法時所行罪過事法之後得以除否答曰皆除也語畢主者開縢篋檢泰年紀尚有餘算三十年在乃遣泰還臨別主者曰已見地獄罪報如是當告世人皆令作善善惡隨人其猶影響可不慎也時親表內外候視泰五六十人同聞泰説泰自書記以示時人時晉太始五年七月十三日也乃為祖父母二弟延請僧衆大設福會皆命子孫改意奉法勸課精進時人聞泰死而復生多見罪福互來訪問時有太中大夫武城孫豐關內侯常山郝伯平等十人同集泰舍欵曲尋問莫不惕懼皆即奉法也穌音蘇死而更生也沙門支法衡晉初人也得病旬日亡經三日而穌説死時有人將去見如官曹舍者數處不肯受之俄見有鐵輪輪上有鐵爪從西轉東無持引者轉駛如風有一吏呼罪人當輪立輪轉來轢之翻還如此數人碎爛吏呼衡道人來當輪立衡恐怖自責悔不精進今當此輪耶語畢吏謂衡曰道人可去於是仰首見天上有孔不覺倐爾上升以頭穿中以手搏兩邊四向顧視見七寶宮殿及諸天人衡甚踊躍不能得上疲而復還下渴欲飲水乃墮水中因便得穌於是終身持戒菜食晝夜精思為至行沙門由其一念自責悔心乃脫鐵輪之苦今人可不終身自勉乎并州劉薩訶西河離石人也長於軍旅不聞佛法尚氣武好畋獵於太康二年年三十一暴病而死體尚溫柔家未殮至七日而穌説云將盡之時見有兩人執縛將去向西北行行路轉高稍得平衢兩邊列樹見有一人執弓帶劍當衢而立指語兩人將訶西行見屋舍甚多白壁赤柱訶入一家有女子美容服訶就乞食空中聲言勿與之也有人從地踊出執鐵杵將欲擊之訶遽走歷入十許家皆然遂無所得復西北行見一嫗乘車與訶一卷書訶受之西至一家館宇華整有嫗坐于戶外口中虎牙屋內牀帳光麗竹席青几復有女子處之問訶得書來否訶以書卷與之女取餘書比之俄見兩沙門識訶問曰汝識我否訶答不識沙門曰今宜歸命釋迦文佛訶如言發念因隨沙門俱行遙見一城類長安城而色甚黑蓋鐵城也見人身甚長大膚黑如漆頭髮曳地沙門曰此獄中鬼也其處甚寒有氷如席飛散著人頭頭斷著腳腳斷二沙門云此寒氷獄也訶便識宿命知兩沙門往昔維衛佛時並我師也作沙彌時以犯俗罪不得受大戒世雖有佛竟不得見從再得人身一生羌中今生晉中又見從伯在此獄謂訶曰昔在鄴時不知事佛見人灌像聊試學之而不肯還直今故受罪猶有灌福幸得生天次見刀山地獄次第經歷觀見甚多獄獄異城不相雜廁人數如沙不可勝計楚毒科法略與經説相符自訶履踐地獄示有光景俄而忽見金色暉明皎然見人長二丈許相好嚴華體黃金色左右並曰觀世音大士也皆起迎禮有二沙門形質相類並行而東訶作禮畢菩薩具為説法可千餘言末云凡為亡人設福若父母兄弟爰至七世姻媾親戚朋友路人或在精舍或在家中亡者受苦即得免脫七月望日沙門自恣受臘此時設供彌為勝也若制器物以充供養器器標題言為某人親奉上三寶福施彌多其慶逾速沙門白衣現身為過及宿世之罪種種惡業能於衆中盡自發露不失事條勤誠懺悔者罪即消滅如其弱顏羞慚恥於大衆露其過者可在屏處默自記説不失事者罪亦除滅若有所遺漏非故隱蔽雖不獲免受報稍輕若不能悔無慚愧心此名執過不反命終之後尅墜地獄又他造塔及與堂殿雖復一土一木若染若碧率誠供助獲福甚多若見塔殿或有草穢不加耘除蹈之而行禮拜功德隨即盡矣又曰經者尊典化導之津波羅蜜經功德最勝若有善人讀誦經處其地皆為金剛但肉眼衆生不能見耳能勤諷持不墮地獄般若定本及如來鉢後當東至漢地能立一善於此經鉢受報生天倍得功德所説甚廣略要載之訶臨辭去謂曰汝應歷劫備受罪報以曾聞經法生歡喜心今當現受輕報一過便免汝得濟活可作沙門洛陽聖家舍利臨緇今山東濟南府建業即金陵報恩塔鄮陰今寧波府阿育王塔成都蜀府五處並有阿育王塔又吳中兩石像育王所使鬼神造也頗得真相能往禮拜者不墮地獄隨心所願成得道因緣訶作禮而別出南大路廣百餘步道上行者不可稱計道邊有高座高數十丈有沙門坐之左右僧衆列侍甚多有人執筆北面而立謂訶曰在襄陽時何故殺鹿跪答曰他人射鹿我加創耳又不噉肉何緣受報時即見襄陽殺鹿之地草樹山澗忽然滿目所乘黑馬並皆能言悉證訶殺鹿年月日時訶懼然無對須臾有人以叉叉之投鑊湯中自視四體潰然爛碎有風吹身聚小岸邊忽然不覺還復全形執筆者復問汝又射雉亦嘗殺鴈言已又投鑊湯如前爛法受此報已乃遣訶去入一大城有人居焉謂訶曰汝受輕罪又得還生是福力所扶乃遣人送訶遙見故身意不欲還送人推引久久乃附形而穌遂奉法精勤而即出家字曰慧達太元末尚在京師出冥報記梁高僧傳云後還本鄉東造丹陽諸塔禮事已訖西趣涼州出肅州酒泉郭西沙礰而卒復有種種神異事繁不録高座沙門或是地藏菩薩也薩訶是梵語即娑訶字故餘處或作荷何字佛祖統紀云劉薩訶病死入冥見觀音大士指往會稽阿育王塔處懺悔既蘇出家至會稽鄮縣烏石山求不見偶一夜聞地下鐘聲倍加誠懇經三日忽從地湧出寶塔高一尺四寸廣七寸佛像悉具飛至一山訶精勤禮懺靈瑞甚多即於其地建剎奉塔安帝敕造塔亭禪室度二七僧住持守護今寧波府阿育王塔是也阿育此云無憂佛滅度後一百年出世為鐵輪王統此贍部一洲聞佛受記遂興隆三寶使鬼神一日中起八萬四千佛舍利塔此東震旦有一十九所今云五處人皆共見餘或隱沒地中言七月望日者盂蘭盆經云佛言行慈孝者應先為所生現在父母過去七世父母於年年七月十五日佛歡喜日僧自恣日以百味飲食安盂蘭盆中施十方自恣僧願現在父母長壽無病無諸苦惱之患乃至七世父母六親眷屬得出三途應時解脫生人天中福樂無極云云上虞唐遵字保道晉太元八年暴病而死經夕得穌云有人呼將去至一城府未進頃見從叔自城中出驚問遵汝何故來遵答違離姑姊並歷年載欲往問訊本明當發夜見數人急呼來此即時可得歸去而不知還路從叔云汝姑喪已二年汝大姊兒道文近被録來既蒙恩放積日方歸家已殯殮乃入棺中搖動棺器冀望其家覺悟開棺棺遂至路落檀車下其家或欲開之乃問卜者卜云不吉遂不敢開不得復生今為把沙之役辛勤極苦汝宜速去勿復住此且汝小姊又已喪亡今與汝姑共在地獄日夕憂苦不知何時可得免脫汝今還去可語其兒勤修功德庶得免之於此示遵歸路將別又囑遵曰汝得還生良為殊慶在世無幾倏如風塵天堂地獄苦樂報應吾昔聞其語今覩其實汝宜深勤善業務為孝敬受法持戒慎不可犯一去人身入此罪地幽窮苦酷自悔何及勤以在心不可忽也我家親屬生時不信罪福今並遭塗炭長受楚毒燋爛傷痛無時暫休欲求一日改惡為善當何得耶悉我所具故以囑汝勸化家內共加勉勵言已涕泣因此而別遵隨路而歸俄而至家家治棺將竟方營殯殮遵既附尸尸尋氣通移日稍瘥勸示親識並奉大法初遵姑適南郡徐漢長姊適江夏樂瑜小姊適吳興嚴晚途懸遠久斷音息遵既瘥遂至三郡尋訪姑及小姊姊子果並喪亡長姊亦説兒道文殮棺動墮車皆如叔言既聞遵説道文橫死之意姊追加痛恨重為製服把沙役者經云鬼神道中擔沙負石填河塞海罪報是也武昌程道惠字文和世奉五斗米道不信有佛常云古來正道莫踰李老何乃信惑胡言以為勝教太元十五年病死心下尚暖家不殯殮數日惠蘇説初死時見十許人縛録將去逢一僧云此人宿福未可縛也乃解其縛散驅而去道路修平而兩邊棘刺森然略不容足驅諸罪人馳走其中肉隨著刺號呻聒耳見惠行在平路皆歎羡曰佛弟子行路復勝人也惠曰我不奉法其人笑曰君忘之耳惠因自憶先身奉佛已經五生五死忘失本志今生在世幼遇惡人未達邪正乃惑邪道既至大城徑進廳事一人南面而坐見惠驚曰君不應來有一人著單衣幘持簿對曰此人伐社殺人罪應來此向所逢僧亦隨惠入申理甚至云伐社非罪也此人宿福甚多殺人雖重報未至也南面坐者曰可罰所録人命惠就坐謝曰小鬼謬濫枉相録來亦由君忘失宿命不知奉大正法故也將遣惠還乃使暫歷觀地獄惠欣然辭出導從而行行至諸城人衆巨億悉受罪報見有掣狗嚙人百節肌肉散落流血蔽地又有羣鳥其嘴如鋒飛來甚速鴆然血至入人口中表裏貫洞其人宛轉叫呼筋骨碎落觀歷既遍乃遣惠還復見向所逢僧與惠一銅物形如小鈴曰君還至家可棄此門外勿以入室某年月日君當有厄誡慎過此壽延九十時道惠家於京師大街南自見來還達皂莢橋惠將入門置向銅物門外樹上光明舒散流飛屬天良久還小奄爾而滅至戶聞尸臭惆悵惡之時賓親奔弔突惠者多不得徘徊因進入尸忽然而蘇惠後為廷尉預西堂廳訟未及就列欻然頓悶不識人半日乃愈計其時日即僧所戒之期頃之還為廣州刺史元嘉六年卒右五出冥祥記其僧必惠宿世師不爾何以殷勤若是乎初張道倰在蜀要家家輸米五斗不然即使鬼到其家故世稱為五斗米道巴丘縣巫師舒禮晉永昌元年病死土地神將送詣太山俗人謂巫師為道人路過福舍門前土地神問吏此是何等舍吏曰道人舍土地神曰此人亦是道人便以相付禮入門見數千間瓦屋皆懸竹簾自然牀榻男女異處有誦經者唄讚偈者自然飲食者快樂不可言禮文書名已至太山門而身又不至於是遣更録取禮觀未遍見有一人八手四眼捉金杵逐欲撞之便怖走還出門神已在門迎捉送太山太山府君問禮卿在世間皆何所為禮曰事三萬六千神為人解除祠祀或殺牛犢豬羊雞鴨府君曰汝罪應上熱熬使吏牽著熬所見一牛頭人身捉鐵叉叉禮著熬上宛轉身體燋爛求死不得已經一宿二日府君曰禮壽命應盡可頓奪其命校録籍者云餘算八年府君曰録來牛頭人復以鐵叉叉著熬邊府君曰今遣汝歸終畢餘算勿復殺生淫祀禮忽還活遂不復作巫師出幽冥記長安沙門帛遠字法祖本姓萬氏河內人才思俊微敏浪絶倫誦經日八九千言研味方等妙入幽微世俗墳索多所該貫祖至晉惠之末欲潛遁隴右以保雅操會張輔為秦州刺史先有州人管蕃與祖論義屢屈深恨向輔所譖輔收之行罰衆咸怪惋祖曰我來畢對此宿命之結非今事也乃呼十方佛祖前身罪緣歡喜畢對願從此後與輔為善知識無令受殺人之罪逆鞭之五行奄然命終輔後具聞其事方大惋恨道俗流涕衆咸憤激共分祖尸各起塔廟輔雖有才解而酷不以理橫殺德僧百姓疑駭因亂而斬焉管蕃亦卒時有人姓李名通死而更蘇云見祖法師在閻羅王處為王講首楞嚴三昧經云講竟應往忉利天又見祭酒王浮披鐵械鎖求祖懺悔閻王訶云世間偽經毀盡你罪方脫猶有令人信邪之罪昔祖平素之日與王浮每爭邪正浮屢屈既瞋不自忍乃作老子化胡成佛經一百卷以誣謗佛法殃有所歸死方思悔今人盛引傅奕韓朱之文為實録甘與王浮同一罪藪誠可悲夫出梁高僧傳并統紀通載云唐乾封帝詔僧道會於百福殿定奪化胡經真偽百官臨證三教首座議論紛紜有僧法明者察其是非即排衆出曰老子化胡成佛之際為作華言化之為作胡語誘之若作華言則胡人未善必作胡語既傳此土須假翻譯未審道流所謂化胡經者於何朝代翻譯筆授證義當復為誰於是舉衆愕然無能應者公卿列辟咸服其切當欣躍而罷有敕搜聚天下化胡經焚棄不在道經之數既而洛京恆道觀柏彥道士等奉表乞留詔曰三聖重光玄元統敘豈忘老教偏意釋宗朕志欲還淳情存去偽理乖事舛者雖在親而亦除義符名當者雖有冤而必録自今道經諸部有記及化胡事者並宜削除有司條為罪制魏書云正光元年明帝召佛道二宗門人殿前齋訖敕諸法師與道士論議時沙門曇謨最與道士薑斌對論帝與百官臨看薑斌論無宗旨帝又問開天經何處得來是誰所説遣中書侍郎尚書等就道觀取經時一百七十官讀訖奏云老子止著五千文更無言説臣等所議薑斌罪當惑衆帝加斌極刑時有菩提流支法師諫帝乃止配徒馬邑備載梁高僧傳又隋末道士輔惠祥改佛涅槃經為長安經後事發被誅通載云元世祖至元十八年十月二十日敕報恩禪寺林泉倫長老下火就大憫忠寺焚燒道藏偽經三十八種卷有數千除道德經外盡行燒燬無有遺餘玉音頒下道士愛佛經者為僧不為僧者娶妻為民時罷道為僧者七八百人挂冠於上永福帝師殿之梁拱其先謀占梵剎四百八十三所還佛寺二百三十七所後凡經三載又恢復佛寺三十餘所詳備通載下火法語文多不録今時三官經乃明初道士偽造其文俚語然三官既不知出在何代鑑史無文又非西域人士云何而作梵語云閻浮提足見其謬道士見佛經有正五九齋遂妄立正七十以喜世俗福祿解厄之心母乃誘他財利用肥己口其餘受生經北斗經玉皇寶誥皆近代偽撰謂某星斗是某佛然佛是人天導師出世聖人天帝猶歸依聞法得證須陀洹果佛豈復降為星斗猶天子而為僕𨽾耶習俗不悟禮拜無倦固不獲福而且得誣佛之罪致令識者取笑藏中昔有受生經乃説釋迦如來往劫為鱉王救商人難非今偽造支干生人還受生錢者今道士為人祈福建醮不審誦者何經喃者何語智者自當察之趙石長和趙國高人也年十九時病一月餘日亡家貧未能及時殯殮經四日而蘇説初死時東南行見二人治道在和前五十步和行有遲疾二人治道亦隨緩速常五十步而道之兩邊棘刺森然皆如鷹爪見人甚衆羣走棘中身體傷裂地皆流血見和獨行平道俱歎息曰佛子獨行大道中前至見瓦屋采樓可數千間有屋甚高上有一人形面壯大著皂袍臨窗而坐和拜之閣上人曰石君來耶聞魚龍超精進為信你何所修行和曰不食魚肉酒不經口恆轉尊經救諸疾痛閣上人曰所傳不妄也閣上人問都録主者審案石君名録勿謬濫也主者案録云餘三十年命在閣上人曰君欲歸否和對曰願歸乃敕主者以車騎兩吏送之長和拜辭上車而歸倐忽至家惡其尸臭不欲附之於尸頭立見其亡妹於後推之踣尸面上因得蘇活道人支法山時未出家聞和所説遂定入道之志法山者咸和時人也出冥祥記宋廣陵李旦字世則以孝謹質素著稱鄉里元嘉三年正月十四日暴病死心下不冷七日而蘇含以餘粥宿昔復常云有一人持信幡來至牀頭稱府君教喚旦便隨去直向北行道甚平淨既至城閣高麗似今宮闕遣傳教慰勞問呼旦可前至大廳上見有三十人單衣青幘列坐森然一人東坐披袍隱几左右侍衛可有百餘視旦而語坐人云當示以諸獄令世知也旦聞言已舉頭四視都失向處乃是地獄中見羣罪人受諸苦報呻吟號呼不可忍視尋有傳教稱府君信君可還去當更相迎因此而還至六年正月復死七日還活述所見事較略如先或有罪囚寄語報家説生時犯罪死為作福稱説姓字親識鄉伍得免旦依言尋求皆得之又云甲申年當行疾癘殺諸惡人佛家弟子作八關齋心修善行可得免也旦本作道家祭酒即欲棄符籙本法道民諫制故遂兩事而常勸化作八關齋祭酒道士舊稱為祭酒道益州索寺釋智達行頗流俗而善經唄年二十三宋元徽三年六月病死身暖不殮遂經二日稍還至三日旦而能言視自説始困之時見兩人皆著黃布袴褶一人立于戶外一人徑造牀前曰上人應去可下地也達曰貧道體羸不堪涉路此人復曰可乘輿也言畢而輿至達既升之意識恍然不復見家人屋及所乘輿四望極目但覩荒野途徑艱危示道登躡至于朱門牆闥甚華達入至堂下堂上有一貴人朱衣冠幘據傲牀坐姿貌嚴遠甚有威容左右兵衛百許人皆朱柱刀列森然貴人見達乃斂顏正色謂曰出家之人何宜多過達曰有識已來不憶作罪問曰誦戒廢否達曰初受具足之時實常習誦比逐齋講恆事轉經故於誦戒布薩時有虧廢復曰沙門時不誦戒此非罪何為可且誦經達即誦法華三契而止貴人敕所録達使人曰可送至惡地勿令太苦二人引達將去行數十里稍聞轟磕閙聲沸火而前路轉暗次至一門高數十丈色甚堅黑蓋鐵門也牆亦如之達心自念地獄此其是矣乃大恐怖悔在世時不修業行及大門裏閙聲壯久久靜聽方知是人叫呼之響門裏轉暗無所復見時火光乍滅乍揚見有數人反縛前行後有數人執叉叉之血流如泉其一人乃達從伯母彼此相見意欲共語有人曳之殊疾不遑得言入門二百許步見有一物形如米囤可高丈餘二人執達擲置囤上囤裏有火𦦨燒達身半體皆爛痛不可忍自囤墜地悶絶良久二人復將達去見有鐵鑊十餘皆煮罪人人在鑊中隨沸出沒鑊側有人以叉刺之或有攀鑊出者兩目沸凸舌出尺餘肉盡炘爛而猶不死諸鑊皆滿惟有一鑊尚空二人謂達曰上人即時應入此中達聞其言肝膽塗地乃請之曰君聽貧道一得禮佛便至心稽首願免此苦伏地食頃祈悔特至起而四望無所復見惟覩平原茂樹風景清明而二人猶導達行至一樓下樓形高小上有人才得容坐謂達曰沙門現受輕報殊可欣也達於樓下忽然不覺而蘇達今猶存在索寺也齋戒逾堅禪誦彌固達雖善經唄齋講不免散亂心逐名利復廢布薩誦戒故感地獄報今人出家專以如來無上法寶貿彼世間財利戒律既不關心布薩何有況達云有識已來不憶作罪今時能有幾人請自揣思寧無愧懼哉多寶寺釋道志住北多寶寺衆僧令知殿塔自竊帳蓋等寶飾所取甚衆後遂偷像眉間珠相既而開穿垣壁若外盜者故僧衆不能覺也積旬餘而得病便見異人以戈矛刺之時來時去來輒驚噭應聲流血初猶日中一兩如此其後疾甚刺者稍數傷痍遍體呻呼不能絶聲同寺僧衆頗疑其有罪欲為懺謝始問猶諱而不言將盡二三日乃具自陳列泣涕請救曰吾愚悖不道謂無幽途失意作罪招此殃酷生受楚拷死縈刀鑊已糜之身惟垂哀恕今無復餘物惟衣被氈履或足充一會并頻請願具為懺悔昔偷像相珠有二枚一枚已屬嫗人不可復得一以質錢在陳照家今可贖取道志既死諸僧合集贖得相珠并設齋懺初工人復相珠時展轉回趣終不安合衆僧復為禮拜燒香乃得著焉年餘而同學等於昏夜間聞空有語詳聽即道志聲也自説云自死以來痛備縈毒方纍年劫未有出期賴蒙衆僧哀憐救護贖像相珠故於苦酷之中時有間息感恩無已故暫來稱謝言此而已聞其語時腥腐臭氣苦痛難過言終久久臭乃稍歇此事在泰始末年其寺職事者已具録之沙門僧規者武當寺僧也時京兆張瑜常請僧規在家供養永初元年十二月五日無痾忽暴死二日而蘇自云五日夜五更中聞門巷間嘵嘵有聲須臾見有五人秉炬火執信幡徑來入屋叱咀規規因頓臥五人便以赤繩縛將去行至一山都無草木土色堅黑有類石鐵山側左右白骨填積行數十里至三岐路有一人甚長壯披鎧執仗問曰五人有幾人來答正一人耳五人又將規入一道中俄至一城外有屋數十築壤為之屋前有立木長十餘丈上有鐵梁形如桔槹左右有匱貯土土有品數或有十斛形亦如五升大者有一人衣幘並赤語規曰汝生世時有何罪福依實説之勿妄言也規惶怖未答赤衣人語局吏云可開簿檢其罪福也有頃吏至長木下提一匱土懸鐵梁上稱之如覺低昂吏謂規曰此稱量罪福之稱也汝福少罪多應先受罰俄有一人衣冠長者謂規曰汝沙門也何不念佛我聞悔過可度八難規於是一心稱佛衣冠人謂吏曰可更為此人稱之既是佛弟子幸可度脫吏乃復上匱稱之稱乃正平既而將規至監官前辨之監執筆觀簿遲疑久之又有一人朱衣玄冠佩印綬執玉板來曰算簿上未有此人名也監官愕然命左右收録云須臾見反縛向五人來監官曰殺鬼何以濫將人來乃鞭之少頃有使者稱天帝喚道人既至帝宮經見踐歷略皆金寶精光晃昱不得凝視帝左右朱衣寶冠飾以華珍帝曰汝是沙門何不勤業而為小鬼橫收捕也規稽首諸佛祈恩請福帝曰汝命未盡今當還生宜勤精進勿屢遊白衣家殺鬼取人亦多枉濫如汝比也規曰橫濫之厄當以何方而濟免之帝曰廣設福業最為善也若不辦爾可作八關齋生免橫禍死離地獄亦其次也語畢遣規去行還未久見一精舍大有沙門見武當寺主白法師弟子慧進皆在焉居宇弘整資侍自然規請欲居之有一沙門曰此是福地非君所得處也使者將規還至瑜家而蘇右五出冥祥記今僧好遊白衣家者請觀僧規況其持戒無虧由心涉俗情定慧不存故被殺鬼所録儻其無善可嘉豈遇貴人教令念佛悔過并天帝勉之勸進乎齊仕人時有仕人姓梁甚豪富將死謂其妻子曰吾平生所愛奴馬及諸使用日久稱人意吾死以為殉不然無所乘也及死家人以囊盛土壓奴殺之馬猶未殺奴死四日而蘇説云當不覺去忽至官府門門人因留止在門所經一宿明旦見亡主被鎖兵守衛入官所見奴謂曰我謂死人得使奴婢故遺言喚汝今各自受其苦全不相關今當白官放汝言畢而入奴從屏外窺之見官問守衛人曰昨日壓脂多少對曰得八斗官曰更將去壓取一斛六斗主則被壓牽出竟不得言明旦又來有善色謂奴曰今當為汝白官又入官問得脂耶對曰不得官問何以主司曰此人死三日家人為請僧設會每聞經唄聲鐵梁輒折故不得也官曰且將去主司白官請官放奴即喚放俱出門主遣奴傳語其妻子曰賴汝等追福獲免大苦然猶未脫更得造經像以相救濟冀因得免自今後勿設祭既不得食而益吾罪言畢而別奴遂重生而具言之家中果以其日設會於是傾家追福合門練行出冥報拾遺今有殉葬者覩斯當醒免橫死他自加重罪周拔虎武帝好食雞卵一食數枚有監膳儀同名虎常進御食有寵隋文帝即位猶復監膳開皇中暴死而心尚暖家人不忍殯之三日乃蘇能語先云輿我見至尊為武帝傳説忽見人來喚隨至一處有大地穴才到穴口見周武帝儀同拜之帝曰王喚汝證我事耳使者令儀同拜王王問曰汝為帝作食前後進白團幾枚儀同不識白團顧左右左右曰雞卵名白團也儀同即答帝食白團實不記數王謂帝曰此人不記當須出之帝慘然不樂而起忽見庭前有鐵牀并獄卒數十人皆牛頭人身將帝臥牀上獄卒用鐵梁壓之帝兩脅剖裂處雞子全出俄與牀齊可十餘斛乃盡王命數訖牀及獄卒忽然不見臨外祖齊公親見儀同歸家具説出冥報記隋冀州外邑中開皇初有小兒年十三常盜鄰人雞卵燒煨食之後一朝村人未起聞外有人扣門呼此兒聲父令兒出應之見一人云官喚汝因引兒出村南舊是桑田耕訖未下種小兒忽見道右有一小城四面門樓丹素甚嚴兒怪曰何時有此城使者呵之勿言因至城北門令小兒前入小兒入閫城門忽閉不見一人惟是空城地皆熱灰碎火深才沒踝小兒忽呼叫走趣南門垂至即閉又走趣東西亦皆如是未至則開既至便闔時村人出採桑男女甚衆皆見此兒在耕田中口似啼聲四方馳走皆相謂曰此兒狂耶旦來如此遊戲不息至食時採桑者皆歸兒父問曰見吾兒否桑人答曰兒在村南走戲喚不肯來父出村外遙見兒走大呼其名一聲便住城灰忽然不見見父而倒號泣言之視其足半脛已上血肉燋乾其膝已下洪爛如炙抱歸養療髀以上肉如故膝以下遂為枯骨鄰里聞之競來問由答見如前諸人看其走處足迹通現了無灰火良因罪業觸處見獄於是邑人男女無揀大小皆持齋戒至死無虧有大德僧道慧法師本冀州人具為臨説同其鄰邑言也出冥報記是知地獄無處不有但受罪者自見之耳京兆開皇八年杜祈死三日而蘇云見閻羅王問曰卿識周武否答曾任左武侯司法甚識王命一吏引至一鐵屋於鐵窗中見武帝身極瘦作鐵色著鐵枷鎖泣曰大家何因苦困乃爾答曰我大遭苦困今得在此大是快樂祈曰作何罪業受此苦困帝曰我以信衛元嵩言毀廢佛法故受此苦祈曰何不注引元嵩來帝曰我曾注之然曹司處處搜求乃遍三界不見若其朝來我暮得脫卿還語世人為元嵩作福早來相救如其不至解脫無期祈蘇以冥事勸助作福云出冥報記及續高僧傳元嵩益州人少出家聰潁不偶徉狂漫走觸物摛詠周歷二十餘年人莫知測此亦權乘逆行菩薩如提婆達多等孰能測哉文昌大府寺丞趙文昌於開皇十一年內身忽暴死至於數日惟心尚暖家人不敢入殮後時得語眷屬怪問文昌説云吾死已有一人引至閻羅王所語昌云汝一生已來作何福業昌答云家貧無物可營功德惟專心誦持金剛般若王聞此語合掌斂膝讚言善哉善哉汝能受持般若功德甚大不可思議王語所執之人好須勘當莫令錯將人來使人少時之間勘當知錯即報王言此人實錯計活更合二十餘年王聞此語即語使人汝引文昌向經藏內取金剛般若經將來使人受教即引文昌向西行五里得到藏所見數十間屋甚精華麗其中經卷皆悉遍滿金軸寶帙莊飾極好文昌見已善心彌發一心合掌閉目信手抽取一卷大小似舊誦者文昌忙怕恐非般若求使却換使人不肯然見題云功德之中最為第一昌即開看乃是金剛般若文昌歡喜將至王所王令一人執卷在西昌令東立面向經卷遣昌誦經使人勘試一字不遺並皆通利時王放昌還家仍約束昌云汝勤受持此經勿令廢忘令一人引昌從南門出欲至門首便見周武帝在門東房內頸著三重鉗鎖即喚昌云汝是我本國人暫來至此須共汝語文昌見喚即走至武帝所便即拜之帝曰汝識我否昌云臣昔宿衛陛下奉識陛下帝云卿既是我舊臣汝今還家為吾具向隋文皇帝説吾諸罪並欲辨了惟滅佛法罪重未可得竟當時以衛元嵩教我滅佛法比來數追元嵩未得以是不了昌問元嵩何處去王追不得帝云吾當時不解元嵩意錯滅佛法元嵩是三界外人非是閻羅王所能管攝以此追之不得汝語隋帝乞吾少物營修功德冀望福資得出地獄昌受囑辭行少時出南門外見一大糞坑中有一人頭髮片出昌問引人此是何物引人答云此是秦將白起坑趙卒寄禁此中罪報未了引人將昌至家得活昌經三日所患漸瘳昌以此事具奏文帝文帝出敕遍國內人出一錢為周武帝轉金剛般若經兼三日持齋仍敕録此事入於隋史出隋史及冥報記齊州靈巖寺文帝十六年釋道相暴亡至冥府見勢至菩薩引觀地獄有榜云沙彌道弘為衆僧作餛飩先盜食一鉢當墮鐵丸地獄然弘數年口瘡聞相説乃為衆僧設供如彼所見有三十餘人罪報道相七日內十三度死見菩薩指示罪報相以語諸人即各賠償獄榜隨滅又見一榜題云此人盜僧杏樹截作梳材寺僧道郭拾得殘木一橛仍堪作梳直八十錢當墮火燒地獄相還説之郭聞説即時償還又煬帝二年僧道明亡同房僧玄緒暮行野間忽見寺往投之遇道明不異平日見衆僧粥皆作血色舉體火然緒具問之明曰此是地獄吾為取僧柴一束煮染色忘不賠償當一年然足受罪褰衣見膝下並焦黑因曰公幸為我買柴百束賠還常住并寫法華經一部可得免苦緒許之歸寺依言為辦重往尋寺寂無所見出僧鏡録雍州長安縣趙文若於大業中死經七日家人大斂將欲入棺乃縮一腳家人懼怕不敢入棺文若得活眷屬喜問所由文若報云當死之時見人引向閻羅王所問文若汝生存時作何福業文若答曰受持金剛般若經王歎云善哉此福第一汝雖福善且將汝示其受罪之處令一人引文若北行十步至一牆孔令文若入孔隔壁有人引手從孔中捉文若頭引出極大辛苦得度牆外見大地獄鑊湯苦具罪人受苦不可具述乃有衆多豬羊雞魚鵝鴨之屬競來從文若債命文若云吾不食汝身何故見逼諸畜生等各報云汝往日時某年某月某處食我頭腳四支節節分張人各飲噉何故諱之文若見畜引實不敢拒逆惟知一心念佛深悔諸罪不出餘言乃求諸畜我得活時具修福善報謝諸畜見為修福一時放却其引使人將文若至王所説見受罪處訖王付一碗釘令文若食之并用五釘釘文若頭頂及以手足然後發回文若得蘇具説此事極患頭痛及手足痛久後修福痛漸得瘥從爾已來精勤誦持金剛般若不敢遺漏寸陰但見道俗親疏並勸受持般若後因使至一驛廳上暫時偃息似如欲睡于時夢見一青衣婦女急速而來請救乞命文若驚寤即喚驛長問云汝不為吾欲殺生否驛長答云實為公欲殺一小羊文若問云其羊作何色答云是青牸小羊文若語云汝急放却吾與價直贖取放之良由般若威力冥資感應也問曰今人一生已來烹宰六畜魚鳥等難以數計又諸劫賊殺害人民不可計算何以暴死還蘇者不見一人耶答曰彼等罪重諸人捨身即入八寒八熱大地獄中長劫受苦難有出期故無人能見今死而復蘇皆是邊獨小地獄耳即小地獄而罪重者亦難得見如上子鄰法師母及下慧如同學之類是也京城真寂寺沙門慧如少精勤苦行師事信行信行亡後奉遵其法隋大業中因坐禪修定遂七日不動衆皆歎異之以為入禪定也既而慧如開目涕泣交流僧衆怪問之答曰火燒腳痛待視瘡畢乃説衆皆詰問慧如曰被閻羅王請行道七日滿王問須見先亡知識否如答欲見二人王即遣喚一人惟見龜來舐慧如足目中淚出而去更一人者云罪重不可喚令就見之使者引慧如至獄門門閉甚固使呼守者有人應聲使者語慧如師急避道莫當門立如始避而門開大火從門流出如鍛星火迸著如腳被燒之舉目視門門已閉訖竟不得相見王施絹三十匹固辭不許云已遣送後房衆僧爭往房視之則絹在牀矣其腳燒瘡大如錢百餘日乃愈右二出冥報記真寂寺即今化度寺是也音釋鶩音務野鴨鴟梟上音笞惡鳥食小鳥下音驕不孝鳥大則食其母嫗音據去聲老婦也灌佛浴佛經説人浴佛施錢寶當分三分一供佛二供經法三供僧用炘音欣熱也又光盛也桔槹上音戞下音高汲水機也殉音徇古或以土或木作偶人同殉葬末世無知以人同葬也囤音豚聚米穀器俗名穀圍餛飩上音魂下音吞去聲厚味或或米粉作內有饀或圓或匾亦名匾食裨音悲補也益也附也噭同叫晃昱上音黃上聲寬明也下音欲日光寧波府鄮縣附郭鄮音茂烏石山在鄮山阿育王寺東南十里石上有袈裟紋明顯可觀吳中石像一維衛佛即毗婆尸佛一迦葉佛浮海而來在蘇州城內開元寺康熙九年有寄住僧法慧募人裝金使工匠改像為時相全失本真不久法慧與匠人俱亡十九年余到開元設供瞻禮惋慨無已矣塔梵語塔波或云窣堵波或云浮圖華言聚相是藏佛舍利之冢謂如來於三大無數劫福慧熏修衆德之餘聚成舍利或如來成道説法等處皆建塔以表遺迹或有舍利或無舍利悉名佛塔使人天瞻仰滅罪生福此方不達以為風水始由浙江錢塘江每年數次潮水忽至浪頭湧高二三丈溺舟壞舍忠懿王使力士射之不息永明壽禪師勸王建六和塔江邊鎮之其潮遂寢今時潮至浪高不過數尺因此後人效之以為風水亦由如來德所加被福人然須潔淨不可穢污方有徵驗舍利此云佛身靈骨釋迦如來涅槃以悲願力從𮌎湧出三昧火而焚金軀成末舍利八斛四斗大如豆或如麻能放光現瑞變化非一天上人間龍中起塔供養滅罪生福雖云八斛四斗然亦出於數量之表凡有緣求者皆得之八難一地獄二畜生三餓鬼四長壽天五北俱盧州六盲聾瘖啞七世智辨聰八生在佛前佛後此八皆為障道不得見佛聞法故名為難八關戒齋一不殺生二不偷盜三不淫欲四不妄語五不飲酒六不著香華鬘不香塗身七不歌舞倡妓不往觀聽八不坐臥高廣大牀九不非時食前八名戒後一午後非時不食名齋合名八關戒齋惟聽一日一夜受或六齋日受或十齋日受或隨有暇日即受要從戒師明曉戒律者受由受持此戒即關閉地獄餓鬼畜生三惡道門為人天路出世因成佛作祖之根本功德不可思議詳載諸經論及八長養功德經今亦集已成秩名八關齋法齊武帝永平元年帝幸華林園設八關齋戒帝微時避難揭陽山中纍石為浮圖忽有一樹生其側狀如華蓋後帝不豫詔諸沙門祈佛七日天香滿殿梁高祖武帝造光宅同泰寺國內普持六齋八戒周孝宣帝重隆佛日造素像四龕一萬餘軀寫般若經二千卷六齋八戒常弘不絶魏孝武文帝諱日上中興寺建八關齋中食竟從臣袁敏孫等更進魚肉帝怒並與免官詔六宮舍女皆持年三長齋月六日受齋戒隋文帝開皇十年歲旱詔曇延法師率衆祈雨雨不降帝問何故對曰事由一二帝遣京尹蘇成問一二之意延曰陛下躬萬機之政羣臣致股肱之力雖通治體然俱愆玄化欲雨不雨事由一二也帝識其意敕有司擇日於正殿設儀請延升御座授八戒羣臣以次受訖方炎如焚而大雨沛然傾注帝悅自是延每入朝必親手奉御饌供之詔興法師入太與殿授菩薩戒復詔天下正五九月及六齋日不得殺生命開皇十三年冬十月智者大師過嶽州為刺史王宣武授戒法沙門曇捷等請講金光明經其俗聞法感化一郡五縣一千餘所咸捨漁捕晉簡文帝有烏巢太極殿召曲安遠筮之曰西南女人師能除此怪時尼道容住歷陽烏江寺召見帝以華置席下驗其凡聖容所坐華不萎謂帝曰陛下當奉行八關齋戒自然消弭災怪帝如言行之羣烏運巢而去敕建新林寺以居之侍郎白居易字樂天自號香山居士嘗勸一百四十八人結上生會在鉢塔寺依如大師受八關齋戒九度建業即金陵秦併天下改為秣陵吳時改為江寧府高宗改建康南聚寶門外直道名長干街因名長干塔永樂改為報恩塔僧史略云晉孝帝中劉薩訶至丹陽望見長干有異氣於光處掘地得舍利三顆爪髮各一於是造塔一級藏之後增至三級康僧所求舍利亦藏其中梁天監元年立長干寺出塔舍利及爪髮髮青紺色伸之隨手長短放之則屈為蠡形於是高大其塔名阿育王塔元末永樂十年重建純用五色琉璃磚瓦凡九級每級八門舉高十四丈照耀雲日上設黃金珠寶頂其輪相露盆鈴鐸皆用銅今無知者易為鐵塔時放光或燈或佛或聲震如雷也丹陽縣在鎮江府東南九十里鎮江府在金陵東南三百里附雲蓋山釋守顒因供僧資物有餘而僧無食堂念曰既無食堂可將僧餘物造堂以供僧食遂造之後代住持智禪師夜坐丈室忽聞焦灼氣及枷鎖聲視之乃有荷火枷者枷尾倚於門閫智驚問曰汝為誰答前住當山守顒也不合將供僧物造僧食堂故受此苦望為估直食堂填設僧供乃可免耳智如其言為償之一夕夢顒謝曰賴師力獲脫地獄生人天中三生後復為僧今門閫燒痕猶存出僧傳并人天寶鑑
