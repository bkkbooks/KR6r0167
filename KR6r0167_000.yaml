front:
  text: 六道集敘世俗日下則立教者日勞舜之命禹曰人心惟危而孟子則曰人之所以異於禽獸者幾希葢聖賢相告其詞宜簡而該與流俗人言則其詞宜詳而近勢則然也佛說六道之旨以窮一心之變極幽明之故可謂痛哭流涕而後之人猶漠然視之吾鄉在犙和尚乃為採古今近事家喻戶曉者著以為六道集葢為未悟人說法不得不然吾謂人所以迷而不悟者有二端其一曰吾人也何至流為異物其一曰人生快意耳遑恤他生然就其一日之間一念之頃已不知幾為天幾為人幾為畜生餓鬼誠得秦鏡懸之於前使其肝膽畢呈意念盡露六道之變相紛紜交錯一時並見於胸臆之中庶其懼而知返乎在和尚博極羣書著述數十種年將七十而緝此集其指愈淺其憂愈深讀者毋徒視為虗誕之談而忘其為肝膽之照也羅浮陳恭尹拜題六道集序和尚本乘願力來冲齡入道辯才汜濫文字縱橫早年曲唱新豐調高千古中歲光韜韶石藏究三車不欲出世為人爭奈龍天弗肯尋住鼎湖方丈遂令聲價難醻然卒不樂久居旋臥象林深處意謂靈山會上笑拈花者不過一人丁此末法時中棒投機者屈寧多指矧諸方既富煉凡大冶爐火方紅我這裡不妨退步潛身煙霞共老與其一期說法度有限之眾生孰若多著要書利無窮之後學于是始從韶石終至象林中間五十幾白奚啻億萬餘言龍也何幸受益良多獨恨鈍根少領玄趣然最愛其六道一集痛醒羣蒙夫影必隨形谷必畣響種瓜不得豆結果定從因此理勢之所必然然俗漢恬不之覺和尚不舍慈悲悲夫眾迷於六道輪迴靡艾也猛然拈出示之昭昭然如揭日月而行無幽不燭普使人人深知報應不爽因果無差皆能回光返照各辦前程者功不在菩薩下也龍敢不服膺拳拳乎僅再拜颺言而序其上旹康熈二十一年壬戌東莞弟子李龍標頓首拜題六道集總目卷一天道卷二人道阿修羅道卷三鬼神道卷四畜生道地獄道卷五地獄道之餘六道集目錄卷一天道述言述諸經文法句喻經天竺無著菩薩孫稚董青建歷陽張應襄陽史世光江陵釋黃遷酒泉郡伯裘武帝妃郗氏蜀郡沙門慧韶中天竺沙門勒那湘州釋玄景潞州辛彥之海東玄光禪師京師子鄰法師壽州玄宗禪師長安道宣律師嵩山破竈墮和尚循州北山神于闐國沙彌廣州陳公孺卷二人道述諸經文三教平心論正見經轉輪五道經優婆塞戒經二教論五王經善見律雜事律舊雜譬喻經法句喻經經律云賢愚經度狗經天竺蝙蝠泰山羊祜瑯琊王練吳興向靖餘杭曇翼宋武帝崑崙山曇諦法師北代乘禪師趙州雌雉宣帝元帝博陵崔彥武太山客僧徐陵智威禪師天台智環汾州劉善經母湘州趙宗孫蘄州五祖并州二鴿兒莊惠太子登州鶴喙女沙門釋牛雲回向寺釋法秀壽州毛賴債興元間韋皋龍懷寺曇相法師衡嶽寺知𧦪法師東都沙門圓澤吳郡齊君佐宋仁宗滁州張方平公亮東坡山谷燕都僧福安紹興釋大同浙江管春羅定州東安縣令惠州韓耳叔湖廣雉兒潮州篐桶翁譚景升南唐邊鎬南宋高宗阿修羅道集諸經文清辯論師娶修羅女大頭仙人卷三鬼神道釋名牟子天地本起經順正理論正法念經雒陽安世高交趾何敞阿登河陰曇遼太山法相法師陳國袁無忌長安慧嵬禪師廬山曇邕法師竺曇遂始豐曇蘭禪師瑯琊王凝之妻淮南胡茂回秦主姚萇高平李羨奴河內司馬文宣長安王胡滎陽鄭鮮之京師慧果法師王文明東海何澹之張乙襄城李頤會稽弘明法師靈苑曇超禪師楊州道昶南陽宋定伯瑯琊法度法師汾州釋曇鸞河南王彥偉趙郡眭仁蒨濩澤縣李錄事武帝洛州任五娘姚明解博陵崔軏京兆殷安仁嵩嶽元珪禪師高祖皇帝徽州思叔廣州張姓廣信能仁寺廣州張一鵬東莞錢公子廣州張妙順德螺岡仙媛西湖真觀法師姑蘇曹魯川釋法聰唐慧稜海昌村卷四畜生道述名大法炬經法句喻經天竺兒烏梓潼杜願男沙門攴遁宜州皇甫遷楊州卞公洛陽王五戒驢冀州耿伏生母京兆韋慶植女長安趙大文宗蛤蜊京都王會師母并州李信母汾州路伯達韶州劉村狗紹興婦變猪廣州鼈寶錄諸經文順德馬翁芝地獄道列名提謂經清河趙泰沙門支法衡并州劉薩訶上虞唐遵武昌程道惠巴丘縣舒禮長安法祖石長和廣陵李旦益州釋智達多寶寺釋道志沙門僧規仕人姓梁拔虎監膳儀同冀州小兒京兆杜祈文昌齊州釋道相雍州趙文若京城釋慧如雲蓋山釋守顒卷五地獄道京兆王明幹兖州皇甫氏陳郡許氏遂州孔恪馮翊李山龍新羅國釋順璟括州任義方西京慧恩法師遂州趙文信河東柳智感京師釋智興咸陽梁婦女武昌戴天胄華州張法義扶風傅奕魏州齊士望曹州裴則雍州楊師操博陵宋行質隴西李思一雍州程普樂鄭師辯坊州王懷智汾州劉摩兒雍州高法眼長安劉公信蕭氏蕭鏗女西京英禪師汾州釋惠澄華陰鄧元英御史馮忠武功蘇珪妻江南高皇帝世宗六一毆陽修贑州劉須微湖廣康元度廣州蔡等實韶州楊舒一盧陵陳忠赤廣東梁子球廣州羊城惡婦順德縣李氏順德陸業卿趙定宇禮像六道集述言夫三界定位六道區分皆由最初一念識心倐起而妄想結成有漏之因故有三世循環十二緣生托質則形分麤細感報則苦樂殊途三界六道莫非生滅人間天上誠為苦本是故智人啟悟妙契無生頓超三有踐履十地息生死之源處無為之迥脫輪迴長辭苦趣此集之由作也冀諸智者知三界之無恒識六趣之非久標志上乘希求出世遠劫火之燒然免淪墜之沉溺達今生所受之果仍酬往昔之因果復造因因移果熟輪轉六道往還三界所謂欲色無色界也下極金剛際上至他化天中間六趣雜居一切有情未離貪欲故名欲界自梵眾天上至色究竟天此一十八天雖離欲染尚有色質正報身相如白銀色依報宮殿真金赤色身光互照故名色界自空處天至非非想天人同碧落界若虗空四蘊成身無色蘊故故名無色界如斯三界亦名三有以其因屬有漏果係有為有生有死故也言六道者亦名六趣趣者名到謂彼所作善惡業因道能運到其所趣處故名為趣又趣者是歸向義謂所造之業歸向人天修羅鬼畜地獄之處此之界趣既由識心結成情器世間若達心源情器俱殞悟本真常生死斯絕生死真常元無二路祇在當人一念一念不生三界六道無投足處矣情世間者謂一切有情眾生皆假五陰和合眾共而生各各差別不同故名情世間器世間者謂一切無情世界皆假山河大地而成各各差別不同故名器世間康熙己未自恣日寶象林沙門弘贊識
