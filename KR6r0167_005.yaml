body:
  text: 廣州南海寶象林沙門弘贊在犙輯唐京兆王明幹素不修善因患暴死將入地獄見一僧教誦偈云若人欲了知三世一切佛應當如是說心造諸如來誦此偈者能排地獄諸苦其人誦已乃入見王即誦偈當誦偈時聲所至處受苦之人皆得解脫王遂放免其偈是晉譯華嚴經文與唐譯華嚴經下二句稍別出纂靈記華嚴感應傳云郭神亮為冥使者追至平等王所因誦上四句偈王即放還又有一人入地獄將受罪即唱云南無大方廣佛華嚴經凡聞者悉出地獄由是而蘇故今以此二事置晚課施食之初也兗州曲阜人倪氏買得妻皇甫氏為有疾病祈禱泰山稍得瘳愈因被冥道使為伺命每被使即死經一二日事了以後還復如故前後取人亦衆自云曾被遣取鄉人龐領軍小女為其庭前有齊壇讀誦久不得入少間屬讀誦稍間後因執燭者詣病女處乃隨而入方取得去問其取由乃府君四郎所命府君不知也論說地獄具有條貫又云地下訴說生人非止一二但人微有福報追不可得如其有罪攝之則易皇甫現被使役至今猶存今其夫作生伺命者兖州亦見有三四人但不知其姓名耳出冥報拾遺陳郡謝弘敬妻高陽許氏武德初年遇患死經四日而蘇說云被二三十人拘至地獄少間有吏抱案引入見王問曰汝解絃管否許云不解王曰宜早放還不須留也執案人云娘子功德力雖強然為先有少罪隨便受却身業俱淨豈不快哉更別引入一大院其門極小亦多見有人受罪許甚驚懼乃求於執案者曰生平修福何罪而至斯耶答曰娘子曾以不淨碗盛食與親須受此罪方可得去遂以銅汁灌口非常苦毒時見姑夫沈吉光語云可於此執案主人處受一本經記取將歸受持勿怠自今已去保年八十有餘許生曾未誦經蘇後遂誦得經一卷詢訪人間所未曾有今見受持讀誦不輟其經現在文多不載比蘇活時口內焦爛許之從父弟仁則說之云爾遂州總管府記室參軍孔恪武德中暴病死一日而蘇自說被收至官所問何故殺牛兩頭恪云不殺官曰汝弟證汝殺何故不認因呼恪弟弟死已數年矣既至枷械甚艱官問汝所言兄殺牛虗實弟曰兄前奉使招慰獠賊使我殺牛會之實奉兄命非自殺也恪曰使弟殺牛會獠是實然國事也恪有何罪焉官曰汝殺會獠以招慰為功用求官賞以為己利何云國事也因謂恪弟曰以汝證兄故久留汝兄今既遣汝殺汝便無罪放任受生言訖弟忽不見亦竟不得言敘官又問恪因何復殺兩鴨恪曰前任縣令殺鴨供官客耳豈恪罪耶官曰官客自有料無鴨汝以鴨供之將以美譽非罪如何又問何故復殺雞卵六枚曰平生不食雞卵惟憶年九歲時寒食日母曾與六卵因煮食之官曰然欲推罪母麼恪曰不敢但說其因耳此自恪殺之也官曰汝殺他命當自受之言訖忽有數十人皆來執恪將出去恪大呼曰官府亦大枉濫官聞之呼還曰何枉濫恪曰生來有罪皆不見遺生來修福皆不見記者豈非濫也官問主司恪有何福何為不録主司對曰福亦皆録量罪多少若福多罪少令先受福罪多福少先令受罪然恪福少罪多故未論其福官怒曰雖先受罪何不唱福示之命鞭主司一百倐忽鞭訖血流濺地既而唱恪生來所修之福亦無遺者官謂恪曰汝應先受罪我更令汝歸七日可勤追福因遣人送出遂蘇恪大集僧尼行道懺悔精勤苦行自說其事至七日家人辭決俄而命終臨家兄為遂府屬故委之也馮翊李山龍為左監門校尉以武德中暴亡而心上不冷如掌許家人未忍殯殮至七日而蘇說云當死時被冥收録至一官曹廳甚弘壯廣大庭內有囚數千人或枷鎖或杻械皆北面立滿庭中吏將山龍至廳下天官坐高牀侍衛如王者山龍問吏此何官吏曰是王也山龍前至階下王問汝生平作何福業山龍對曰鄉人每設齊講恆施物同之王曰汝身作何善業山龍曰誦法華經兩卷王曰大善可升階既升廳上東北間有一高座如講座者王指座謂山龍曰可升此座誦經山龍奉命至側王即起立曰請法師升座山龍升座訖王乃向之而坐山龍開經曰妙法蓮華經序品第一王曰請法師止山龍即止下座復立階下顧庭內向囚已盡無一人在者王謂山龍曰君誦經之福非惟自利乃令庭內衆囚皆以聞經題獲免豈不善哉今放君還去山龍拜辭行數十步王復呼還謂吏曰可將此人歷觀諸獄吏即將山龍東行百餘步見一鐵城甚廣大上屋覆其城城傍多有小窗或大如小盤或如盂碗見諸男女從地飛入窗中即不復出山龍怪問吏曰此是大地獄中多有分隔罪計各異此諸人者各隨本業赴獄受罪耳山龍聞之悲懼稱南無佛請吏求出至院門見一大鑊火猛湯沸傍有二人坐睡山龍問之二人曰我罪報入此鑊湯蒙賢者稱南無佛故獄中諸罪人皆得一日休息疲睡耳山龍又稱南無佛吏謂山龍曰官府數移改今王放君去可白王請抄若不爾恐他官不知復追録君山龍即詣王請抄王命紙書一行字付吏曰為取五道等署吏受命將山龍更歷兩曹各廳事侍衛亦如此王乃遣吏皆取其官署各書一行訖付山龍龍持出至門有三人謂山龍曰王放君去可不多少乞遺我等山龍未言吏謂山龍曰王放君不由彼然彼三人者是前收録君使一是繩主當以赤繩縛君者一是棒主當以棒擊君頭者一是袋主當以袋吸君氣者見君得還故乞物耳山龍惶懼謝三人曰愚不識公請至家備物但不知何處送之三人曰於水邊若樹下燒之山龍許諾吏送歸家見親眷正哭經營殯具山龍入至尸傍即蘇後日剪紙作錢帛并酒食自送水邊燒之忽見三人來謝曰蒙君不失信重相贈遺愧荷言畢不見山龍自向總持寺主說寺主傳向臨說右三出冥報記新羅國釋順璟者樂浪郡人也本土之氏族東夷之家系璟在本國稍多著述亦有傳來中原者其所宗法相大乘了義教也見華嚴經中始從發心便成佛已乃生謗毀不信即云當啓手足命弟子輩扶掖下地地則徐裂璟身俄墜時言生身陷地獄焉于今見坑廣長丈餘號順璟捺落迦也出宋高僧傳璟既宗大乘經教豈不見法華經云一稱南無佛皆已成佛道圓覺經云衆生本來成佛而獨疑於華嚴既不知教外別傳之宗寧不識圓頓之旨景實未深悟了義之教唯以文字見解自取坑陷歟括州刺史樂安任義方武德年中死經數日而蘇自云被引見閻羅王王令人引示地獄之處所說與佛經不殊又云地下晝夜昏暗如霧中行于時其家以義方心上少有溫氣遂即請僧行道義方乃於地下聞𮘗經讚唄聲王檢其案謂吏曰未合即死何因錯追遂放令歸義方出度三關關吏皆睡送人云但尋唄聲當即到舍行見一大坑當道意欲跳過遂落坑中應時即起論說地獄𦘕地成圖其後所得俸祿皆造經像曾寫金剛般若千餘卷是義方自說出冥報拾遺隨願往生經云普廣菩薩白佛言若善男女未終之時逆修生七然燈懸幡請僧轉經得福多否佛言其福無量又曰父母宗族命終受苦為其修福得福多否佛言七分獲一緣前生不信道德故若以亡者嚴身之具乃至屋宅園林以施三寶可地獄之苦由亡者知己物而生喜也按夷堅志云鄂渚王媼常買紙錢作寄庫令僕李大代書押媼亡李忽得疾仆地三日蘇云為陰府捕至庫所令認押字李曰此我代主母所書也引見金紫官問答如初官曰但追證此事可令回將出媼至大喜曰荷汝來我寄庫錢方有歸也今人有好營預修者皆做此然營預修當如往生經作實功德及自持齊修善祈生人天或一心念佛往生淨土脫離生死豈可預為地獄計耶倘有重罪閻王無私紙錢奚能贖脫然則造惡者多買紙錢贖罪富者可為貧人縱有小罪難免智者詳之西京大莊嚴寺慧恩法師稟靈溫裕清鑒倫通於陳太建八年安居之始忽感幽使云王請法師部從相喧絲竹交響當即同氣捨壽體如平日時經七夕若起深定學徒請問乃云試看箱內見有何物尋檢有絹兩束因曰此為䞋遺重問其故曰妄想顛倒知之何為吾被閻羅王命講大品般若於冥道中見地獄衆相五苦次第非大慈該幽顯行極感通豈能起彼冥祗神遊異域者矣以貞觀元年卒春秋八十有九出唐高僧傳遂州趙文信貞觀元年暴死三日後還蘇即自說云初死之日被人遮擁驅逐將行同伴十人並共相隨至閻羅王所其中見有一僧王先喚僧問云師一生已來修何功德答云貧道從生已來惟誦金剛般若王聞此語忽即驚起合掌讚言善哉善哉師審誦般若當得升天出世何因錯來至此王言未訖忽有天童來下引師上天去王後喚文信前汝從生已來修何功德報言臣一生已來不修功德惟好庾信文章集録王曰其庾信者是大罪人現此受苦汝見庾信頗曾識否報云雖讀渠文章然不識其人王即遣人引出庾信令示之乃見一龜身一頭多龜去少時現一人來語云我是庾信為生時好作文章妄引佛經糅雜俗書誹謗佛法謂言不及孔老之教今受罪報龜身苦之極也文信活已具向親說遂州之地人多好獵採捕蟲魚遠近聞者共相鑒戒永斷殺業各發誠心受持般若迄今不絶河東柳智感以貞觀初為長舉縣令一夜暴死明旦而蘇說云始忽為冥官所追至大官府使者以智感見已謂感曰今有一官闕故枉君任之智感辭以親老且自陳福業未應便死王使勘之籍信然因謂曰君未當死可權判録事智感許諾謝吏引退至曹曹有五判官連坐感為第六其廳事是長官人坐三間各有牀案務甚繁冗西頭一坐處無判官吏引智感就空坐羣吏將文書簿帳來置案上而退立階下智感問之對曰氣惡逼公但遙以案中事答智感省讀其如人間者於是為判句文有頃食來諸判官同食智感亦欲就之諸判官曰君既權判不宜食此感從之竟不敢食日別吏送智感歸家蘇而方曉自歸家中日暝吏復來迎至彼而旦故知幽顯晝夜相反矣於是夜判冥事晝臨縣職遂以為常歲餘智感在冥曹因起至廁於堂西見一婦女年三十許姿容端正衣服鮮明立而掩涕智感問是何人答曰妾是興州司倉參軍之婦也攝來此方別夫子是以悲傷智感以問吏吏曰官攝來有所案問且以證其夫事爾智感因謂婦人曰感長舉縣令也夫人若被勘問幸自分疏無謂牽引司倉若死無益夫人婦人曰誠不願引之恐官相逼耳感曰夫人幸勿相牽可無逼迫之虞婦人許之既而智感還州先問司倉婦有疾否司倉曰吾婦年少無疾患智感以所見告之說其衣服形貌且勸令作福司倉走歸家見其婦在機中織無患不甚信之後十餘日司倉婦暴疾死司倉始懼而作福禳之智感每於冥簿見其親識名狀及死時日月報之使修福多得免智感權判三年其部吏來告曰已得隆州李司戶授正官以代公不復判矣智感至州因告刺史李鳳遣人往隆州問而司戶已亡問其死日即吏來告之時也從此遂絶州司遣智感領囚送京至鳳州界囚四人皆逃智感憂懼捕捉不獲夜宿於傳舍忽見其故部吏來告曰囚盡得矣一人死三人在南山西谷中並已擒縛願公勿憂言畢辭去智感即請人兵入南山西谷果得四囚囚知走不免因來拒抗智感格之殺一囚三囚受縛果如所告知感今在南任慈州司法光祿卿柳亨為臨說之亨為卬州刺史見智感親問之然御史裴同節亦云見數人說如此爾右二出冥報記噫人未死而魂已入幽途逮非一也昔有一人暴死入獄見同鄉僧在獄以釘釘其頂門既蘇往寺見其僧頂患大瘡極苦痛因為說在獄事云京師大莊嚴寺釋智興洛州人也謙約成務勵行堅明依首律師誦經持律心口相弔不輟昏曉至大業五年仲冬次當維那鳴鐘依時僧徒無擾同寺僧名三果者有兄從煬帝南幸江都中路身亡初無凶告通夢其妻曰吾行達彭城不幸病死由齊戒不持今墮地獄備經五苦辛酸不能具述誰知吾苦賴以今月初日蒙禪定寺僧智興鳴鐘發響聲振地獄同受苦者一時解脫今生樂處思報其恩汝可具絹十匹早奉與之并陳吾意冀禮殷誠從眠驚寤怪夢所由與人共說初無信者尋入重夢咸陳前說後經十日凶告奄至恰與夢同果乃奉絹與之而興自陳無德並施大衆寺主恭禪師等合寺大德咸問興曰何緣鳴鐘乃感斯應興曰余無他術見付法藏傳云罽賓王受苦由鳴鐘得停及增一阿含經鳴鐘偈福敬遵此事輒力行之嚴冬登樓風切皮肉僧給羔袖用執鐘椎興自勵意露手鳴椎掌中傷破不以為苦兼鳴鐘之始先發善願願諸賢聖同入道場同受法食然後三下將欲長打如先致敬願諸惡趣聞此鐘聲俱得離苦速得解脫如斯願行智常奉修豈欲徹誠遂能遠感衆服其言倍驗非謬以貞觀六年三月遘疾少時自知後世捨緣身資召諸師友因食陳別尋卒出續高僧傳昔罽賓國王性好殺戮惡報當墮地獄因聞馬鳴菩薩說法罪轉輕微死墮大海中作千頭魚劍輪繞身截頭隨截隨生須臾之間頭滿大海聞寺鳴犍稚聲劍輪停空苦痛少息時有羅漢充維那鳴犍稚王遣信令長打羅漢遂長打令聲延久過七日受苦便畢增一阿含經云若打鐘時願一切惡道諸苦並皆停止若聞鐘聲兼說偈讚得除五百億劫生死重罪咸陽有一婦女姓梁貞觀年中死經七日而蘇自云被人收將至一大院內見有大廳有一官人據案執筆翼侍甚盛令人勘問云此婦女合死以否有人更齎一案勘云與合死者同姓名所以追耳官人敕左右即欲放還梁白官人云不知梁更別有何罪請即受罪而歸官人即令勘案云梁生平惟有兩舌惡罵之罪更無餘罪即令一人拔舌一人執斧斫之日常數四凡經七日始送令歸初似落深崖少時而睡覺家人視其舌上猶大爛腫從此已後永斷酒肉至今猶存出冥報拾遺武昌戶部尚書武昌公戴天胄素與舒州別駕沈裕善胄以貞觀七年卒至八年八月裕在州夢其身行於京師義寧坊西南街時見胄著故弊衣顏色甚悴見裕悲喜問公生平修福今者何為答曰吾時誤奏殺人吾死後他人殺羊祭我由此二事辨答辛苦不可具言今亦勢了矣因謂裕曰吾平生與君善友竟不能進君官位深恨于懷君今自得五品文書已過天曹相助欣慶故以相報言畢而寤向人說之冀夢有徵其年冬裕入京參選有銅罰不得官又向人說所夢無驗九年春裕將歸江南行至徐州忽奉詔書授裕五品為婺州治中臨兄為吏部侍郎聞之召裕問云爾今世人殺生祭祀設立蒸嘗者見戴公則可自省矣故盂蘭盆經注云雖展孝思終身墳壟卒世蒸嘗然而不能資先人神識冥道畢竟是無益也若生前敬養猶有少益歿後蒸嘗全無所濟若其蘋蘩礿禘尚不墮于二親倘或殺生蒸嘗反禍及于父母但揚虗名不資神道若父母在于鬼趣可以餉祀若生餘道焉能受祭又鬼中多障見食則化為灰炭如目連之母也孝經末云生事愛敬死事哀戚生民之本盡矣死生之義備矣孝子之事親終矣既知身滅而神不滅豈可厚形而薄神身存則敬則養病則憂此是厚其形也昊天之恩以其鬼神而祭祀之即是薄其父母之神靈矣以此推之勿泥儒教權設祭禮當依佛教報以實理集福資親幸毋殺生祭祀加二親之幽苦也華州張法義鄭縣人年少貧野不修禮度貞觀十一年入華山伐樹遇見一僧坐巖穴中法義便就與語會天晦冥不能歸宿于巖穴僧設松柏末以供食之謂法義曰貧道久不欲外人知檀越出慎勿言相見因為說俗人多罪纍死皆入惡道至心懺悔可以滅之乃令沐浴清淨披僧衣為懺悔旦而別去至十九年法義病死埋於野外貧無棺槨以雜木瘞之而蘇自推木出歸家家人驚愕審問知活乃喜法義自說初有兩人來取乘空行至官府入大門又巡巷南行十許里巷左右皆有官曹門閭相對不可勝數法義至一曹見官人遙責使者曰是華州張法義本限三日至何因乃淹留七日使者云法義家狗惡兼有巫祝祝神見打甚困袒而示背背青腫官曰稽過多咎與杖二十言杖亦畢血流灑地官曰將法義過録事録事署發文書令送付判官判官召主典取法義案案簿甚多盈一牀主典對法義前披檢云案簿多先朱勾畢有未朱勾者則録之曰貞觀十一年法義父使刈禾義反顧張目私罵不孝合杖八十始録一條即見昔巖穴中僧來判官起迎問何事來僧曰張法義是貧道弟子其罪並懺悔訖滅除天曹案中已勾畢今枉追來不合死主典云經懺悔者此案勾了至如張目罵父雖蒙懺悔事未勾了僧曰若不如此當取案勘之應有福利仰判官令主典將法義過王宮東殿宇宏壯侍衛數千人僧亦隨至王所王起迎曰師當直來耶答曰未當次直有弟子張法義被録來此人宿罪並貧道勾訖未合死主典又以張目視父事過王王曰張目懺悔此不合免然師為彼來請可特放七日法義白僧曰七日既不多後來恐不見師請即住隨師師曰七日七年也可早去法義固請隨僧僧因請王筆書法義掌中作一字又請王印印之曰可急去還家憑福報後來不可見我宜以掌印呈王王自當放汝也法義乃辭出僧令送出至其家內正黑義不敢入使者推之遂活覺在土中土甚輕薄以手推排得出因入山就山僧修福義掌中所印之處文不可識然皆為瘡終莫能愈至今尚存隴西王博義與法義鄰近委之王為臨說右二出冥報記張目私罵遇聖僧為懺悔猶不能免今時面罵父母師長罪當如何速自尅責深慚懺悔或免地獄重報扶風傅奕本太原人在隋末徙至扶風少好博學善天文曆數在隋為黃冠甚不得志太史令庾儉恥以術官薦奕以代既承命得志朝廷自武德貞觀年為太史令性不信佛每輕僧尼至以石像為磚瓦之用奕與同伴道士傅仁均薛並為太史令附合七上疏除罷釋教高祖由是悟奕譽道毀佛為協私大臣不獲已遂兼汰二教而施行焉一日太宗皇帝召奕賜食因而謂曰佛道微妙聖迹可師且報應顯然屢有徵驗汝獨不悟其理何也奕曰佛是西方桀黠欺詸夷狄及流入中國尊上其教皆邪僻纖人模寫莊老玄言飾其妖妄無補於國家有害於百姓帝惡其言不答自是終身不齒薛先負仁均錢五千未償而仁均死後夢見仁均言語如平常曰因先所負錢當付誰仁均曰可以付泥人問泥人是誰答曰太史令傅奕是也既而寤是夜少府監馮長命夢至冥府多見先亡人長命問先亡曰經文說罪福之報未知當定有否答曰皆悉有之又問如傅奕者生平不信死受何報答曰傅奕已被配越州為泥犂人矣長命旦入殿見薛因說所夢又自說泥人之事二人同夜暗相符會共嗟歎之罪福之事不可不信既見徵仍送錢付奕并為說夢後數日間奕得惡病遂遍身麋爛號叫而死時貞觀十四年秋奕卒臨在殿庭親見二官說夢皆同出冥報記并統紀通載所謂欲得不招無間業莫謗如來正法輪是也黃冠是道士舊稱魏州齊士望武強人貞觀二十一年死經七日而蘇自云初死之時被引見王即付曹司別遣勘當經四五日勘簿云與合死者同姓字然未合即死判官語士望曰汝生平好燒雞子宜受罪而歸即命人送出門去曹司一二里即見一城聞城中有鼓吹之聲士望欣然趍走而入既入之後城門已閉其中更無屋宇遍地皆是熱灰士望惆慞不知所計燒灼其足殊常痛苦士望四顧城門並開及走向門其扉即掩凡經一日有人命門者曰開門放昨日罪人出既出即命人送歸使者辭以路遙遷延不送之始求以錢絹士望許諾遂經歷川塗踐履荊棘行至一處有如環堵其中有坑深黑士望懼之使者推之遂入坑內不覺漸蘇尋乃造紙錢等待焉使者依期到取士望妻亦同見之云出冥報記又梁時有一人常以雞卵白和沐云使髮光潤每沐輒破二三十枚卵臨終但聞髮中啾啾數千雞雛之聲出弘明雜傳曹州裴則離狐人男於貞觀末年二十一日死經三日而蘇自云初死被一人將至王所王衣白非常鮮潔王遣此人將牛耕地此人訴云兄弟幼小無人扶侍二親王即愍之乃遣使將向南至第三重門入見鑊湯及刀山劍樹又見數千人頭皆被斬布列地上此頭並口云大饑本村有一老母年向七十其時猶未死遂見在鑊湯前然火觀望訖還至王前見同村人張成亦未死有一人訴成云毀破我屋王遣使檢之報云是實成曰成犂地不覺犂破其冢非故然也王曰汝雖非故心終為不謹耳遂令人杖腰七下有頃王曰汝更無事放汝早還王乃使人送去遣北出踰牆及登牆望見其舍遂聞哭聲乃跳下牆忽覺起坐既蘇之後具為鄉曲言之邑人視張成腰上有七下杖迹迹極青黑問其毀墓答云不虗老母尋病未幾而死出冥報拾遺或問曰人死既入六道豈復在冢守其故骸耶答曰其雖入鬼趣而罪福未定故無所拘制而亦無所依倚故在冢間如灌頂經云釋種童子白佛言凡夫墳冢何故有諸鬼神依付佛言皆是五穀之精妖魅幻化或橫死之鬼無所附著依以為靈或是樹木山林之精骨未朽爛故有微靈骨若糜爛此靈即滅無有氣勢亦不能為人作諸禍福或是新命終人在世無福又行邪諂應墮鬼神或為樹木雜物之精無天福可受地獄不攝浮游人村既無天膳及諸飲食遂恐動於人作諸變怪煽動人心凡夫聞見即便設福謂之為神或妖邪之師倚以為神覓諸福祐欲得長生愚癡邪見殺生祠祀死入地獄餓鬼畜生無有出時可不慎之雍州醴泉縣楊師操東陽縣人至貞觀初任司竹監後因公事遷任藍田縣尉貞觀二十一年因身老還家躬耕為業然操立性毒惡暴口但一生已來喜見人過每鄉人有事即録告官過無問大小恆生恐嚇於自村社之內無事橫生整理人不喜見操自知性惡亦向人說云吾性多急暴口從武德已來四度受八戒時行禮拜日誦經唄化人為善然有大小侵己操不能忍後至永徽元年四月七日夜忽有一人從東來騎白馬著青衣直到操門見遂共溫涼訖人云東陽大監故遣我追你為你自生已來毒心纏縛不能忍捨逢人即說勸善己身持戒不全慳貪不施自道我有善心供養三寶然未曾布施片財雖口云慚愧心中即生別計惑亂凡俗為此喚汝須臾不見來人操身在門忽然倒地口不能言惟心上少暖家人輿將入舍臥經宿不蘇然操已到東陽都録處于時府君大衙未散操遂私行曹司皆有機案牀席甚大精好亦有囚人或著枷鎖或露頭散腰或坐立行住如是罪人不可算數操向東行過到一處處孔極小惟見火星流出臭煙熢𤊹不中人立復有兩人手把鐵棒修理門首操因問把棒人此是何處曹司答云是猛火地獄擬著持戒不全人或修善中休人知而故犯死入此處聞道有一楊師操一生喜論人過每告官司道他長短逢人詐言慚愧有片侵己實不能忍今欲遣入此處故修理之其人今日是四月八日家人為操身死布施齊供曹司平章還欲放歸未得進止我在此間待師操操便叩頭禮謝自云楊師操者弟子身是願作方便若為得脫此人答云你但至心禮十方佛殷勤懺悔改却毒心即遂往生不來此處雖懷惡意一期能悔如菩薩行不惜身命得生淨土師操得此語已即便依教發露殷勤懺悔遂放還家經三日得活操得蘇已具述此事操於後時便向慧靖禪師處改過懺悔身今現在年至七十有五食長齊六時禮懺操行看麥田見牛三頭暴食麥苗操就牛慚愧不復驅去歸家後日行看麥田不見麥死直有牛跡其夜作夢見有人來語操云我是曹使人故來試你你既止惡更不追你但你勤誠修善不須憂之有僧見操傳向臨說此曹使即師操善知識教令懲惡修善示生淨土復來相試現夢誡勤諄諄非大菩薩方便誘進群生孰能如此用心乎博陵尚書刑部郎中宋行質性不信佛有慢謗之言至永徽二年五月病死至六月九日尚書都官令史王璹暴死經二日而蘇自言初死之時見四人來至其所云官府追汝璹隨行入一大門見廳事甚壯向北為之廳上西間有一人坐形容肥黑廳東間有一僧坐與官相當皆面向北各有牀几案褥侍童子二百許人或冠或辮皆美容貌此下有勘問改籍事繁不録東南行數十步聞有人聲喚璹璹回顧見侍郎宋行質面色慘黑色如溼地露頂散腰著故緋袍頭𩬊短垂如胡人者立于廳事階下有吏主守之西近城有一大木牌高一丈二尺許大書牌上曰此是勘當擬過王人其字大方尺餘甚分明廳事上有牀坐几案如官府者而無人坐行質見璹悲喜口云汝何故得來璹曰官追勘問改籍無事放還行質捉其兩手謂璹曰吾被官責問功德簿吾手中無功德簿坐此困苦加之饑渴寒苦不可言說君可努力至我家急語令作功德如是殷勤四囑之璹及辭去行數十步又呼璹還未及言廳上有官人來坐怒璹曰我方勘責事汝何人輒至囚處使卒搭耳推令去璹走又至一門門吏曰汝被搭耳耳當聾吾為汝却其中物因以手挑其耳耳中鳴乃驗即放出門外黑如漆璹不知所在以手摸西及南皆是牆壁惟東無障礙而暗不可行立待少時見向者追璹之吏從門出來謂璹曰君尚能待我甚善可乞我錢一千璹不應內自思曰吾無罪放來何為賄吏吏即謂曰君不得無行吾向若不早將汝過官令二日受縛豈不困耶璹心然之因愧謝曰依命吏曰吾不用汝銅錢欲得白紙錢期十五日來取璹許因問歸路吏曰但東行二百步當見一處牆穿破見明可推倒之即至君家璹如信行至牆之良久乃至依倒處出即至其所居隆政坊南門矣於是歸家見人坐泣入戶而蘇至十五日璹忘與錢明日復病困絶見吏來怒曰君果無行期與我錢遂不與今復將汝去因即驅行出金光門令入坑璹拜謝百餘拜遂即放歸又蘇璹告家人買紙百張作錢送之明日璹又病困復見吏曰君幸能與我錢而錢不好璹辭謝請更作許之又蘇至二十日璹令用六十錢買白紙百張作錢并酒食自於隆政坊西門渠水上燒之既而身輕體健遂念誦不廢臨聞其事時與刑部侍郎劉燕客大理少卿辛茂將在大理鞫問請劉召璹至與辛兄等對問之云爾右二出冥報記余昔在英德西來山住靜山下之人多取山小竹造粗草紙有一姓華者年將五十為人性慳寒食日至山祭墓以刀斫竹焚之云紙錢金銀元是竹造此竹即是銀莖也是夕即夢其父來深訶責之壔買粗紙故云錢不好況以竹為銀莖可乎論云三界惟心萬法惟識信不誣也如紙之一物能為錢寶繒帛乃至簣箱等斯皆人心識所成鬼見物各自異故知三界六道悉由心成也按此錢帛起自唐眭仁蒨令岑文本作以贈成景長史未審唐前以何代之或用真者故古祠祭有用圭璧及皮幣而長史云亦不如假者如統紀云唐已前無紙錢為用者自唐明王使王璵為祠祭盛行此法於是冥中藏積紙錢金銀繪綵與世間所用無少異皆由心法之能變造故天府冥關亦隨人心而轉因有鬼神用紙錢入人間買物者有見太山堆積蠟錢無用云人間化財用油炷度火而汙者此等顯驗不一心生則種種法生矣不特紙錢一法而已也又云不宜在石榴桃樹邊化財鬼畏之也隴西李思一今居相州之陽縣貞觀二十年正月已死經日而蘇語在冥報記至永徽三年五月又死經一宿而蘇說云以年命未盡蒙王放復歸於王前見相州陽縣法觀寺僧辨圭又見會福寺僧弘亮及慧寶三人並在王前辨答見冥官云慧寶死期未至宜修功德辨圭弘亮今歲必死辨圭等是年果相繼卒後寺僧令一巫者就弘亮舊房召二僧問之辨圭曰我為破齊今受大苦兼語諸弟子等為我作齊救苦難弟子輩即為營齊巫者又云辨圭已得免罪弘亮云我為破齊兼妄說人長短今被拔古痛苦不能多言相州智力寺僧慧永等說之出冥報拾遺言破齊者謂午後噉食犯非時食戒非為食葷羶也雍州西盩厔縣西北有元從坊人姓程名普樂少好音聲至永徽六年五月七日因有微患暴死五日心暖不臭家人不敢埋至第六日平旦得蘇還如平生說云初死時有二青衣至牀前曰王喚君普樂問何王答曰閻羅王為何事答曰頃有勘問催急即行不須更語一人手撮普樂遂出坊南門漸向南山下至一荒草處有少鹹鹵不生草一大孔如大甕口語樂云入樂懼不肯入一人推入不覺有損直見王大殿捉杖人極衆王共諸臣及宮妃后在大殿上隔慢坐殿前大有諸音聲伎兒雜戲使人引樂啓王云所追人來王問是誰曰程普樂王問汝解俳說否樂曰不解俳說即唱戲等王回顧問一伎兒姓張名舍兒此人不解俳說何故追喚答曰舍兒生平共普樂初善後因相瞋挾怨舍兒遂挾怨漫引此人舍兒不敢誑王還依實說王怒令戲殿前音聲一時俱動還見打鼓作舞緣竿緣竿人初緣至頭下時以竿內口直下竿從後分出至地還上六根俱破九孔流血緣竿上下並皆如是復見黃唐已來伎兒如齊晏子突出郎獨猪挑棒等數十人令作俳說時口中吐火抽舌繞場周匝百千鐵鳥諸惡毒蟲從空飛下一時向舌上唼受其極苦叫聲動地不堪人聞餘之雜戲之人諸小鐵蟲見其一時拍手唱叫之聲如煙如火同時被燒燒死還活更相受苦無暫停息音聲不捨受苦不息王雖下杖然遣獄卒手把鐵棒利戟鐵弓箭圍繞守遣令作音樂受苦不歇普樂至獄五日見此戲兒受苦如是至第六日旦王喚普樂語云汝未合死更檢案看却後二年汝命算盡當來受苦如是諸人為生平妄語惡口綺語調弄僧尼輕戲佛法假託三寶誑他財物專將養活婦兒好殺猪羊食啖酒肉或因向寺食用僧物汙穢不淨如是等罪不持齊戒故受斯殃汝雖無如此重罪非無餘過亦合受之且放汝去死時取汝還令舊二人送到家內見一牀棘林枝葉稠密二人令入此牀普樂初不肯入二人急推合眼而入即覺身已在牀蘇活普樂因見此徵即向京來歷寺受戒堅持不犯菜食長齊禮敬無虧因向僧懺具說此言師辨東官右監門兵曹參軍鄭師辨年未弱冠時暴死三日而蘇自言初有數人見收將行入官府大門見有囚百餘人皆重行北面立凡為六行其前行者形狀肥白好衣服如貴人後行漸瘦惡或著枷鎖或但去巾帶皆行連袂嚴兵守之師辨至配入第三行東頭第三立亦去巾帶連袂辨憂懼專心念佛忽見生平相識僧來入兵團內兵莫之止因至辨所謂曰平生不修福今忽如何辨哀求請救僧曰吾今救汝得出可持戒耶辨許諾須臾引出諸囚至官前以次訊問至門外為受五戒用瓶水灌辨額謂曰日西當活又以黃被一張與辨曰披此至家褻至淨處也仍示歸路辨披之而歸至家褻被置牀角上既而目開身動家人驚散謂是起尸鬼惟母不去問曰汝活耶辨曰日西當活辨意時疑日午問母母曰夜半方知死生相違晝夜相反既至日西能食而愈猶見被在牀頭及辨能起被形漸滅而尚有光七日乃盡辨遂持五戒後數年有友人勸食猪肉辨不得已食一臠是夜夢己化為羅剎爪齒各長數尺捉生猪食既曉覺口腥唾出血使人視滿口盡是凝血辨驚不敢復食肉又數年娶妻妻家逼食後乃無驗然辨自五六年來臭常有大瘡洪爛終身不能愈或恐以破戒之故也臨昔與辨同直東宮見其自說云爾右二出冥報記坊州上柱國王懷智至顯慶初亡歿其母孫氏及弟懷善懷表並存至四年六月雍州高陵有一人失其姓名死經七日背上已爛而蘇此人於地下見懷智云現任泰山録事遣此人執筆口授為書謂之曰汝雖合死今方便放汝歸家宜為我持此書至坊州訪我家通人兼白我娘懷智今為泰山録事參軍幸蒙安泰但家中曾貸寺家木作門此既功德物請早酬償之弟懷善即死不合久住速作經像救助不然恐無濟理此人既蘇之後即齎書送其舍所論家事無不暗合至經三日懷善遂即暴死合州道俗聞者莫不增修功德鄜州人勳衛侯智純說之出冥報拾遺汾州孝義縣懸泉村劉摩兒至顯慶四年八月二十七日遇患而終其男師保明日又死父子平生行皆險詖其比鄰有祁隴威因採樵被車輾死經數日而蘇乃見摩兒男師保在鑊湯中須臾之間皮肉俱盡無復人形惟見白骨如此良久還復本形隴威問其故對曰為我射獵故受此罪又問保曰卿父何在對曰我父罪重不可卒見卿既即還請白家中為修齊福言訖被使催促前至府舍見館宇崇峻執杖者二十餘人一官問曰汝比有何福業對曰隴威去年正月在獨村看讀一切經脫衫一領布施兼受五戒至今不犯官人乃云若如所云無量功德何須來此乃索簿勘見簿曰其人合死不虗側注云受戒布施福助更合延壽乃遣人送還當即蘇活出冥報記詖音祕險詖乃不平之謂雍州長安縣高法眼是隋代僕射高頴之玄孫至龍朔三年正月二十五日向中臺參選日午還家舍在義寧坊居南隅向街開門化度寺東即是高家欲出子城西順義門城內逢兩騎馬逐後既出城已漸近逼之出城門外道北是普光寺一人語騎馬人云汝走捉普光寺門勿令此人入寺恐難捉得此人依語馳走守門法眼怕不得入寺便向西走復至西街長城坊南門道西有會昌寺復加四馬騎便語前二乘馬人云急守會昌寺門此人依語走捉寺門法眼怕急便語乘馬人云汝是何人敢逼於我乘馬人云王遣我來取法眼問云何王遣來乘馬人云閻羅王遣來法眼既聞閻羅王使來審知是鬼即共相拒鬼便大怒云急截頭髮却一鬼捉刀即截法眼兩髻附肉落地便至西街悶絶落馬暴死不覺既至大街要路踟蹰之間看人逾千西街首即是高宅便喚家人輿向舍至明始蘇便語家內人云吾入地獄見閻羅王升大高座瞋責吾云汝何因向化度寺明藏師房內食常住僧果子令吞四百顆熱鐵丸當吞之時咽喉閉縮身體焦卷變為紅色吞盡乃蘇蘇已至二十六日惺了之時復有諸鬼來取法眼到王所王語言汝何因不敬三寶說僧過惡汝吞鐵丸盡已宜受鐵犂耕舌至正月二十九日既吞鐵丸了蘇惺到正月三十日平旦復死至地獄復受鐵犂耕舌舌長數里傍人看見吐出一尺餘王復語獄卒此人以說三寶長短以大鐵斧截却舌根獄卒斫之不斷王復語云以斧細銼其舌將入鑊湯煮之煮復不爛王復怪問所由法眼啓王云臣曾讀法華經王復不信令檢功德簿見案內有讀法華經一部王檢知實始放出獄其人現在觀者如市見者發心合門信敬勵志精勤誡誠無倦京城道俗共知不須引證出法苑玄惲法師録又西京勝光寺沙門孝贄親姻往來數以寺果啖之未幾得嘔血之疾自云每欲疾作見赤衣使者將往黑林中大風吹散肢節頃之又引向臺觀上一人儀容可畏厲聲責之曰何得以寺家果飼親姻言已而失贄懼即計直償衆僧月餘乃免出冥報記問今時說僧過惡偷盜僧物及以僧物饋親朋亦多何不見現報答以惡業多故猶如黑布不見點汙直至壽盡自當見之長安城內通軌坊龍朔三年三衛劉公信妻陳氏母先亡陳因患暴死見人將入地獄備見諸苦不可具述末後見一地獄石門牢固有兩大鬼形容偉壯守門左右怒目瞋陳汝何人到此見石門忽開亡母在中受苦不可具說受苦稍歇近門母子相見遙得共語母語女言汝還努力為吾寫經女問娘欲寫何經曰為吾寫法華言訖石門便閉陳還得蘇具向夫說夫即憑妹夫趙師子欲寫法華其師子舊解寫經有一經生將一部新寫法華未裝飾其人先與他受雇寫經經主姓范此生將他法華轉向趙師子處質二百錢施主不知質錢師子復語婦舅云今既貸經在家有一部法華兄贖取此經向直一千錢陳夫將四百錢贖得裝飾周訖在家為母供養其妻陳氏後夢見母從女索經吾先遣汝為吾寫一部法華何因迄今不得女報母言已為娘贖得一部法華現裝飾了在家供養母語女言正為此經吾轉受苦冥道中獄卒打吾脊破汝看吾身瘡獄官語云汝何因取他范家經將為己經汝何有福甚大罪過女見母說如此更為母別寫法華其經未了女夢中復見母來催經即見一僧手捉一卷法華語母云汝女已為汝寫經第一卷了功德已成何因復來敦逼待寫了何須匆急後寫經成母來報女因汝為吾寫經今得出冥道好處受生得汝恩力故來報汝汝當好住善為婦禮信心為本言訖悲淚共別後時勘問前法華主果是姓范范家雖不得經其經已成施福已滿後人轉質自得罪咎劉妻贖取微得少福然亡母不得力陳氏夫劉公信具向元休自說出冥報拾遺蕭氏是司元大夫崔義起妻乃蕭鏗女鏗是僕射之姪蕭氏為人妒忌多瞋好打奴婢不信業報至麟德元年從駕洛陽到二年正月身亡死在地獄蕭氏手下常所愛婢名閏玉年可十八雖是獠婢容貌端正性識聰敏信樂佛法至二月家內為夫人設三七日齊僧正食時夫人自來看枷項鎖腰獄卒衛從餘人不知惟此婢見夫人魂靈著此婢言音共夫人生平語音無異使傳語向家內大小云吾適崔家已來為性多瞋橫生嫉妒好打奴婢兼不信因果今至地獄受罪極重備經諸苦不可具說聞家內今三七日為吾設齊請求獄官放一日假暫來看齊語汝男女合家大小吾自共汝同住已來身口意三毒好瞋打汝兼嫉妒大夫所看婢妾種種不善發起惡業今受報苦願汝男女合家大小內外眷屬從汝懺悔願施歡喜然汝男女憶吾乳餔之恩將吾生平受用資具速捨修福望冥苦至七七日為吾設齊令此功德早得成就吾至齊日更請官人望得復來語大夫及兒女等大夫生平急性多瞋不得過分瞋打奴婢勸信三寶恭敬上下修持齊戒布施忍辱勿怠臨去之時語男女云吾且將閏玉去使在地獄看吾受罪苦痛如何經五六日還放回來令汝男女知吾受罪苦痛虗實作此語已閏玉即死惟心上暖餘分並冷身臥在地不敢埋之此婢即至地獄見一大殿院門嚴兵守衛云是王殿不敢窺窬行至東院別見一廳上有大官人云是斷罪官復過廳院東有地獄種種苦具一如世間圖畫地獄之狀夫人語婢云汝看吾受罪之苦作此語已即有種種獄卒羅剎撲擲夫人屠割身肉鑊湯煎煮煮已還活活已復歷諸獄鐵鉗抽舌鐵鳥之復臥鐵牀飛鳥猛火一時著身死已還活活已復受諸苦不可具陳夫人蘇已即見其父蕭鏗乘紫金蓮華座騰空而來鏗生平已來及歷任諸官皆不食酒肉葷辛常誦法華經日別一遍恭敬三寶晝夜六時禮誦無闕今生善處見女受苦故來相救即語女云吾生平之日每勸汝生信止怒汝不用吾語今致其殃汝復何因將此婢來女報父言為兒生平不信今受罪苦故將此婢看兒受罪輕重令傳向家內男女使其生信父聞印可即語女言吾雖生善處未能全救汝苦汝努力自勵發心兼藉家內福善共相助佐決望得出上升人天作此語已忽有一婆羅門師年少端正亦乘空而來語夫人曰由汝不信因果今受罪苦未知此婢性識如何吾欲教誦經使傳家內令世人生信夫人報云請師但教此婢聰明誦經可得師即先教誦金剛般若初授二三行有忘一二句者後續授之漸得半紙一紙少時誦得不忘後教誦藥師法華一授不忘此之三部皆作梵音不作漢語文詞典正音韻清亮文句皆熟即便放歸臨別語云汝至家內逢人為誦漢人道俗不別汝音令覓婆羅門善梵語者試看誦之始知善惡世人多有信邪事道不樂佛法既見汝獠婢尚能誦得三本梵經豈可不生信心儻得一人回邪入正非但夫人得福亦令汝後報不入三途既受此語已放出至家惺了如舊即集家內尊卑具說夫人地獄受苦事猶恐汝兒郎等不信即臥在地作夫人在地獄受苦之事或云看夫人吞熱鐵丸開口咽之口赤腹熱如火或云看夫人受鐵犂耕舌出舌二三尺餘或云看夫人受鐵牀苦身體紅赤熱氣如火如是變現種種苦痛之相已然後蘇醒復說見夫人父誡敕之事又說見婆羅門教誦經意夫人得出地獄上升天報此婢即為家內正坐而誦經文文文句句皆作梵音聲氣清亮令人樂聞室家大小見此善惡靈驗罕所未聞男女大小五體自撲號哭哀慟逾痛初亡道俗郡官聞者皆勸易心歸信齊戒不絶麟德二年有西域四婆羅門來獻佛頂骨因親眷屬將軍薛仁軌家內設齊諸親聚集諸官人共議云此婢雖誦得梵經某等皆不別之故邀屈請得此四婆羅門至將軍舍齊復喚此婢來不語四僧云在地獄中誦得誑云別有婆羅門教誦得此三部經密試虗實即對四僧令婢誦之且誦金剛般若訖此四婆羅門一時皆起合掌怪歎希奇未曾有也何因漢人能得如此更為誦藥師法華訖彌加歡喜恭敬如師即譯語問云此女何因得如此善巧音詞文句典正經熟不錯吾西域善能誦者未能如是此非凡人能得如此諸官人等始為說實四僧泣淚非是聖力冥加豈能如是言詞典正諸官道俗見者悲歎深信佛法不敢輕慢將軍因見此事奏上聞徹皇帝敕語百官信知佛法衆聖之上冥祐所資孰敢不信百官拜謝慶所未聞良由三寶景福恩重慈蔭四生非臣下愚所能籌度聖凡受益豈得不信出續高僧傳西京法海寺英禪師咸亨中夢泰山府君召往說法後獨坐方丈見一異人衣冠甚偉前告之曰弟子向於泰山府君處竊覩尊容且知慈德及物甚多弟子聞世有水陸大齊可以利益幽品其文是梁武所集今大覺寺吳僧義濟得之願師往求如法修設英師許之尋詣大覺果得其文遂於月望修齊已畢復見向異人與屬十數前至謝曰弟子即秦莊襄王也又指其徒曰此范睢穰侯白起王翦張儀陳軫皆秦臣也咸坐本罪幽囚陰府昔梁武於金山設此齊時前代紂王之臣皆免得脫弟子是時亦暫息苦但以獄情未決故未獲脫今蒙師齊懺罪弟子與此輩并列國君臣皆承法力得生人間慮世異國殊故此來謝言訖而隱自是英公常設此齊流行天下出統紀并水陸齊儀莊襄是秦始皇父至唐咸亨九百四十年汾州調露元年啓福寺主惠澄染患牛吼而終寺僧長寧夜見澄來形色憔悴云為互用三寶物受苦難言諸罪稍輕惟用寺物為至重願賜救濟寧即為誦經懺罪月餘復來云承利益已得息苦別居一處但未知得脫之日華陰鄧元英有親故暴亡七日復蘇報元英曰見冥道官吏將追君父宜急修功德以禳之元英驚問修何功德可免此事曰急寫華嚴經一部元英遽買紙向鄰寺多召經生未逾旬日經已寫畢竟免斯厄復於母墳地産一蓮華武后異之敕賜立孝門以加旌表御史馮忠於景隆三年暴亡有二童子領至庭對判官案覆罪籍見亡舅張思義曰汝可發願寫涅槃疏并鑄鐘庶消往過疏是禮宗禪師所述者此師親見智者傳授每有天神守護忠依舅誡遂獲放回尋疏未獲再被冥譴忠乞三日尋寫復俾其返誠意搜求果得其本遂急為經理後以壽終右三出統紀武功縣丞蘇圭常誦金剛經合家五十口皆蔬食妻崔氏以瘦悴竊食肉變為骨鯁氣絶殮十日復蘇言見閻王責曰汝夫是肉身菩薩何盜食肉賴有誦經之功延壽二十年可歸以語諸人時玄宗皇帝聞之亦發心持經從化者甚衆南唐姓李江南金陵上元縣一民暴死三日復蘇詣唐主具奏入冥見先帝被五木甚嚴民駭問帝何以如此帝言吾為宋齊丘所誤殺和州降者千餘人以冤被訴仗汝歸語嗣君凡寺院鳴鐘令延久其聲吾受苦惟聞鐘則暫休息或能為造一鐘尤善民曰何以取驗帝曰吾在位日曾以于闐國遺我玉天王像藏於瓦官寺佛左膝人無知者汝以此為驗唐主親詣瓦官寺剖佛膝果得玉像感泣即造一鐘於清涼寺鐫其上曰薦烈祖考高皇帝脫幽出厄以玉像建塔葬蔣山出通塞志後周姓柴世宗毀天下寺觀鍾磬鈸鐸佛像鑄周通錢時鎮州大悲像極靈應詔下人莫敢近帝聞之自往持斧鑱破面胸觀者為之悚栗帝遂疽發於胸殂汴都有將士周百勝年老家居蔬食念佛一夕夢黃衣吏追入大城至官府處主者令吏引觀地獄見一人黑色臥大鐵牀獄卒持鑿破其胸灌以銅汁叫聲不可聞百勝懼念佛求退吏曰汝是佛弟子不必懼百勝問囚者何人答曰柴帝也因毀像致此罰百勝曰我故君王也何時得脫吏曰世間周通錢盡時方脫此罪吏因引從故路出城聞寺鐘聲遂覺百勝常以語人聞者為之悲惋宋太祖太宗目擊其害益堅欽信故受命初興復天下佛事出神應録宋六一歐陽修自號六一居士因遊廬山入東林謁祖印禪師求師開示師示以心性法門修自此有省發嘉祐六年修為參政兼譯經潤文既登府多病嘗夢至一所十人冠冕列坐一人曰參政安得至此宜速返舍修出門數步復往問之君等豈非釋氏所謂冥府十王者乎答曰然因問世人飯僧誦經為亡人追福果有益乎答曰安得無益既寤病良已自是深信佛法修居潁州捐酒肉撤聲色灰心默坐令老兵往近寺借華嚴經誦至八卷乃薨出統紀并金湯編藏中元有十王經而久已失矣今世間所傳者一閻羅王二秦廣王三初江王四宋帝王五五官王六變成王七泰山王八平等王九都市王十轉輪王有以閻羅天子為第五殿者謬也如統紀云世傳唐道明和尚神遊地府見十王分治亡人因傳名字藏典傳記可考者六閻羅五官耳池州郭生夢入冥府初江王揖坐謂曰我是西門王郎冥司録我忠孝正直不害物得作初江王一紀南劒陳生既死其弟之女見二鬼導至宮殿曰秦廣王也王謂女曰欲救伯苦可轉八師經女寤家人求得經請僧誦千遍弟夢兄來謝曰已獲生天如上十王除閻羅王餘九多有改易故云官府數移也問曰漢晉已前不見有人入地獄還報者何耶答曰經法未到誰識泥犁地獄之名雖有入冥還蘇亦只當一場夢幻境界耳問宋元之後亦少見有何也答即余年少至今往往聞人入地獄記閻王殿前對聯回而無好樂者録之余若不作此無即後篇亦無有録之者況今常聞諸方悉有之恐繁不録且古諸傳記中條欵甚多然人厭樂繁簡故不盡録也明贑州太和縣劉須微萬曆間為南韶道好客豪飲日殺生不計數及死其子之業師陳某暴死而蘇曰閻王謂我無大惡且放還歸在閻王殿前見鐵桅竿上弔一人乃學父須微也謂曰先生回去為寄一信與兒子說我平日不信善惡因果以殺業重苦不可言今身上皆畜生毛羽恐吾兒不信佛事超我我有銀一箱埋某處鑰匙藏某樹下可將此銀延僧禮懺超我云云業師即至劉家說其事其子果不信復曰埋銀汝家固有但不知所藏鑰匙處父示你特以此為驗耳其子如師言果得鑰匙乃信陰司不妄因大為布施誦經禮懺自後太和從此信道也趙定宇竹窗三筆云少冢宰定宇趙公與雲南巡撫陳玉台同年公以萬曆丙申三月望日捐館時玉台在任因內人病扶乩請神神判以死因懇乞救援神云五殿閻君方新任其人剛正不可干以私無以為也問新任何人曰常熟趙某耳俄而訃至則任期與訃期吻合陳大驚異或曰閻王帶福帶業者為之定宇盛德士亦有業乎噫地藏菩薩言我觀閻浮提衆生舉足動步無非是罪焉得無過昔聞一僧有天符召作閻王者僧懼大起精進一心念道符使遂絶嗟乎古稱韓擒虎生為上柱國死作閻羅王又近代傳聞鄭淡泉司寇死作閻王杭州大守周公死作城隍此常事也古德有言僧雖有行不了道者多作水陸諸神豈徒言哉禮像永明禪師諱延壽吳越王鎮杭師為餘杭縣庫吏屢以庫錢買魚蝦等物放之後坐監守自盜法當棄市王頗知其放生也諭行刑者觀其辭色以覆師臨死也面無戚容人怪之師曰吾於庫錢毫無私用盡買放生命莫知其數今死徑生西方極樂世界不亦樂乎王聞而釋之乃出家為僧修禪禪懺得無礙辨才師涅槃後有一僧入冥見閻羅王時時出禮一像僧問之則陽間永明壽禪師也已生西方上品上生王敬其德故時時禮耳出雲棲放生文昔吳越王飯僧問永明禪師此間有聖僧否禪師曰長耳和尚是定光佛長耳曰彌陀饒舌後去不復現矣即非彌陀已上品上生不久便登佛位清湖廣衡山縣康元度喜行布施大清初一日病死見兩龍旋繞其身竟至陰司見閻君初一殿姓潘二殿姓張三殿姓羌四殿是元廣之父五殿是其祖六殿姓蔣七殿姓何八殿姓羅十殿姓王見所識者多又見其鄰一女子腳爛在殿外問其父曰何以此女在此父曰業未盡若有人作道場即可愈度死三日復生歷見受報者録成一書時亦能立亡數日每往陰司回還陳述令人可畏如昔東徐君刻冥判記布流於世使人知陰陽罪福非遠也右二出鐵橋集此十殿如世間州郡官府非閻羅天子也世只聞閻羅王不知有府君獄主故入地獄還凡見獄官皆云閻王也廣州順德縣龍江村余桂寧妻蔡氏法名等實有弟出家于鼎湖山時回家教令持齊歸敬三寶由是發心長齊凡姑叔捕得魚蝦生者竊放井中亦常買螺蜆放生其夫出外為商而死姑劉氏逼令別適實乃懸梁縊死以為貞誓是時頸上索斷而墮姑聞救之實姐與巫婆屢勸開齊不已從之順治戊子三月出事陳家為繼室次年生一女壬辰七月十九日生一男産後身病死一日夜心尚暖前夫出外時囑云你應堅守妻云若有改嫁地獄重罪自受七月二十早遂蘇午後即見前夫打云你言若有改嫁地獄重報自受實云我同你去夫云不消我同你去自有人來拿你云云是晚二更有鬼判來鎖去實問曰何故鎖我判云拿你受罪去至地獄見死人堆積問云此是何處判云此是地獄又云七月初一日考較善惡日間考陽人夜間考死人時判帶實在死人身上過心甚怖畏惟憶念佛至四更盡得蘇醒二十一日二更判又來鎖去呵云速去速去下血湖池汝生養二次應下六年實不肯去判發怒將鐵椎打云速去速去凡打時見螺蜆遍身護之至血池處見諸罪人半沉半浮涕泣苦狀不堪忍視下至池邊心心念佛見一狗云聖女汝曉念佛免下血池你欲出去可在右邊行左邊有毒蛇鴉鵲害人即右邊行見陳家前妻張氏云小妹你來聻其啼哭苦楚之甚實云我為繼你生第五子染病故來丈夫前者為你建齊你亦得否答云丈夫無信心全無得力二人痛哭一番時四更盡便蘇二十二日二更判又來鎖去下船船上四人把櫓實叫苦連天哀告獄判及船上人人云亦知你身有病將東西密障極力撓過你西川去時將四更盡乃醒二十四日二更判來鎖去至地獄黑暗處見一無憂山時有一鬼持衣來換實不肯換又持迷魂湯來食實不肯食判帶至第三殿冥王案前實跪告云實係某縣某處人氏王大怒拍案聲震如雷曰你與前夫立誓不嫁何自違誓將五馬分尸即見五馬分尸首于五處肝膽碎裂不知何者是我王將善惡簿看使判喚來尸首還復王云你何故罵前婚子亞寅亞會可惡可惡真可惡應下火坑自當見之時見一鬼將實一推下火坑火燒大苦一心念佛得免自見手上火皰及肩上火皰五箇如魚胞大一寸餘長二寸在身上時家人共見報應不爽五更少蘇二十五日二更判來鎖去一鬼云你罵亞會耳聾即將洋銅灌兩耳非常苦痛惟切心念佛一鬼云你曉念佛可免將風箱三吹耳時即息苦便蘇二十六日二更判又鎖將去見地獄黑暗不敢前進判怒持鐵棒打數下苦痛難忍見一雞言還我命來實云我何時殺你雞云你十六歲為病殺我你不食我肉而食我湯云云實云待我回陽為念經呪薦你其相方滅即蘇二十九日三更見觀音大士將一子來換過所生子時子大哭失聲下地實苦泣哀告大士云此子未卜保養否大士云若此子哭時手摩其頂念聖號數聲自然無事四更盡得蘇八月初一日辰刻見父現身告云子尚應墮猪胎三晝夜餓鬼二晝夜實云我今不願墮地獄苦痛難當願作方便得免刑罰父云你自作自受無人可代但墮畢數日即漸安也又云若墮猪胎時善自保養實云不曉如何保養父云猪必食清粥水將布濾過方飲食單莫食雙恐傷性命問云可食多少父言或三或七或九乃至十五每日三時飲每時十五碗遂蘇乃語家人云我今墮猪胎可取我箱中一新夏衫濾去粥渣與水我飲彼食時家人俱見如猪飲水無異三日畢便墮餓鬼即自披髮如鬼相似欲食茶少許如食糠𥢶塞喉不下惟口中唧唧自歎兩手搖搖舞舞二晝夜傍人不敢近看過數日復見大士通身白衣手持楊枝口說云從心從實起心明罪業輕又見一鴨云還我命來實云我何時殺你鴨云比時羅姑欲我死把針我吞未死原與羅姑無干還是你晒鹹魚我食鹹魚渴死你應與我水飲救人一命勝于千金實云既我誤汝命待我回陽念經呪薦你何如其形遂滅矣今康熙己未其人尚在持齊念佛年六十有二其出家弟覺興聞余作集乃回鄉對姊隨筆録之余因編入焉言丈夫無信心建齊全無得力者今時世俗多有不信薦亡超幽之事惟欲掩親朋耳目請僧建齊既無信心便有輕佛慢僧之失尚不免過何由得力或僧無慈愍利濟亡者之念或誦血湖救苦等僞經縱是佛說真經而無誠心如童子課三字經或延道士建醮既無至誠經又非真盡是俚語過三日即宰殺生命妄謂謝將私圖嘴肥世人久迷同之甘飲寧有殺害生靈功超亡者之苦或設齊吝財不為盛供唯要喃唱鼓樂喧天奚顧壇場居處齊蔬器皿潔否由是存亡失利誠為虛設徒自勞苦者耳韶州英德縣冬水鄉楊舒一嘗持六齊順治年間有成華翰臨終屬舒一云你有信心我死後建齊可為我司香燭時雷寨寺僧携一行童往澆蠟燭入內飲食而狗䑛汙油鍋燭壞童回見即將汙油澆燭建齊才畢即在壇前宰猪次日舒一得病至地獄會華翰同往見閻王王問翰在世作何功德答言曾作預修功德王檢案云俱無功德又語舒一云你為人司香燭何以穢燭供佛答云小人領事香燭其燭不淨係行童過王曰齊壇不潔是司香燭者之罪且責五板遂蘇後兩髀腫爛見骨乃求白象林僧大悲呪水洗漸愈康熙十三年卒舒一自陳鄉人共說贊録之盧陵陳忠赤順治丁酉年六月盡忽暴死七月初復活云某人在陰司受罪某人今來掌某處又某人寄信某物在某處一一如言又言陰司見路三條一條帶枷鎖甚衆一條善人路一條皆禽獸行自云我止得活三年即發心長齊後三年無病而死出鐵橋集廣東肇慶府高要縣黃岡村梁子球字朝棟向戒淫殺勸善隱惡居館教讀康熙九年球時四十一歲於六月初八夜夢兩鬼使一從僮持牌捉球球以家貧子幼辭鬼使遂去越五日球夢兩使復來促球球乞免鬼弗允遂醒無病而死不及遺囑初就道兩使語球曰大路江山峻阻登涉不易此有捷徑但有冤對難度以君善人故相商耳球曰我素放生戒殺無他慮也使曰審此可度矣乃經一市兩使詣肆就食舉酒肴勸球球念此非人世飲食辭不茹兩使語曰此人有異或得還魂但恐遽殮令從僮急詣球家附尸曰我必還魂幸勿殯殮言畢即返同至報冤徑果見六畜禽獸遍滿徑中經此者多被噬唯球安行而過越此望見宮殿巍峩值暮兩使偕球宿廟中金匾額題曰敕封龍母廟晨起同到朝門百僚肅侍兩使帶球伏階下判官展簿啓王球名下止罪過一條球泣訴妻兒孤幼乞放還陽王曰大數已盡難顧妻兒喜汝能安貧勸善無大過惡今陽間世俗多犯大罪皆緣不信陰司法律爾可熟讀此間刑律門聯回陽傳與人知為善去惡可也球承命同兩使遍讀對聯及各罪欵復宿前廟中次早詣殿俯伏將門聯律欵皆誦明白王大喜命兩使送回途經教場遇已故門人莫煥元同羣輩習射見球下馬悲喜交集自言死後亦無罪過今為校稟將領約束煩語兄嫂妻子善事父母豫舊有手評武經䇿論可焚付我再揖而別又行數里望見家鄉兩鬼使辭別而去凡三日夜遂蘇備録門聯罪律今列于左報冤徑聯烹割充腸禽鳥含悲還報復殺屠供饌牛羊飲恨待酬冤奈河橋聯苦海無邊須識回頭是岸奈河有渡若能轉念不迷分界路聯此路達天堂善士都從這裏過斯途沉地獄惡人俱在箇中行朝門聯三尺森嚴豈似陽間能枉法四知凜烈果然地府不容情二門聯生在陽間為惡重死到陰司欲悔遲丹陛聯鐵石人心知爾剛頑難變化火罏陰律從他強梗自銷鎔座前聯惠迪吉從逆凶吉凶之報斷在此日積善慶作惡殃慶殃之別立見當前殿左廡硃榜罪欵刑條不忠不孝叛逆不道謀財陷命枉濫殺命劫盜淫殺害衆成家已上諸犯罪至極刑怨詈天地毀謗君王怨懟父母誹罵師長奪人妻子漁色邪淫已上諸犯差減極刑一等決水害防放火燒山舞文玩法左道惑衆殺生害物欺孤凌寡已上諸犯差減極刑二等離間骨肉教唆詞訟嫁禍飛冤賣生圖利造使假銀販賣人口壓良為娼強屈僕婢帶人口窩聚賭盜貪恣口腹局騙財物占奪田地武斷鄉曲啓殺導淫破毀齊戒聚斂無厭乘危取利恣行威福荒淫漁獵借勢橫行受託負心已上諸犯差減極刑三等五刑之屬三千特表其極重者以為懲戒使世人知凜然不可犯其刀山鐵床以至風火沉淪等獄各隨所犯而受其果報形影相赴皆自取也惟改過積行可免誹謗三寶破毀僧尼污篾梵行倡說叛聖凡此較極刑尤重故另懸列犯者不通懺悔殿右廡金榜放生文是杭州雲棲寺蓮池大師戒殺文蓋聞世間至重者生命最慘者殺傷是故逢擒則奔蠟虱猶知避死將雨而徙螻蟻尚且貪生何乃網於山𮊁於淵多方掩取曲而鈎直而矢百計搜羅使其膽落魂飛母離子散或囚籠檻則如處囹圄或被刀砧則同臨剮戮憐兒之鹿䑛瘡痕而寸斷柔腸畏死之猿望弓影而雙垂悲淚恃我強而凌彼弱理恐非宜食他肉而補己身心將安忍由是昊天垂憫古聖行仁解網著於成湯畜魚興於子産聖哉流水潤枯槁以囊泉悲矣釋迦代危亡而割肉天台智者鑿放生之池大樹仙人護棲身之鳥贖鱗蟲而得度壽禪師之遺愛猶存救龍子而傳方孫真人之慈風未泯一活蟻也沙彌易短命為長年書生易卑名為上第一放龜也毛寶以臨危而脫難孔愈以微職而封侯屈師縱鯉於元村壽增一紀隋侯濟蛇於齊野珠報千金拯已溺之蠅酒匠之死刑免矣捨將烹之鱉廚婢之篤疾瘳焉貿死命於屠家張提刑魂超天界易餘生於釣艇李景文毒解丹砂孫良嗣解矰矯之危卜葬而羽蟲交助潘縣令設江湖之禁去任而水族悲號信老免愚民之牲祥符甘雨曹溪守獵人之網道播神州解銜環報恩狐能臨井授術乃至殘軀得命垂白璧以聞經難地求生現黃衣而入夢施皆有報事豈無徵載在簡編昭乎耳目普願隨所見物發慈悲心捐不堅財行方便事或恩周多命則大積陰功若惠及一蟲亦何非善事苟日增而月纍自行廣而福崇慈滿人寰名通天府蕩空冤障多祉萃於今生培積善根餘慶及於他世倘能助稱佛號加諷經文為其回向西方令彼永離惡道則存心愈大植德彌深道業資之速成蓮臺生其勝品矣子球自録廣州康熙辛亥二月羊城有一婦人藥毒死夫又推前夫姑落井中人不得知之後時夜間婦即見鬼卒拘至城隍所隍與冠幞頭者同審即以鐵夾棍夾斷惡婦腳令示陽間善惡無爽平藩聞遂給以食置西門外馬廠前衆人往觀婦人日食如常折腳以盤盛於前自向人云過兩日便下油鍋如期作痛苦之狀不堪觀也又云更過二日身受碎剮不數日遂死平藩乃令割其首棄其骸於荒郊犬食出鐵橋集順德縣喜涌村張哉明妻李氏生二子為人性惡瞋妒好打奴婢每打恨不楚毒使跪階前以尿澆淋仍燒鐵鉗烙其身面夫及子俱不敢近之康熙壬寅年盜鄰人雞殺食鄰人詰問即發誓曰我若偷得汝雞食當教我兩眼落地次月無病一目𪹼裂至乙巳年又裂一目丁巳年獨臥房中夜半自拆牀板周圍枷頸跪地天明家人聞呻吟聲趨問何故如是答曰我今被閻王枷鎖雖苦尚輕過二日即要上鐵刺牀又落油鑊云云不數日而死本村鄰鄉人皆共知其子端仲亦自向人說余因録之順德上直村陸業卿為廣州府差是無為教之徒口稱食齊身行不善所為非事不可具述至康熙己未五月欲將一猪賣與屠人屠人還價五錢卿便自殺賣肉得銀八錢過數日病至六月二十三日早見猪來云我命該盡亦了汝何以貪多銀三錢以刀殲我頸我已得訴官府至未時果見鬼來鎖至閻王所見三曹官一名鄧天尊皆證卿殺猪王曰汝何故貪財殺害猪命當杖六十今且饒汝暫打三十後當再審遂還蘇活一一語其妻子妻看其兩髀臃腫青淤數日潰爛自後每被冥使追去受諸罪苦回自說之然其家門獨許無為教徒出入餘人不得妻子及無為之徒畏羞隱匿不說惟鄰人得聞一二耳至七月初九日死未死之前臭氣熏出門外行人不堪聞之時有鄉人問其無為徒曰世人多殺何不見報惟業卿獨受何耶答曰吾教每日三時誓願每一時稱一曹官名字為證今其殺生犯戒故受此報也以斯瞞人餘皆隱諱也鄉伍鄰里向余說之餘二曹官忘名音釋馮翊郡名翊同翼閻羅王梵語具云閻魔羅此云息諍謂止息罪人諍故犍稚稚或誤作椎凡隨有木石銅鐵等打能鳴者名犍稚問曰今之木魚是否答曰木魚聲小不得名犍稚也問何以僧用木魚耶答木魚乃古之樂器惟此國有餘方無以其聲和響靜故僧取為念誦之節度令衆異口同音也又昔曹子建曾遊漁山聞空中梵天之響清揚哀婉因倣其聲寫為梵唄今以木魚表漁山之梵音也刈音藝割也堵音覩垣也盩厔上音周下音質縣名在京兆惋音腕驚歎漁音魚捕魚也又侵取也所謂漁色邪淫是也矰音增結繳於矢也弋射矢也又短矢也矯驕字上聲揉箭曰矯水陸大齊梁武帝天監年夢神僧曰四生受大苦惱何不作水陸大齊救拔之帝問志公公勸帝尋經必有因緣乃躬覽藏經造儀文三年乃成於夜𮘗文停燈燭白佛若理協聖凡願拜起燈燭自明或儀式未詳暗如初言訖投地一禮燈燭盡明遂於天監乙酉二月十五日在金山寺修設水陸道場帝親臨地席詔僧祐律師主其事出葦江集
