body:
  text: 廣州南海寶象林沙門弘贊在犙輯人道梵語那羅摩納此云人人者忍也謂於世間違順之境情能安忍故也立世論云何故名人道此有八義一聰明二為勝三意微細四正覺五智慧增上六能別虗實七聖道正器八聰慧業所生又由先造作增長中品身語意妙行往彼生彼令彼生相續故名人趣又多憍慢故名人於五趣中憍慢多者無如人也又能寂靜意故名人於五趣中能寂靜意無如人也然人身難得正法難聞今人身已得復聞正法不聞正法便纏世見寧知三世六趣輪回修人天因造涅槃道且光陰迅速如白駒過隙不謀早修更待何時轉息即是來世奚定生方善因未建惡果斯彰一失人身非論劫數故付法藏經云人身不堅腐敗危脆猶如聚沫須臾變滅無常既至誰有存者口氣不來青腫臭爛髮毛爪齒狼籍在地故知人身惟苦無常復有愚智貧富貴賤種種不等悉由前生所造善惡之業不同故其果報非一而所居處亦復各異是有四大州及八中州諸餘小州之途分然皆不免三災八苦智者觀之理應生厭速求解脫原其始也爰此世界初成大地為一海水由風鼓激和合一類猶如熟乳既其冷已有凝結生其海水後漸成於地上有地味色香美味悉皆具足時彼色界光音諸天或有福盡來生或樂觀新地來下性多輕躁以指嘗其地味如是轉三得其甜美食之不已漸生粗肥失天妙色神足光明冥然大暗後有黑風吹彼海水漂出日月置須彌邊安日道中繞須彌山照四天下時諸人輩見出則歡見入則懼自茲以後晝夜晦朔春秋歲數終而復始劫初成時諸天來下為人皆悉化生身光自在神足飛行無有男女尊卑衆共生世故名衆生食地味多者顏色粗悴其食少者顏色光澤遂生勝負因緣勝負便生是非地味稍歇咸皆懊惱又生地皮狀如薄餅地皮又滅又生地膚地膚滅故又生自然地肥地肥不生便生兩枝葡萄其味亦甘久久食多共相形笑葡萄不生便生粇米不種自生無有糠穢長於四指旦暮收刈苗即隨生至旦暮時米便成熟雖復數取而無異狀以此充食長壽而住時彼衆生由段食故滓穢在身為欲蠲除便成二道遂有男女根生便生染著故相親近因造非法諸餘衆生見此事時競以糞掃土石而棄擲之不共同居擯於衆外今時出嫁以金銀麻豆共擲皆由昔日糞土棄擲之原本由彼時人驅擯出故樂行惡者遂共聚集造立房舍覆蔽其身而作非法此為最初營立家宅便有家室時諸衆生若日暮時若日朝時由饑取稻每日充足不令餘殘有一衆生為慵懶故旦起取稻遂乃兼將暮時稻來至暮時有一同伴喚共取稻此人報曰汝自取去我旦來取稻已兼兩時糧訖時彼同伴聞斯語已心便讚曰此亦大好我今取時兼二日糧來如是彼此遞相效學取二日三日七日乃至半月一月稻來漸漸倍於前數由此貪心日增盛故遂令稻中生諸糠穢一刈之時更不再生設生之時其實漸惡於是諸人競來收採以貪心積聚故糠穢轉盛其稻無力收採不生或有遺餘諸人見已更相告曰我等分取地界便各各分之因此義故世間田地始為耕種遂立疆畔時一衆生雖自有田私盜他穀再三不休遂推往衆中陳說其事彼反嫌言為少稻故對衆辱我由此緣故大衆共集遞相告曰不知二人是誰有罪我等意欲衆中揀一衆生顏色端正形容具足智慧通達立為田主有過者治罰無過者養育我等衆人所種之田各各依法六分之中與其一分爾時衆中揀得一具足德人即立為地主彼即如法治罰養育人衆既衆立為地主由此因緣世間有剎帝利王種也時有一衆生作是念言世間所有家屬萬物皆為刺棘癰瘡今宜捨離入山行道靜處思惟時彼入山樹下思惟日日出山入村乞食村人見已加敬供養衆共稱善此人乃能捨離家纍入山求道以其能離惡不善法守道居貞潔白其操因是稱為婆羅門由此因緣世間有婆羅門種彼衆生中習種種業遷居逐利以自營生因是世間故有毗舍之種商賈也又彼衆生中肆力田隴習諸雜藝以自生活因是世間有首陀羅種農人也由此因緣故有四姓而剎利為先長壽共住歲數無量減至八萬四千歲時人身長八丈過百年減一歲如是減至十歲人高一尺復過百年增一歲如是增至八萬四千歲此一減增名一小劫共有一千六百八十萬年如是二十增減名一中劫共計有三萬三千六百萬年然八劫已過今當第九減劫人壽當六七十歲間人高六七尺當周尺也如是住滿二十小劫則壞劫時至矣初火災次水災三風災如是壞經二十小劫山河大地須彌鐵圍盡皆碎末又空空經二十小劫乃入成劫復經二十劫方得成立如是周而復始運運無窮焉光音天乃色界二禪天也人從梵天降下故其語是梵語書是梵書自後人隨地轉語音各異今惟天竺存焉婆羅門此云淨行猶此方儒者也宋靜齊學士劉謐三教平心論曰張橫渠不信輪回之說謂佛言有識之死受生輪回為未之思此即莊子息我以死之見也意謂死則休息更無餘事矣殊不知生死無際輪回不息四生六道隨業受報而謂之無輪回可乎南史載梁武帝夢眇目僧執手爐入宮內欲託生王宮覺而後宮生子繹幼即病目醫療不效竟眇一目是為元帝名臣言行録載范祖禹將生其母夢一偉丈夫立於側曰我漢將軍鄧禹也覺而産兒遂名祖禹以鄧禹內行淳備遂字之曰淳夫以是證之則儒家之書固有輪回說矣乃以釋氏輪回之說為非是何其不之察也程明道不信地獄之說謂佛為下根者設此僞教怖令為善此即小人以小惡為無傷之見也意謂生作過惡既死誰復窮治哉殊不知天地神明昭布森列賞善罰惡如影隨形而謂之無地獄可乎名臣言行録載王荊公子名雱所為不善凡荊公悖理傷道之事多出於雱及雱死後荊公倣佛見雱荷鐵枷立於門側於是捨所居之半山為鐘山寺為修追冥福以是證之則儒家之書固有地獄之說矣乃謂釋氏地獄之說為無有何其未之思也若曰因果之說不足信也則作善降之百祥作不善降之百殃積善必有餘慶積不善必有餘殃儒家固以因果教人也豈謂教不足行謂暴為無傷者反為知道乎若曰齊潔之說不足取也則不茹葷者孔子以為祭祀之齊致齊三日者禮記以為清明之德儒家固以齊潔教人也豈垂肉為林日食萬錢者反為美事乎若曰殺生之戒非是則成湯之祝網趙簡子之放生皆是意也齊宣不忍一牛孟子謂之仁術宋郊救諸螻蟻君子以為美談儒家曷嘗不以護生為盛德之事哉若曰飲酒之戒非是則大禹之惡旨酒光武之不飲酒皆是意也沈亂之酒所以干先王之誅醉而號呶所以致賓筵之刺儒家曷嘗不以沉湎為招禍之本哉若曰盜取之戒非儒家之所尚則伊尹所謂非其道也非其義也一介不以取諸人東坡所謂天地之間物各有主苟非吾之所有雖一毫而莫取是果何說也若曰妄語之教非儒家之所急則司馬溫公至誠之學自不妄語始又其作資治通鑑謂秦孝公不廢移木之賞齊威公不背曹沫之盟晉文公不貪伐原之利是果何意也若曰邪淫之戒為臆說則美反正剌淫泆見於聲詩之所詠是儒家未嘗縱人邪淫也若曰布施之說為狂言則賜貧窮賑乏絶見戴禮之所記是儒家未嘗禁人布施也若曰死則永滅不復有知則繫辭云遊魂為變孝經云以鬼享之左傳云鬼猶求食張睢陽云死當為厲鬼以殺賊則是既死之後固有見聞覺知之性也若曰死雖有知不復有罪則書曰天道福善禍淫易曰鬼神害盈福謙左傳曰有渝此盟明神殛之莊子曰為不善於幽間之中也鬼得而誅之則是冥冥之中固有賞善罰惡之事也世有發姦擲伏如神者固不致縱有罪以長姦惡況權衡豫奪真以神明司之乎彼聰明正直不可掩蔽也不可欺罔也不徇世人之私情不畏陽間之權勢也則有罪者何以逃刑哉地獄之說前既言之矣至於死而變為畜生見於儒家之所紀者非一鯀為黃能彭生為豕載於左傳褒君為龍載於史記趙王如意為犬載於前漢書是中國未有佛教之前紀載於儒書者如此非釋氏創為此說也賈誼曰忽然為人兮何足控搏化為異物兮亦何足患信斯言也則知人有此身不可以常保背善趨惡不免為異類聰明不能敵業富貴豈免輪回今日乘肥衣錦異時銜鐵負鞍今日操筆弄墨他生戴角披毛必然之理也故佛以廣大之心示五乘之教人乘者教人持五戒而常獲人身不墮於異類也天乘者教人修十善而報得天身不止於為人也後之三乘者教人由聲聞緣覺以至於佛道永斷生死常住不滅證無上覺還度衆生也天下之大道遠理孰有過於此者世有大道遠理而懵然不知方且恃其聰明矜其聲勢謗襲聖教多積過愆而自趨於惡道其亦可哀也已大抵人有此身其生也甚難其死也甚易世尊握土以示其徒以為輪回於四生六道之中得人身者如手中之土失人身如大地之土蓋謂為善之時少而謂為惡之時多是以得人身時少而失人身時多則其生也豈不甚難哉可不競競業業晝驚夕惕為解脫之計乎佛以解脫法門示天下凡有血氣心知之性者皆可趨而入也而惟根器不凡智識超卓得正知見不墮邪解能知之耳李士謙曰杜宇為鶗鳩牛哀為虎君子為鵠小人為猿黃母為黿宣武為鱉鄧艾為牛徐伯為魚斯言皆出儒典豈釋教之所構哉正見經云時有一比丘名曰正見有疑念言佛說有後世生至於人死皆無相報何以知乎此問未發佛已預知佛告諸弟子譬如樹本以一核種四大包育自致巨盛芽葉莖節展轉變易遂成大樹樹復生果果復成樹歲月增益如是無數欲踧集華實莖節更還作核可得以不諸弟子言不可得也彼以轉變日就朽敗核種復生如是無極轉生轉易終皆歸朽不可復還使成本核也佛告諸弟子生死亦如此本由癡出展轉合成十二因緣識神轉易隨行而使更有父母更受形體不復識故不得還報譬如冶家鎔石作鐵鑄鐵為器成器可還使作石乎正見答言實不可成鐵為石佛言識之轉徙住在中陰如石成鐵轉受他體如鐵成器形銷體易不得復還故識稟受人身更有父母已有父母便有六閉一住在中陰不得復還二隨所受身胞內三初生迫痛忘故識想四生墮地故所識念滅更起新見想五已生便著食念故識念斷六從生日長大習所新無復宿識佛言識神隨作善惡臨死隨行所見非故身不可復還識故面相答報也未得道意無有淨眼身死識去隨行變化轉受他體何得相報也勤行經戒深思生死本從何來終歸何所得淨結除所疑自解正見聞已歡喜奉行六閉即眼耳鼻舌身意六根也中陰如後釋輪轉五道經云迦維羅衛國舍衛國二國之間有一大樹名尼俱類樹高二十里枝布方圓覆六十里其樹生子皆數千萬斛食之香甘其味如蜜甘果熟落人民食之衆病皆愈眼目精明佛在樹下時諸比丘取果食之佛告阿難天下萬物各有宿緣阿難白佛何等宿緣佛言夫人作福譬喻此樹稍稍漸大收子無限夫人豪貴國王長者從禮事三寶中來為人大富財物無限從布施中來為人長壽無有疾病身體強壯姝長從持戒中來為人端正顏色潔白輝容第一見無不喜從忍辱中來為人精進樂於福事從精進中來為人安詳言行審諦從禪定中來為人才明達解深法從智慧中來得人音聲清徹聞者樂聽從歌歎三寶中來為人潔淨無有疾痛從慈心中來阿難白佛云何為慈佛言一慈衆生如母愛子二悲世間欲令解脫三解脫道意心常歡喜四為能護一切不犯是名慈心佛言為人姝長恭敬人故為人短小輕慢人故為人醜陋喜瞋恚故為人生無所知不學問故為人專愚不教人故為人瘖啞謗毀人故為人聾盲不聽法故為人奴婢負債不償不禮三寶故為人醜黑遮佛光明故為人生在裸國者輕衣入精舍故生馬蹄國者著屐躡佛前故生穿胸人國者布施作福悔惜心故生在麞鹿麂中者喜驚怖人故生在龍中者調戲忿怒人故身生惡瘡癩疾難差醫藥所不治苦痛難言者前身喜鞭打衆生故人見歡喜者前生見人歡喜故人見不歡喜者前身見人不歡悅故喜遭縣官閉在牢獄杻械其身者前身喜籠繫衆生不從意故為人唇缺者前身鈎魚口缺故為人聞說法心不聽採於中兩舌亂人聽受者後生作長耳驢及耽耳狗中為人慳貪不恕己好獨食者死入地獄墮餓鬼中出生為人貧窮饑餓衣不蓋形食不供口為人好食獨啖惡食施人者後墮猪豚𧏙蜋之中為人喜剝脫人物者後墮羊中生被剝皮為人喜殺生者後生為水上作蜉蝣之蟲朝生暮死為人喜偷盜人物者後生奴婢牛馬中為人喜妄語傳人惡者死入地獄煬銅灌口拔出其舌以牛犂之後墮白鳩鵅鳥中人聞其鳴莫不驚怖皆言變怪呪令其死為人喜淫他婦女者死入地獄男抱銅柱女臥鐵牀後墮淫色鵝鴨鳥中為人喜飲酒醉犯三十六失者死入地獄墮沸屎地獄中復墮猩猩獸中後生為人愚癡故無所知為人夫婦不相和順數共鬬諍更相驅遣者後墮鳩鴿中為人喜貪人力者後墮象中為人不潔淨者從猪中來為人慳貪不恕己者從狗中來為人狠戾自用者從羊中來為人不安庠不能忍事者從獼猴中來為人尤惡含毒心者從蝮蛇中來為人好于美食恐害衆生無有善者前身從豺狼狸猫中來餘如經廣明此不繁録優婆塞戒經云佛告善生長者善男子衆生造業有其四種一者現報今身作極善惡業即今身受之二者生報今身造業次後身受三者後報今身造業次後未受更第二第三生已去受者是名後報婆沙論云有一屠兒七生已來常屠不落三塗猶生人天往來此由七生已前曾施緣覺尊者一食福力故令七生不墮惡道然此人七生已來所作屠罪之業過七生已次第受之無有得脫善惡俱爾四者無報猶無記等業是此無報業復有四種一時定報不定現生後三時決定不改由業有可轉故報不定二報定時不定由業力定報不可改然時有可轉故時不定三時報俱定由業定故感時亦定四時報俱不定由業不决定故時報亦不定也衆生作業有具不具若先念後作名作具足若先不念直造作者名作不具足復有作不具足者謂作業已果報不定復有作已亦具足者謂作業已定當得報復有作已亦具足者時報俱定復有作已不具足者持戒正見復有作已亦具足者毀戒邪見復有作已不具足者三時生悔復有作已亦具足者三時不悔如惡既爾善亦如是三時生悔者初作時正作時作已時道安法師二教論云業有三報所謂現報生報後報如經廣明言後報者或二生或三生百千萬生然後乃受受之無主必由於心心無定司必感於事緣有強弱故報有遲速故經曰譬如負債強者先牽此因果之賞罰三報之弘趣自非通才達識罕得其門世或有積善而得殃或有𠒋邪而致慶此皆現業未熟而前報已應故曰禎祥遇禍妖孽享福疑似之嫌於是乎在斯則顏子短壽運鍾在昔今之積德利在方將盜跖長年酬於往善今之肆惡衰在未來楚穆王字商臣楚成王之太子世有殺父之愆諡之為穆名實之差起於此矣此皆生後一報非現報也故經曰輕業故輕受如歌利王之刖羼提現被霹𮦷末利夫人供養須菩提現為皇后若斯之流皆現報也子云多殘為富貴之因持戒為患疾之本經有成通可得而言矣或有惡緣發善業多殺而致爵或有善緣發惡業多禪戒而獲病病從惡業而招豈修善而得貴從善業而興非坑殘所感故論曰是緣不定非受不定受定者言因不可變也其猶種稻得稻必不生麥雖不生不可陸種地為緣也稻即因矣然因果浩博諒難詳究依經誠言略標二種一者生業二者受業俱行十善同得人身生業也貧富貴賤聰鈍短長受業也故施獲大富慳致貧窮忍得端正瞋招醜陋相當因果也惟業報理微通人尚昧思不能及邪見是興或說人死神滅更無來生或云聚散莫窮心神無間或言吉凶苦樂皆天所為或計諸法自然不由因得果以禍福之數交謝於六府苦樂之報迭代而行遂使遇之者非其所對乃謂名教之書無宗於上善惡報應無徵於下若能覽三報以觀窮通之分則尼父不答仲由斷可知矣是故文子稱黃帝之言曰形有糜而神不化以不化乘其變無窮又嬴博之葬曰骨肉歸乎地而神氣不無之釋典曰識神無形假乘四蛇形無常主神無常家斯皆神馳六道之明證形盡一生之朗說未能信經希詳軒昊因茲而觀佛經所以越六典絶九流者豈不以疏神達要陶鑄靈府窮源盡化水鏡無垠者矣梵語羼提此云忍辱即昔釋迦如來被歌利王割絶肢體也刖音月絶也四蛇者謂身假地水火風而成也若言四報詳見如上五王經云佛為五王說法人生在世常有無量衆苦切身今粗為汝等略說八苦何謂八苦一生苦二老苦三病苦四死苦五恩愛別離苦六所求不得苦七怨憎會苦八憂悲苦是為八苦也何為生苦人死之時不知精神趣向何道未得生處普受中陰之形父母和合便來受胎一七日如薄酪二七日如稠酪三七日如凝酥四七日如肉團五七日五皰成就巧風入腹吹其身體六情開張在母腹中生藏之下熟藏之上母啖一杯熱食其身體如入鑊湯母飲一杯冷水亦如寒冰切身母飽之時迫迮身體痛不可言母饑之時腹中了𠄏亦如倒懸受苦無量至其滿月欲生之時頭向産門劇如兩石峽山欲生之際母危父怖生墮草上身體細軟草觸其身如履刀劒忽然失聲大叫此是苦否諸人咸言此是大菩餘七苦文多不録言中陰者亦名中蘊又名中有陰以陰覆本明真性為義蘊以積聚為義謂積聚無量塵勞煩惱而受生死輪回之苦有謂有生有死故也今此現在之身名為前陰若人命終暖氣盡時名捨前陰即有中陰身現如三歲童子皆無所見以香為食游空而去應至無量世界外受生俄頃即到二乘神通未出一世界中陰已至無量世界外縱佛神力亦不能遮令不往以彼業力定故故於有緣處見父母交會欲火光時即往投胎中陰之身便滅攬父母精血而為後陰名羯羅藍即肉團心是最初識心與父母精血和合名也若父母不會其中陰身待至一七日若七日不會中陰一死復生復待至二七日三七日乃至七七日不會中陰七死七生或由先世惡業現前即生地獄餓鬼畜生道中若前業報已定生地獄鬼畜其中陰身即直往彼生處如牛馬猪羊諸畜生等懷胎有時倘不遇時即投山牛馬猪羊等胎定不出四十九日外故人命終即當七七日內供養三寶修諸福事令中陰藉福託生人天免墮三途縱已墮三途由藉福故即出三途若已生人天由此福力於人天中皆增福壽今時陋俗不解七七之義宰殺生命祭祀增其亡者三途劇苦縱已得生人天中折福減壽如或不信閲後地獄受報即自見矣善見律云女人將欲受胎月華水出華水者此是血名欲懷胎時於兒胞處生一血聚七日自破從此而出若血出不斷者男精不住即共流出若盡出者以男精還復其處然後成胎故血盡已男精得住即便有胎雜事律云佛告難陀我為汝說入母胎經汝當諦聽難陀雖有母胎有入不入云何受生入母胎中若父母染心共為淫愛其母腹淨月期時至中蘊現前當知爾時名入母胎此中蘊形有其二種一者形色端正二者容貌醜陋地獄中有容貌醜陋如燒杌木傍生中有其色如煙餓鬼中有其色如水人天中有形如金色色界中有形色鮮白無色界天元無中有以無色故中蘊有情或有二手二足或四足多足或復無足隨其先業應託生處所感中有即如彼形無色界天無有色身故無中有隨其先業應墮何道故感中有如彼道形傍生即畜生若生天中有頭便向上人及鬼畜橫行而去地獄中有頭直向下凡諸中有皆具神通乘空而去猶如天眼遠觀生處言月期至者謂納胎時難陀有諸女人或經三日或經五日半月一月或有待緣經久期水方至若有女人身無威勢多受辛苦形容醜陋無好飲食月期雖來速當止息猶如乾地灑水之時即便易燥若有女人身有威勢常受安樂儀容端正得好飲食所有月期不速止息猶如潤地水灑之時即便難燥云何不入若父精出時母精不出母精出時父精不出若俱不出皆不入胎若母不淨父淨若父不淨母淨若俱不淨亦不受胎若母根為風病所持或有黃病痰癊或有血氣胎結或為肉增或為服藥或麥腹病蟻腰病或産門如駝口或中如多根樹或如犂頭或如車轅或如滕條或如樹葉或如麥芒或腹下深或有上深或非胎器或恆血出或復水流或如鴉口常開不合或上下四邊闊狹不等或高下凹凸或內有蟲食爛壞不淨若母有此過者並不受胎或父母尊貴中有卑賤或中有尊貴父母卑賤如此等類亦不成胎若父母及中有俱是尊貴若業不和合亦不成胎若其中有於前境處無男女二愛亦不受生難陀云何中有得入母胎若母腹淨中有現前見為欲事無如上說衆多過患父母及子有相感業方入母胎又彼中有欲入胎時心即顛倒若是男者於母生愛於父生憎若是女者於父生愛於母生憎於過去生所造諸業而起妄想作邪解心生寒冷想大風大雨及雲霧想或聞大衆鬧聲作此想已隨業優劣復起十種虗妄之想云何為十我今入宅我欲登樓我升臺殿我升牀座我入草菴我入葉舍我入草叢我入林內我入牆孔我入籬間難陀其時中有作此念已即入母胎應知受胎名羯羅藍父精母血非是餘物由父母精血和合因緣為識所緣依止而住譬如依酪瓶鑽人功動轉不已得有酥出異此不生當知父母不淨精血羯羅藍身亦復如是復次難陀有四譬喻汝當善聽如依青草蟲乃得生草非是蟲蟲非離草然依於草因緣和合蟲乃得生身作青色難陀當知父精母血羯羅藍身亦復如是因緣和合大種根生如依牛糞生蟲糞非是蟲蟲非離糞然依於糞因緣和合蟲乃得生身作黃色難陀當知父精母血羯羅藍身亦復如是因緣和合大種根生如依棗生蟲棗非是蟲蟲非離棗然依於棗因緣和合蟲乃得生身作赤色難陀當知父精母血羯羅藍身亦復如是因緣和合大種根生如依酪生蟲身作白色廣說乃至因緣和合大種根生復次依父母不淨羯羅藍故地界現前堅鞕為性水界現前溼潤為性火界現前溫暖為性風界現前輕動為性難陀若父母不淨羯羅藍身但有地界無水界者便即乾燥悉皆分散譬如手握乾灰等若但水界無地界者即便離散如油滴水由水界故地界不散由地界故水界不流難陀羯羅藍身有地水界無火界者而便爛壞譬如夏月陰處肉團難陀羯羅藍身但有地水火界無風界者即便不能增長廣大此等皆由先業為因更互為緣共相招感識乃得生地界能持水界能攝火界能熟風界能長難陀又如有人若彼弟子熟調沙糖即以氣吹令其增廣於內空虗猶如藕根內身大種地水火風業力增長亦復如是難陀非父母不淨有羯羅藍體亦非母腹亦非是業非因非緣但由此等衆緣和會方始有胎如新種子不被風日之所損壞堅實無穴藏舉合宜下於良田并有潤澤因緣和合方有芽莖枝葉華果次第增長難陀此之種子非離緣合芽等得生如是應知非惟父母非但有業及以餘緣而胎得生要由父母精血和合因緣方有胎耳難陀如明眼人為求火故將日光珠置於日中以乾牛糞而置其上方有火生如是應知依父母精血因緣合故方有胎生父母不淨成羯羅藍號之為色受想行識即是其名說為名色名是心即受想行識色是身也此之蘊聚可惡名色託生諸有乃至少分剎那我不讚歎何以故生諸有中是為大苦譬如糞穢少亦是臭如是應知生諸有中少亦名苦此五取蘊色受想行識皆有生住增長及以衰壞生即是苦住即是病增長衰壞即是老死是故難陀於諸有海而生愛味臥母胎中受斯劇苦復次難陀如是應知凡入胎者大數言之有三十八七日初七日時胎居母腹如榍如癰臥在糞穢如處鍋中身根及識同居一處壯熱煎熬極受辛苦名羯羅藍狀如粥汁或如酪漿於七日中內熱煎煮地界堅性水界溼性火界暖性風界動性方始現前從二七日去至三十七七日一一皆有風名及在胎位形相名字文多不録難陀第三十八七日於母胎中有風名曰藍華此風能令胎子轉身向下長舒兩臂趣向産門次復有風名曰趣下由業力故風吹胎下令頭向下雙腳向上將出産門難陀若彼胎子於前身中造衆惡業并墮人胎由此因緣將欲出時手足橫亂不能轉側便於母腹以取命終其母由斯受不稱意極痛辛苦因此命終設復得存與死無異難陀若彼胎子善業所感假令顛倒不損其母安隱生出不受辛苦難陀若是尋常無此厄者至三十八七日將欲産時母受大苦性令幾絶方得出胎難陀汝可審觀當求出離難陀凡胎生者是極苦惱初生之時或男或女墮人手內或以衣裹安在日中或在陰處或置搖車或居牀席懷抱之內由是因緣皆受酸辛楚毒極苦難陀如牛剝皮近牆而住被牆蟲所食若近樹草樹草蟲食若居空處諸蟲唼食皆受苦惱初生亦爾以暖水洗受大苦惱如癩病人皮膚潰爛膿血橫流加之杖捶極受楚切生身之後飲母血垢而得長大言血垢者即乳汁是難陀既有如是無邊極苦無一可樂誰有智者於斯苦海而生愛戀常為流轉無有休息云云詳如律文若欲廣知當閲彼律梵語難陀此云歡喜是佛親弟舊雜譬喻經云昔釋迦佛往到第二忉利天上為母說經時有一天壽命垂盡有七事應現一者項中光滅二者頭上傅飾華萎三者面色變四者衣上有塵五者腋下汗出六者身形瘦七者離本座即自思惟壽終之後當棄天樂下生拘夷那竭國受疥癩母猪腹中作子甚預愁憂不知何計得免此罪有天語言今佛在此為母說經佛為三世一切之救惟佛能脫卿之重罪何不往歸即到佛所稽首作禮未及發問佛告天子一切萬物皆歸無常汝素所知何為憂愁天白佛言雖知天福不可得久恨離此座當墮猪胎以是為毒人趣受身不敢為恐也佛言欲脫猪身當三自歸言南無佛南無法南無比丘僧歸命佛歸命法歸命比丘僧如是日三時天從佛教日夜自歸於後七日天命壽盡至維耶離國作長者子在母胞胎日三自歸及生墮地亦跪自歸其母娩身又無惡露母傍侍婢怖而棄走母亦深怪兒墮地語謂之熒惑意欲殺之退自念言我少子息若殺此兒夫必罪我即白長者夫言止止此兒非凡人生百歲尚不曉自歸況兒墮地能自稱佛好養視之無令輕慢兒遂長大七歲與其同輩於道邊戲時舍利弗目犍連適過兒傍兒言我和尚舍利弗等驚怪小兒能禮比丘兒言道人不識我耶佛於天上為母說經我時為天當下作猪從佛受教三自歸依今得人身舍利弗即入禪定觀便知之即為呪願因請佛及僧供養訖佛為說法父母及兒內外眷屬應時皆得阿惟越致此是自歸之福也阿惟越致此云不退轉即不退菩薩地也拘夷那竭即拘尸國維耶離即毗舍離國皆中天竺境法句喻經及懊惱經云爾時舍衛城有一長者財寶無數正有一子其年二十新為娶妻未滿七日夫婦相敬欲至後園上春三月遊戲園中有一奈樹高大好華婦欲得華無人取與夫為上樹乃至細枝枝折墮死居家大小奔赴兒所呼天號哭聞者莫不傷心棺斂送還家啼不止世尊愍傷其愚往訊問之長者室家大小見佛悲感作禮佛語長者止息聽法萬物無常不可久保生則有死罪福相追此兒三處父母一時哭泣懊惱斷絶竟為誰子何者為親長者忘憂長跪白佛此兒宿命作何罪疊盛美之壽而便中夭唯願解說佛告長者乃往昔時有一小兒持弓箭入神樹中戲邊有三人亦在中看樹上有小兒欲射三人勸言若能中是世健兒小兒意喜引弓射之中即死三人共笑助之歡喜而各自去經歷生死數劫之中所在相會受罪三人中一人有福今在忉利天上一人生海中為化生龍王一人今日長者身是小兒者前生天上為天作子墮樹命終即生海中為龍王作子即以生日金翅鳥王而取食之今日三處懊惱涕泣寧可言也以其前世助其喜故今三人受報懊惱小兒前世好喜布施尊敬於人故生富家喜獵傷生故生命短長者意解大小歡喜皆得須陀洹道須陀洹此云入流謂入聖道之流即果人也律云昔如來與諸比丘於林中坐有一獼猴從樹來下取佛鉢上樹盛滿鉢蜜上佛佛不為受彼即知佛意持往水邊以水灑作淨獻上佛佛即為受令阿難分與衆僧獼猴歡喜騰躍却舞墮坑而死託生師質長者家形貌端正出家證阿羅漢名曰摩頭婆肆吒此云獻蜜上座賢愚經及報恩經云過去迦葉佛時有年少比丘見一老比丘常好讚誦音聲鈍濁自謂好聲而言汝今聲如狗吠時老比丘語言汝識我否我今已得阿羅漢道年少聞已惶怖自責即於其前懺悔老比丘即聽悔過雖免地獄由其惡言五百世中常受狗身時有商人五百將一白狗共詣他國中路歇息狗盜肉食商人斷狗四腳投之坑中而去時舍利弗以天眼遙見狗身攣躃在地饑餓困篤命欲垂死即持鉢飯飛至狗所以慈愍心施與狗食活其餘命食已歡喜復為說法七日後命終生舍衛國婆羅門家字曰均提年至七歲舍利弗化令出家為說妙法便證羅漢六通悉備自見前身是餓狗蒙師舍利弗恩今得人身并獲道果自念當盡身供給師之所須永作沙彌不受大戒由其前生出家持淨戒故今值釋迦如來得阿羅漢果度狗經云昔有沙門見一屠兒拘一狗子持歸欲殺沙門語曰殺生之罪甚為不善願將我鉢中食貿此狗身令命得活獲福無量乃至殷勤曉諭屠兒不肯隨言沙門即以飯飼狗子以手摩捋呪願泣而告曰卿何罪所致得是狗身不得自在為他殺食願汝世世罪滅福生離狗子身得生為人值遇三寶狗子得食善心即生踊躍歡喜自知歸依屠兒將歸殺食狗子命終生大長者家時沙門乞食到長者門其子見之歡喜禮足供以百味即隨出家深解經義便得三昧致不退轉開化一切發菩提心畜生尚乃得道況人寧不獲果天竺南海之瀕有一枯樹五百蝙蝠於中穴居有諸商侶止此樹下時屬風寒人皆饑凍聚積樵酥蘊火其下煙𦦨漸熾枯樹遂然時商侶中有一賈客夜分已後誦阿毗達磨藏彼諸蝙蝠雖為火困愛好法音忍而不出於此命終隨業受生俱得人身捨家修學乘聞法聲聰明利智並證聖果為世福田近迦膩色迦王與脅尊者招集五百賢聖於迦溼彌羅國作毗婆沙論斯並枯樹之中五百蝙蝠也出西域記南海是南天竺海邊迦溼彌羅國是北天竺之國阿毗達磨藏是大毗婆沙論藏蝙蝠南方謂之飛鼠今之凡俗尚不信人死為六畜況信為蠢動含靈殊不知蠢動含靈本具佛性由惡業重故漸漸頑癡至形微小若業報漸消漸靈漸大至復人身即我釋迦如來於前多劫中曾為麞鹿鵝鴈魚鱉蝨等故佛每為諸弟子說多生前世曾為之事也第十祖脅尊者如來滅度後五百年出世當此周貞定王時也晉泰山太傅羊祜字叔子西晉名臣聲冠區夏年五歲時嘗令乳母取先所弄指環乳母曰汝本無此於何取耶祐曰昔於東垣邊弄之落桑樹中乳母曰汝可自覓祐曰此非先宅兒不知處後因出門遊望徑而東行乳母隨之至李氏家乃入至東垣樹下探得小環李氏驚悵曰吾子昔有此環常愛弄之七歲暴亡亡後不知環處此亡兒之物也云何持去祐持環走李氏遂問之乳母既說祐言李氏悲喜遂欲求祐還為其兒里中解喻然後得止祐年長常患頭風醫欲攻治祐曰吾生三日時頭首北戶覺風吹頂意其患之但不能語耳病源既久不可治也祐後為荊州都督鎮襄陽經給武當寺殊餘精舍或問其故祐默然後因懺悔敘說因果乃曰前身承有諸罪賴造此寺故獲申濟所以使供養之情偏殷重也言前身則不止一生也非得宿命通豈知多生事耶或從人道來得人身者有能記憶前生事若墮餘道而來者則不能記憶所謂不可復還使成本核也琅琊王練字玄明宋侍中父珉字季琰晉中書令相識一梵沙門每瞻珉風采甚敬悅之輒語同學云若我後生得為此人作子於近願亦足矣珉聞而戲之曰法師才行正可為弟子子耳頃之沙門病亡亡後歲餘而練生焉始能言便解外國語及絶國之奇珍銀器珠貝生所不見未聞其名即而名之識其産出自然親受諸梵過於漢人咸謂沙門審其先身故珉字之曰阿練遂為大名云云吳興向靖字奉仁河內人也喪數歲女女始病時弄小刀子母奪取不與傷母手喪後一年母又産一女女年四歲謂母曰前時刀子何在母曰無也女曰昔爭刀子故傷母手云何無耶母甚驚怪具以告靖靖曰先刀子猶在否母曰痛念前女故不録之靖曰可覓數箇刀子合置一處令女自擇女見大喜即取先者曰此是兒許父母大小乃知前女審其先身右三出冥祥記餘杭元興三年初餘杭山沙門法志常誦法華有雉翔集座隅如聽狀越七年雉殞志瘞之夜夢童子拜曰因聽經得脫羽類今生山前王氏家志詰朝遣問之如其言王氏一日設齊志方踵門兒曰我和上來也志撫之曰此我雉兒也解衣視腋下果有雉毳三莖七歲令出家十六落髮以腋有毳因名曇翼後感普賢菩薩示現出通載宋武帝始登位夢一道人提鉢就乞因而言曰君於前世施維衛佛一鉢之飯今居斯位帝遣問嚴公徵其虗實嚴公即送七佛經呈聞出弘明集維衛佛即毗婆尸佛崑崙山曇諦法師父姓康名彤康居國人漢靈時移附中國獻帝末亂移止吳興曾為冀州別駕母黃氏晝寢夢見一僧呼黃氏為母寄一麈尾并鐵鏤書鎮二枚眠寤見兩物具存因而懷孕生諦諦年五歲母以麈尾等示之諦曰秦王所餉母曰汝置何處答云不憶至年十歲出家學不從師悟自天發後隨父之樊鄧遇見關中僧䂮道人忽喚䂮名䂮曰童子何以呼老宿名諦曰向者忽言阿尚是諦沙彌為衆僧採菜被野猪所傷不覺失聲耳曾為弘覺法師弟子為僧採菜被野猪所傷初不憶此乃詣諦父諦父具說本末并示書鎮麈尾等乃悟而泣曰即先師弘覺法師也師曾為姚萇講法華貧道為都講姚萇餉師二物今遂在此追計弘覺捨命正是寄物之日復憶採菜之事彌深悲仰諦後遊覽經籍遇目斯記晚入吳虎丘寺講禮記周易春秋各七遍法華大品維摩各十五遍又善文翰集有六卷亦行於世性愛林泉後還吳興入故章崑崙山間居㵎飲二十餘載以宋元嘉末卒於山舍春秋六十餘出梁高僧傳元魏北代乘禪師常受持法華精勤不懈命終託生河東薛氏為第五子生而能言自陳宿業不願處俗其父任北肆州刺史五郎隨任便往中山至七帝寺尋得前世本時弟子語曰汝頗憶從我度水往狼山否乘禪師者即我身是吾房中靈几可速除却弟子聞驗抱師悲慟哀傷道俗奇怪將為大徵父母戀惜恐其出家便與納室爾後便忘宿命之事而常興厭離恆樂靜居出唐高僧傳北齊趙州僧安法師文宣時在王屋山聚徒講涅槃經始發題有雌雉來座側伏聽僧若食時出外飲日晚上講依時赴集三卷未了遂絶不來衆咸怪之安曰雉今生人道不須怪也武平四年安領徒至越州行頭陀忽云往年雌雉應生在此徑至一家遙喚雌雉一女走出如舊相識禮拜歡喜父母異之引入設食安曰此女何故名雌雉耶答曰見其初生髮如雉毛既是女故名雌雉也安大笑為述本緣女聞涕泣苦求出家二親欣然許之為講涅槃聞便領解一無遺漏至後三卷茫然不解於時始年十四便就講說遠近咸聽歎其宿習因斯躬勸從學者衆矣出續高僧傳宣帝帝即位嘗謁僧稠禪師稠牀坐不迎其徒勸迎者稠曰昔優填王懷惡心來賓頭盧尊者下牀行七步迎之七日後王失國位被鄰國擒捉鎖腳囚禁十二年吾今雖寡德冀帝獲福耳俄以此被譖帝銜之將復入寺按其不敬誅之稠已知之及帝來寺預出十里許候之帝怪問稠曰恐身血汙伽藍遠來就刃耳帝悚然悔謝謂其臣楊遵曰朕不明幾妄黷聖師即奉之如故帝問前身稠曰陛下前身羅剎也今好殺蓋餘習耳帝問何以知之稠請以盤貯水自呪之命帝臨觀見自形正羅剎狀仍有羣羅剎隨之帝大驚自是絶葷終日坐禪禮佛行道如旋風焉出通載梁元帝武帝第七子諱繹字世誠初武帝夢僧眇一目手執爐云託生王宮已而母夢月墮懷中遂生帝帝幼即一目病醫療不效竟眇一目首封湘王即位于江陵捨宮造天宮寺及天居寺每講法華經解成實論壽四十七出梁史隋博陵崔彥武開皇中為魏州刺史因行部至一邑愕然驚喜謂從者曰吾昔嘗在此邑中為人婦今知家處因乘馬入修巷屈曲至一家命叩門主人公年老走出拜謁彥武入家先升其堂視東壁上去地六七尺有高隆因謂主人曰吾昔所讀法華經并金叉五雙藏此壁中高處是也其經第七卷尾後紙火燒失文字吾今每誦此經至第七卷尾恆忘失不能記得因令左右鑿壁果得經函開第七卷尾及金叉並如其言主人涕泣曰亡妻存日常誦此經叉亦是其物彥武曰庭前槐樹吾欲産時自解頭髮置此樹穴中試令人探樹中果得髮於是主人悲喜彥武留衣物厚給主人而去太山大業中有客僧行至太山廟欲寄宿廟令曰此別無舍惟神廟廡下可宿然而比來寄宿者輒死僧曰無苦也不得已從之為設牀於廡下僧至夜端坐誦經可一更聞幄環珮聲須臾神出為僧禮拜僧曰聞比宿者多死豈檀越害之耶願見護之神曰遇死者將至聞弟子聲因自懼死非煞之也願師無慮僧因延坐談說如食頃問曰聞世人傳說云太山治鬼寧有之耶神曰弟子薄福有之豈欲見先亡乎僧曰有兩同學僧先死願見之神問知名乃曰一人已生人間一人在獄罪重不可喚來若師就見可也僧聞甚悅因起出不遠而至一所多見廟獄火燒光𦦨甚盛神將僧入一院遙見一人在火中號呼不能言形變不復可識而血肉焦臭令人傷心神曰此是也師不欲歷觀耶僧愁愍求出俄而至廟又與神坐因問欲救同學有得理耶神曰可得能為寫法華經者便免既而將曙神辭僧入堂旦而廟令視其僧不死怪異之僧因為說仍即為寫法華經一部經既成莊嚴畢又將經就廟宿其夜神出如初歡喜禮拜慰問來意以事告之神曰弟子已知之師為寫經始書題目彼已脫免今又生在人也然此處不潔不可安經願師還將送向寺言說久之將曉辭訣而去送經於寺杭州別駕張德言前任兖州具知其事右二出冥報記此記二卷是唐朝永徽年吏部尚書唐臨撰徐陵智威禪師前身是陳時僕射徐陵聽智者大師講經因立五願一臨終正念二不墜三途三人中託生四童真出家五不墮流俗之僧後生縉雲朱氏年十八將納婦路逢梵僧謂曰少年何意欲違昔誓因示其五願威聞已不復還家即往國清寺投章安法師咨受心要即證法華三昧天台國清寺僧智環為直歲將常住布十端與始豐縣丞李意及久而不還環死作寺家奴背有智環字既而丞亦死亦作寺家奴背亦有李意及字右二出統紀天台縣在隋唐時名始豐唐汾州劉善經隰城人少小孤母所撫育其母平生恆習讀內典精勤苦行以貞觀二十一年亡善經哀毀過禮哭聲不輟至明年善經髣佛之間見其母曰我為生時修福得受男身今生於此縣南石趙村宋家汝欲相見可即至彼也言訖不見善經如言而往不移時而至彼於是日宋家生男善經因奉衣物具言由委此男現在善經恆以母禮事之隰州沙門善撫與善經知舊見善經及鄉人所說為余言之相州陽縣智力寺僧言高俗姓趙氏其兄子先身於同村馬家為兒馬家兒至貞觀末死臨死之際顧謂母曰兒於趙宗家有宿因緣死後當與宗為孫宗即與其同村也其母不信乃以墨點兒左肋作一大黑子趙家妻又夢此兒來云當與娘為息因而有娠夢中所見宛然馬家之子産訖驗其黑子還在舊處及兒年三歲無人導引乃自向馬家云此是兒舊舍也於今現存已年十四五相州智力寺僧慧永法真等說之右二出冥報拾遺記此記二卷是唐朝終山郎餘令字元休龍朔年中撰蘄州黃梅五祖弘忍大師周氏子生而岐嶷兒時有異僧歎曰是子闕七種相不逮如來林間録云四祖大師居破頭山山中有無名老僧唯植松人呼為栽松道者嘗請於祖曰法道可得聞乎祖曰汝已老脫有聞其能廣化耶儻能再來吾尚可遲汝乃去行水邊見女子浣衣揖曰寄宿得否女曰我有父兄可往求之曰諾女首肯之老僧回䇿而去周氏女歸輒孕父母大惡逐之女無所歸日庸紡里中已而生一子以為不祥棄之水中明日見之泝流而上氣體鮮明大驚遂舉之成童隨母乞食邑人呼為無姓兒四祖見於黃梅道中戲問之曰汝何姓曰姓固有但非常姓祖曰何姓曰是佛性祖曰汝乃無姓耶曰性空故無祖化其母使出家時年七歲也去破頭山佇望間道者肉身尚在噫五祖出入生死正其遊戲耳自非果位聖人孰能若是乎出通載并林間録并州石壁寺有一老僧禪誦為業精進練行貞觀末有鴿巢其房楹上哺養二雛老僧每有餘食恆就巢哺之鴿雛後雖漸長羽翼未成乃並學飛俱墜地而死僧並收葬之經旬後僧夜夢二小兒白曰兒等為先有小罪遂受鴿身比來聞法師讀法華經及金剛般若經既聞妙法得受人身兒等今於此寺側十餘里某村某姓名家託生為男十月之外當即誕育僧乃依期往視見此家一婦人同時誕育二子因為作滿月齊僧便呼鴿兒兩兒並應之曰諾一應之後歲餘始言出冥報拾遺昔吳永平四年天竺沙門耆域至洛陽神異甚多乃指沙門竺法淵曰此菩薩從羊中來指竺法興曰此菩薩從天中來皆有驗今此二兒從鴿中來誠不虛也莊惠莊惠太子武則天抱示以神僧萬回回曰此西域樹精養之宜兄弟安樂公主怙韋后將謀逆回途遇之望塵唾之曰腥氣不可近後安樂果被誅出統紀登州文登縣開元中郭行妻王氏生一女鶴喙後臨終自言曰吾酬先世嘗齊之報以此示人耳沙門釋牛雲開元中人少不聰慧因詣五臺山禮文殊大士初至東臺見一老人問曰何為而來答曰願見大聖求聰慧耳老人曰文殊居北臺雲即往北而老人亦在北雲意其即文殊遂拜不已老人曰汝前生身牛也以曾駝經故得比丘報汝性昏迷胸中有淤肉在汝閉目勿開為汝钁去之即以钁鋤其胸不甚痛覺心頓然開豁及開目見老人現文殊身語曰與汝聰明竟雲自是總持辨悟為世導師焉右二出通載回向寺玄宗二十六年沙門法秀夢異僧勸置袈裟五百領施回向寺及覺異之遂丐人造及其數忽一日遇僧曰吾導汝入回向寺隨之入終南山見崖半朱門高聳榜曰回向趨入謁上方老宿次諸僧皆奇偉相勞問秀出袈裟遍寺施之老宿引入空房呼侍者取尺八侍者持玉簫至老宿曰此唐天子舊室向居此好音樂故降為人主久當復歸授與簫并袈裟囑秀曰汝持歸獻唐天子秀還詣闕表上之帝取簫調弄宛如宿御焉詳出高僧傳壽州興元元年淮西壽州安豐縣民毛罕妻周氏生子猪頭象耳騾腳魚腮人身父母欲淹死遂作人言我為先世不信因果曾於廬州開元寺借用常住錢五千文麻布二匹不還故遭此罰望父母收養待長大送寺償報至年十七送寺掃地時時以鐵杖自鞭叫言還債以賴債故因名賴債興元間太尉中書令韋皋初生時其父飯僧祈福忽有聖僧至齊畢乳母抱兒求呪願僧起謂衆曰此兒昔諸葛武侯也他日有美政於蜀宜以武字之言訖忽然不見其後皋游官出處節義功名大槩與武侯相類治蜀二十一年封南康郡王有德在民四川至今奉祀之雅好釋教嘉州石像初成皋為之記龍懷寺曇相禪師臨終語其弟子會曰吾報緣當生廣漢綿竹峰頂楊家後七年汝來見吾言訖而逝楊為道士先生一女名信相生而知道次生男名惠寬五六歲日與相談論俱非世事父母録之其後會頗忘之一夕夢相責其負約會驚寤遂造峰頂而扣其扉寬曰扣扉者誰會遽曰弟子會也寬笑曰何以知吾而稱弟子會曰聞師聲猶昔日聲也遂相見父出所録示之蓋大莊嚴等論文會即奉寬再歸龍懷寺落髮由是神異日顯俗呼為聖和尚其姊亦隨出家嘗入水觀一室湛然不見其形惟見皆水亦號聖尼寬十世為大僧今十生記存焉衡嶽寺知𮗿法師悟解絶倫多所撰著然寡徒侶每覽所撰必一唱三歎惜不遇賞音者偶一日有一耆宿至借著述而閲之曰汝識至高頗符佛意今寡徒衆蓋缺人緣耳可辦食鳥獸後二十年當自有衆言訖不見𮗿遂賣衣單易米炊之散郊外感羣鳥大集摶飯而去祝之曰食吾飯者願為法侶後二十年往鄴城開講座下有千餘人皆年少比丘也東都惠林寺沙門圓澤與隱士李源厚善惠林即源舊第也父憕守東都為祿山所害源以故不仕常居寺中與澤談噱終日偶相率遊蛾嵋山源欲自荊州泝峽以往澤欲由長安斜谷源以為久絶人事不欲復入京師澤不能強遂自荊州舟次南浦見一婦人錦襠負罌而汲者澤望而泣曰所不欲由此者為是源驚問其故澤曰婦人孕三稔矣遲吾為之子不逢則已今既見之無可逃者公當以神呪助我令速生三日願公臨以一笑為信後十三年於杭州天竺寺外當與公相見源悲哀具浴至暮而澤亡婦乳三日源往視之兒見源果軒渠而笑即具以語其家葬訖源返寺中後如期自洛之杭赴其約至期於葛洪井畔聞有牧童扣牛角而歌曰三生石上舊精魂賞月吟風莫要論慚愧情人遠相訪此身雖異性常存源曰澤公健否答曰李君真信士也然世緣未盡且勿相近惟勤修不惰乃復相見又歌曰身前身後事茫茫欲話因緣恐斷腸吳越江山尋已遍却回煙棹上瞿塘遂隱不見源復歸惠林至長慶初年八十矣穆宗下詔以源守諫議大夫不赴尋以壽終右五出通載澤公預知三生事者此或須陀洹初果聖人極至七生七死得盡煩惱諸漏證阿羅漢得無生果而出三界不復更受生死矣今已三生尚有三四生在故云身前身後也猶未得受生處故云尋已遍吳郡齊君佐貧遇梵僧與一棗食之即悟前身是講經僧於座上廣說異端及戒缺乃投靈隱出家名鑑空出統紀宋仁宗真宗晚子也始生日夜啼不止有道人能止啼召入則曰莫叫莫叫何似當初莫笑啼即止蓋真宗嘗籲上帝祈嗣帝問羣仙誰當往者皆不答獨赤腳大仙一笑遂降為嗣在宮中好赤腳此其驗也出綱鑑滁州參政張方平出知滁州至僧舍見楞伽經手迹宛然知前身為書經僧遜長老後身為李侍郎嚴首座後身為王十朋皆載於傳記中公亮宰相曾公亮前身是禪門青草堂東坡蘇東坡弟轍字子由謫廣東高要縣時洞山雲菴與聰禪師一夕同夢五祖戒禪師明至遂與子由出城迓之已而東坡至三人說所夢坡曰八九歲時時夢身是僧往來陝右又先妣孕時夢眇目僧求託宿雲菴驚曰戒公陝右人一目眇逆數其終已五十年而東坡時四十九自是常稱戒和上右三出統紀山谷黃山谷謫涪陵夢一女子云是山谷前身緣棺朽蟻穴係兩腋間故山谷有腋氣病因令啓其墓改葬則病除果如言出月令燕都慶壽寺釋教亨字虗明濟州任城王氏子也先有汴京慈濟寺僧福安居任城有年精修白業緇素仰重一日赴齊於芒山村乃倚樹化去是夕示夢於女弟馮自彭村見其乘白馬而下曰我生於西陳村王光道家馮覺語母及其子三人夢皆同詰旦至光道家詢之其母劉氏先夕亦夢安公求宿焉是夕果誕亨乃拳右拇指似不能伸但瞬而未笑次日有同業僧福廣福堅聞而來謁見即呼云安兄無恙耶亨熟視舉手伸指而笑其母嘗臥師室中若有人誦摩訶般若之聲人皆呼為安山主故芒山村乃以師事於石紀其異年七歲出家十五參普照寶和尚一日忽聞打板聲廓然證入後出世乃五坐道場明紹興寶林寺釋大同字一雲別峰其號也越之上虞王氏子父友樵母陳氏妊師十月父晝坐堂上忽見龐眉異僧振錫而入父起揖曰和尚何來曰崑崙山竟排闥趨內急追聞房中兒啼聲父笑曰吾兒得非再來者乎師幼俊爽讀書輒會玄奧初習辭章翩翩大有可觀於是父歎曰是子般若種也詎俾纏溺塵勞乎遂命入會稽崇勝寺剃髮聞春谷法師講清涼宗旨郡之景德往依之盡得其傳聞天目中峰法道之盛往參便有終焉之意中峰一日召而勉曰賢首一宗日遠而日微矣子之器量足以張之毋久滯此特書偈讚清涼像付以遣之師大喜曰吾今始知萬法本乎一心不識孰為禪又孰為教也還寶林復侍春谷且告中峰之意谷隨命分座講華嚴經云云右二出明高僧傳浙江崇禎間寧波府管春夫婦二人在金陵打草鞋賣無子每日得錢銀但取給足餘投井中年月既纍頗不介意時有一僧從乞百金春曰吾打草鞋日充口腹那得銀兩僧曰但肯捨即有之春曰無不肯也僧遂倩人淘井適得百金而去後時管春被雷震死有書生姓朱名元價以硃題其背上云佛不仁三字價後中狀元官至禮部尚書奉敕往高麗封王王姓李名倧王謂價曰吾誕一子今已八歲竟不能言笑而背上有硃字不審是何祥祟價令抱出見字曰吾冤屈汝也遂即頓然言笑價為王說其因緣贊昔年少在方外親聞惟忘其二人姓名康熙十九年贊年七十至金陵禮報恩塔遇河南周混源隱士其父祖明時皆官在朝源詳聞其事及見高麗王拜價帖其紙光澤堅厚重如玉版云云識者謂管春施福所致以後生惡報今生一身償之而得為太子豈不快乎清羅定州東安縣令韓允嘉康熙己酉年謂鐵橋曰余前生是泰嶽山某菴僧來求吾家寄宿父令其蔬飯留之出接不復見而嘉已㘞地一聲矣東莞張穆芝別號鐵橋惠州博羅縣韓耳叔文恪公之仲子與張穆芝劉兩成為友大清初死於難託生兩成為子未生之前兩成夢耳叔入室遂産及能言劉有姑戲之曰汝為誰頓然應聲曰我父為官我兄為和尚我為人害今五年不復記憶穆因喜續三生之緣以詩寄兩成曰流浪何無已重來亦可悲寧忘當日語賴見再生時夢幻真何定恩仇且勿癡吾慚空住世尚是舊鬚眉叔兄出家字祖心別號剩人其母明末持齊臨終謂家人曰吾往廣州鄺緒生國學家去後家人往訪果其誕晨即終日為緒第五子由佛山崔夫人嘗往韓宅說鄺家合門歸信三寶故也或曰人命終後識神即往投胎今云何入室乃産答曰如上天神云人稟七識識各有神心識為主主雖前去餘神守護故見其現形也或先已有在胎者以惡業故應在胎終由母善業別有他人來代之者亦有人未死而暴死者蘇已見其在地獄受罪矣湖廣蓮胤長老住端州法輪寺向橋曰吾師兄某住山獨處日誦法華恆有一雉日來聽經畢則便飛去後數日不見來去山十里有鄉紳某遣使至山謂師曰昨夢令徒託生家主為子今遣我來相聞吾師然近來日夜啼不止請師一過看之師自顧無徒惟有一雉輒來聽經今不見數日或是彼雉乘經功德得為人耶遂往其家彼抱兒出即止啼歡喜以此為信焉潮州王教官為福建教授有一箍桶翁每日得銀則以三分買香燭供佛及死無財以殯王教授哀其無報應齊中拈筆自書紙曰箍桶日三分燒香不顧貧天空佛不見死可問閻君王教官聞州官生子往賀之州官曰得子甚怪背有數字問字何云曰箍桶日三分王曰余自書也何為而現於此令人趨往案頭取來更看兒背字已沒託生之理可為顯矣斯與吾莞縣尹舒應龍子探花弘志同書字於背也志再生為弘慈其人今戊申五十餘歲猶存右四出鐵橋集舒應龍廣西人子弘志弱冠中探花未幾而卒龍以朱書其背願再生吾家後果托生龍之田舍見字遂送龍育字弘慈中鄉試公車經廣東至東莞拜龍生祠附遺談景升南唐初隱士談景升與陳摶為友著化書百十篇屬宋齊丘為序其六十六篇有曰梓潼帝君言豫受業報為卬池龍羇於積水之下連年旱虐水復為泥身既廣大無穴可容烈日上臨內外熱惱諸鱗甲中各生小蟲咂齧困苦一日晨涼天光忽開五色雲氣浮空而過中有瑞相紺髮螺旋金容月瑩山靈河伯萬衆稽首讚歎歡喜聲動天地天香繚繞隨處生春豫乃仰首哀號乞垂救度萬靈諸聖咸謂豫曰此西方大聖正覺世尊釋迦文佛也今以教法流行東土隨教化身將往中國汝既遭逢宿業可脫豫乃身自踴躍入天光中具陳往昔報應之理世尊告曰善哉帝子汝於向來孝忠國家又復憫世生護持心因果未周仇敵相爭以人我相肆興殘忍遷怒於物業債當償今復自悔欲求解脫汝於此時復有冤親之想與夫瞋恚愚癡之念否豫聞至理心地開朗內外罄然如虗空住自顧其身隨念消滅復為男子得灌頂智是豫歸依然出蜀梓潼帝君廟記見佛金容歡喜故自感好相得灌頂智故得聰睿為文昌南唐邊鎬初生父母夢謝靈運入室故小名康樂仕南唐以都虞侯從查文徽克建州凡所俘獲皆全之建人謂之邊佛子及克潭州市不易肆謂之邊菩薩既而為節度使設齊供盛修佛事潭人謂之邊和尚出五代史南宋高宗徽宗第九子徽宗夢武肅錢王入室已而生帝出稽古略音釋渝音于變也殛音戟誅也同𩩌音袞禹父名也黃能下乃帶切音耐三足鱉謂之能鶗鴂上音題下音厥一名子規鵠音斛黃鵠鴻鵠又音谷小鳥也黿音元似鱉而大也麞音張麋大於鹿有角麞似麂而小無角麂音己麋屬音欣鸇鳥一名晨風黃色燕頷飛疾擊鳩鴿食之雒音洛今之角鴟一名鵂鶹五取蘊色受想行識色是身餘四是心心是名也榍音屑雉音池上聲一名野雞雄者有冠長尾身有文采喜鬥岐嶷上音奇下音逆謂小兒有知識也喙音誨鳥嘴钁丘縛切匡入聲犬鉏也𮗿同辨俗字噱極虐切彊入聲笑也籲音豫頓首呼也眇音藐一目小阿練梵語具云阿練若此云寂靜是僧住處也泝音素逆流而上曰泝洄又向也水欲下違之而上也八難一地獄二畜生三餓鬼四長壽天五北俱盧州六盲聾瘖啞七世智辨聰八生在佛前佛後此之八處雖感報苦樂有異而皆障礙不得見佛聞佛正法其長壽天壽五百劫外道修無想定生此天也北州壽一千歲以著樂故不受教化故佛法不至也世智辨聰以世人邪智聰利惟耽習外書不信佛經因果之教是為障難也三寶佛法僧也佛者覺也生死長夜人不自覺惟佛覺悟於三大無數劫修行六度萬行福智圓滿故稱大覺也法者佛說三藏一切經書令人去惡修善離欲出世得無生滅也僧者清淨和合衆也是菩薩及羅漢乃至受佛二百五十大戒人也無犯故云清淨六和同均故云和合也緣覺亦名獨覺出無佛世無師自悟十二因緣而出生死是中乘聖人梵語辟支佛是也阿羅漢此云無生謂後世不受生死也亦云無著不著煩惱生死故也亦云應真此是小乘聲聞聖人也譖音簪去聲讒毀也毳音吹去聲獸毛軟細者箍音孤以篾束物也了音鳥懸物也疊音牒重也厚也墮也纍也積也三災謂小三災一刀兵二疾疫三飢饉八苦一生苦二老苦三病苦四死苦五愛別離苦六怨憎會苦七求不得苦八大小諸橫禍苦宋郊附後阿修羅道梵語阿修羅亦云阿素洛又云阿須倫華言非天其宮殿園林皆七寶成似天而非天也又云無端正謂男醜女端正故或云不飲酒而有鬼畜天道也其天道攝者居須彌山空處寶城之中鬼道攝者居大海邊或大山石壁之內畜道攝者居大海底海水在上有風持如雲不入其宮如人觀天也起世經云須彌山王東面過千由旬大海下有摩質多阿修羅王國土縱廣八萬由旬大城中宮殿名曰設摩啻縱廣一萬由旬七重欄楯七重金銀鈴網七重行樹莊嚴校飾七重城壁皆七寶合成園池華果衆鳥和鳴廣如經說此不繁録須彌山南面過千由旬大海下有踊躍阿修羅王宮殿縱廣八萬由旬須彌山西面去千由旬有奢婆羅阿修羅王宮殿縱廣如前須彌山北面過千由旬大海下有羅睺羅阿修羅王宮殿住處廣大妙好如前相似侍女眷屬不可稱計共相娛樂恣情愛樂自餘臣妾左右僕使倍多備如經說不能具述阿修羅王壽數不完少出多減本身長一百由旬乃至七百由旬化身高十六萬八千由旬立大海底與須彌山齊有大幻術常與忉利天鬬日月放光射其目以手遮障世人見之謂日月薄蝕由福不如天故常戰敗即引兵竄入藕絲孔中彼等皆由前世持戒好勝布施作下品十善業之所感報而心多諂慢不能忍辱故受此身由其持戒布施故宮殿七寶所成由不忍辱故生相醜惡諂慢好勝故常與天鬬業報差別經云具十種業得阿修羅報一身行微惡二口行微惡三意行微惡四起於憍慢五起於我慢六起增上慢七起於大慢八起於邪慢九起於慢慢十回諸善根向阿修羅趣正法念經云修羅居在五住處一在地上衆相山中七山金山及諸石壁中其力最劣二在須彌山北入海二萬一千由旬有修羅名曰羅睺統領無量阿修羅衆三復過二萬一千由旬有修羅名曰勇健四復過二萬一千由旬有修羅名曰華鬘五復過二萬一千由旬有修羅名曰毗摩質多此中出聲徹於海外云我是毗摩質多阿修羅毗摩質多此云高響第一羅睺阿修羅王有四玉女從憶念生一名如影二名諸香三名妙林四名勝德即此四女一一皆有十二那由他侍女以為眷屬悉皆圍繞阿修羅王共相娛樂恣情愛樂不可具說勇健阿修羅威勢次勝華鬘阿修羅威勢更勝毗摩質多阿修羅威勢眷屬倍數更不可稱計自餘臣妾左右僕使亦不可說即知貴賤懸殊不可一槩而論阿修羅壽各各不同或有壽五百歲者人間五百年彼為一日一夜或有壽六千歲人間六百年彼為一日一夜或有壽七千歲人間七百年彼為一日一夜其殿大小各各不同復能變化其身隨意種種能作又云修羅衣食自然冠纓衣服純以七寶鮮潔同天所餐飲食隨念而有百味具足與天同等如大論說彼之衣食雖復勝人其若喫時是則不如人也謂彼凡所食時末後一口要變作青泥亦如龍王雖食百味末後一口要當變作蝦蟇是故經說不如人也阿含經云阿修羅有大威力而生念言此忉利天王及日月諸天行我頭上誓取日月以為耳璫日月天子見已各懷恐怖不寧本處以其形可畏故日月威德有大神力住壽一中劫復是世間衆生福祐日月不為阿修羅所觸惱時阿修羅漸大瞋恚即命舍摩梨毗摩質多二阿修羅王及諸大臣各辦兵仗往與天戰時難陀跋難陀二大龍王身繞須彌周圍七匝山動雲布以尾打水大海浪冠須彌忉利天曰阿修羅欲戰矣諸龍鬼神等各持兵仗從次交鬬天若不如皆奔四天王宮嚴駕攻伐先白帝釋帝釋告上夜摩天乃至他化自在天無數天衆及諸龍鬼前後圍繞帝釋命曰我軍若勝以五繫縛毗摩質多阿修羅將還善法堂我欲觀之修羅亦曰我衆若勝以五繫縛帝釋還七葉堂我欲觀之一時大戰兩不相傷但觸身體生於痛惱於是帝釋現身乃有千眼執金剛杵頭出煙𦦨修羅見之乃退敗即擒質多修羅繫縛將還遙見帝釋便肆惡口帝釋答曰我欲共汝講說道義何須惡口觀佛三昧經云此毗摩質多羅阿修羅王其兒長大見於諸天采女圍繞即白母言人皆伉儷我何獨無其母告曰香山有神名乾闥婆其神有女容姿美妙色踰白玉身諸毛孔出妙音聲甚適我意今為汝聘適汝願否子言善哉善哉願母往求爾時其母行詣香山告彼樂神我有一子威力自在於四天下而無等倫汝有令女可適吾子其女聞已願樂隨從時阿修羅子納彼女已未久之間即便懷孕經於千歲乃生一女其女顏容端正挺特天上天下更無有比面上姿媚八萬四千左邊右邊各有八萬四千前後亦爾阿修羅見以為殊異如月處星甚為奇特天帝釋憍尸迦聞求女為妻修羅聞喜以女妻之帝釋立字號曰悅意梵語舍脂諸天見之歎未曾有視東忘西視南忘北乃至毛髮皆生悅樂帝釋至歡喜園共諸采女入池遊戲爾時悅意即生嫉妒遣五夜叉往白父王今此帝釋不復見寵與諸采女自共遊戲父聞此語心生瞋恚即興四兵往攻帝釋立大海水踞須彌山頂九百九十九手同時俱作撼善見城搖須彌山四大海水一時波動帝釋驚怖靡知所趣時宮有神白天帝言莫大驚怖過去佛說般若波羅蜜王當誦持鬼兵自碎是時帝釋坐善法堂燒衆名香發大誓願般若波羅蜜是大明呪是無上呪是無等等呪真實不虗我持此法當成佛道令阿修羅自然退散作是語時於虗空中有刀輪自然而下當阿修羅上時修羅耳鼻手足一時盡落令大海水赤如蚌珠時阿修羅即便驚怖遁走無處遂入藕絲孔中西域天竺清辨論師雅量弘遠至德深邃外示僧佉之服內弘龍猛之學靜而思曰非慈氏成佛誰決我疑遂於觀自在菩薩像前誦隨心陀羅尼絶粒飲水時歷三載觀自在菩薩現妙色身謂論師曰何所志乎對曰願留此身待見慈氏觀自在菩薩曰人身危脆世間浮幻宜修勝善願生覩史多天於斯禮覲尚速得見論師曰志不可奪心不可二菩薩曰若然者宜往南天竺大安達羅國城南不遠有大山巖執金剛神所至誠誦持執金剛陀羅尼者當遂此願論師於是往而誦焉三歲之後神乃謂曰汝何所願若此勤勵論師曰願留此身待見慈氏觀自在菩薩指遣來請成我願者其在神乎神乃授方而謂之曰此巖石內有阿素洛宮如法行請石壁當開開即入中可以待見論師曰幽居無覩詎知佛興神曰慈氏出世我當相報論師受命專精誦持復歷三載初無異念呪芥子以擊石壁豁然洞開是時百千萬衆觀覩忘返論師跨其戶而告衆曰吾久祈請待見慈氏聖靈警祐大願斯遂宜可入此同見佛興聞者怖駭莫敢履戶謂是毒蛇之窟恐喪身命再三告語惟有六人從入論師顧謝時衆從容而入入之既已石壁還合衆皆怨嗟恨前言之過也出唐西域記慈氏即彌勒龍猛舊云龍樹中印度玄奘法師云貞觀十三年奘在中印度摩伽陀國那蘭陀寺見一俗人說云有一人好色每承經言修羅生男極醜生女端正聞彼山內有阿修羅窟別有宮殿甚精殊好同天佳妙其人思欲見修羅女共為匹對常受持呪精勤三年三年將滿所祈遂願其人先有弟子親友臨去召弟子相伴同去弟子於時亦隨同行既呪有徵遂到宮門門首儅者極嚴至誠求請門人令通夫人門人為通具述來意修羅女喜報守門人云來者幾人報云二人女報門人誦呪者來入同伴者且住門外門人來報誦呪者引入弟子見引入已自身不覺已到自家舍南門立自爾已來更不知彼人消息弟子因此發心捨家修道願在伽藍供養三寶其人具向奘說述此因緣印度即天竺中天竺瞻波國西南山石㵎中有修羅窟有人因遊山修道遇此窟人遂入中見有修羅宮殿處妙精華卉乍類天宮園池林果不可盡述阿修羅衆既見斯人希來到此語云汝能久住此否答云欲還本處修羅既見不在遂施一桃與彼食訖修羅語言汝宜急出恐汝身大窟不能容言訖走出身遂增長形貌粗大頭才出身大孔塞遂不出盡自爾以來年向數百唯有大頭如三碩甕人見共語具說此緣人愍語云我等鑿石令汝身出其事云何答云恩澤人奏國王具述此意君臣共議此非凡人力敵千夫若鑿令出儻有不測之意誰能抗之因此依舊時人號為大頭仙人唐國使人王玄䇿已三度至彼以手摩頭共語了了分明近有山內野火燒頭焦黑命猶不死西國志六十卷國家修撰奉敕令諸學士畫圖集在中臺復有四十卷從麟德三年起首至乾封元年夏末方訖臨見玄䇿具述此事出西國志問曰阿修羅道人何少耶答曰其生修羅道者無報故人不得而知之觀上經文即自知不少矣音釋羅睺羅此云執日竄音爨逃也藏匿也那由他此云萬億蝦蟇上音遐下音麻俗作䗫青蛙俗名蛤蟈難陀跋難陀龍難陀此云喜跋難陀此云近喜伉儷上音康去聲下音例伉儷配偶也乾闥婆此云香陰天帝樂神四兵象馬車步撼含字上聲搖動也儅當字去聲正中也匝俗作匝非宋郊少時隨父任應山讀書見犬水漂蟻穴至郭編竹橋渡之後以陰德中狀元今渡蟻橋蹟現在湖廣應山縣治南也
